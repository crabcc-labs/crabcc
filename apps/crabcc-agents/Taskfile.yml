# crabcc-agents — per-crate Taskfile.
#
# Run with `task -d apps/crabcc-agents <task>` from the repo root, or
# `task <task>` from inside this directory.
#
# Conventions follow crabcc-telegram's per-crate Taskfile pattern.

version: "3"

vars:
  CRATE: crabcc-agents
  STACK_DIR: "{{.TASKFILE_DIR}}/../../install/ollama-stack"
  LITELLM_BASE_URL: '{{.LITELLM_BASE_URL | default "http://localhost:4000"}}'

tasks:
  default:
    desc: Build + smoke
    cmds:
      - task: build
      - task: smoke

  # ── build / test ──────────────────────────────────────────────────

  build:
    desc: Release build of the worker + seed binaries
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - 'cargo build --release --bins'

  check:
    desc: Cargo check (default + agents-bullmq feature)
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - 'cargo check'

  test:
    desc: Run unit tests
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - 'cargo test'

  smoke:
    desc: End-to-end pipeline smoke (alpine + shell echo, no Anthropic call)
    dir: "{{.TASKFILE_DIR}}"
    deps: [build, redis:up]
    cmds:
      - |
        CRABCC_AGENT_SMOKE=1 RUST_LOG=info ./target/release/{{.CRATE}} >/tmp/{{.CRATE}}-smoke.log 2>&1 &
        WORKER_PID=$!
        echo "worker pid=$WORKER_PID"
        sleep 1
        ./target/release/seed "smoke-test"
        sleep 4
        kill $WORKER_PID 2>/dev/null || true
        echo "── stream tail ──"
        docker exec crabcc-redis redis-cli XRANGE crabcc:agent:logs:1 - + COUNT 8 || true

  # ── litellm: check-build-run ──────────────────────────────────────
  #
  # The LiteLLM container lives in install/ollama-stack/docker-compose.yml
  # alongside ollama + caddy (issue #105). These tasks are thin wrappers
  # around that stack so the agents service can drive its own preflight
  # without owning a duplicate container spec.

  litellm:check:
    desc: Probe LITELLM_BASE_URL — exit non-zero when unreachable
    cmds:
      - |
        url="{{.LITELLM_BASE_URL}}"
        host_port="${url#http://}"; host_port="${host_port#https://}"; host_port="${host_port%%/*}"
        nc -z ${host_port%:*} ${host_port##*:} && echo "litellm: reachable @ $url" || { echo "litellm: UNREACHABLE @ $url"; exit 1; }

  litellm:build-run:
    desc: Bring the ollama-stack (litellm + ollama + caddy) up idempotently
    cmds:
      - 'bash {{.STACK_DIR}}/start.sh'

  litellm:check-build-run:
    desc: Check, then build+run if needed (idempotent — safe to run anytime)
    cmds:
      - |
        if task -d {{.TASKFILE_DIR}} litellm:check >/dev/null 2>&1; then
          echo "litellm already running — nothing to do"
          exit 0
        fi
        echo "litellm not running — bringing stack up"
      - task: litellm:build-run
      - task: litellm:check

  litellm:down:
    desc: Tear down the litellm + ollama + caddy stack
    cmds:
      - 'bash {{.STACK_DIR}}/start.sh --down'

  litellm:logs:
    desc: Tail litellm container logs
    cmds:
      - 'docker compose -f {{.STACK_DIR}}/docker-compose.yml logs -f litellm'

  # ── redis sidecar ─────────────────────────────────────────────────

  redis:up:
    desc: Start Redis container with the workload-tuned config (idempotent)
    cmds:
      - |
        if docker ps --format '{{`{{.Names}}`}}' | grep -q '^crabcc-redis$'; then
          echo "redis already running"
          exit 0
        fi
        docker run -d --rm --name crabcc-redis \
          -p 127.0.0.1:6379:6379 \
          -v "{{.TASKFILE_DIR}}/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro" \
          --sysctl net.core.somaxconn=4096 \
          --ulimit nofile=65536:65536 \
          redis:7-alpine \
          redis-server /usr/local/etc/redis/redis.conf

  redis:down:
    desc: Stop the redis container
    cmds:
      - 'docker stop crabcc-redis 2>/dev/null || true'

  # ── docker images ─────────────────────────────────────────────────

  image:worker:
    desc: Build the worker image (apps/crabcc-agents/Dockerfile)
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - 'docker buildx build -f Dockerfile -t ghcr.io/peterlodri-sec/crabcc-agents:dev --load .'

  image:runner:
    desc: Build the agent-runner image (claude-code + mini-swe + axint)
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - 'docker buildx build -f agent-runner/Dockerfile -t ghcr.io/peterlodri-sec/crabcc-agent-runner:dev --load agent-runner'

  # ── compose stack ─────────────────────────────────────────────────

  up:
    desc: docker compose up -d --wait — bring redis + worker up
    deps: [litellm:check-build-run]
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - 'docker compose up -d --wait'

  down:
    desc: docker compose down
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - 'docker compose down'
