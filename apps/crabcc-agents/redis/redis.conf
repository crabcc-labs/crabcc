# Redis tuned for crabcc-agents.
#
# Workload profile:
#   1. BullMQ queue ops — long-blocking BLPOP/BRPOPLPUSH on a few list
#      keys, ZADD for delayed jobs, INCR for counters. Job loss across
#      restarts is unacceptable.
#   2. Redis Streams — frequent XADD (one per stdout/stderr line), each
#      with MAXLEN ~ approximate trim so total stream size is bounded.
#      XREAD BLOCK consumers stay connected for many seconds at a time.
#
# These two patterns drive every choice below. Keep the comments —
# they're load-bearing when someone wants to bump a knob.
#
# References:
#   https://redis.io/docs/latest/operate/oss_and_stack/management/config-file/
#   https://redis.io/docs/latest/develop/data-types/streams/
#   https://redis.io/tutorials/howtos/solutions/streams/streaming-llm-output/

# ── Networking ────────────────────────────────────────────────────────

# Bind everything; lock down via docker network rules instead. (`bind`
# in a container is mostly theatre — the listening interface is the
# container, not the host.)
bind 0.0.0.0 -::*
protected-mode no
port 6379

# BullMQ workers hold long BLPOP connections (effectively forever). A
# non-zero idle timeout would kill them mid-block.
timeout 0

# Detect dead workers fast so their reservations don't sit on jobs.
tcp-keepalive 30

# Backlog deeper than the default 511 — bursts of seed/log producers
# can land on accept() in tight bursts under load.
tcp-backlog 4096

# ── Memory ────────────────────────────────────────────────────────────

# Hard cap. Override via `--maxmemory` at run time per environment.
maxmemory 1gb

# CRITICAL: never evict, ever. Eviction would silently drop queued
# jobs. Stream growth is bounded separately by MAXLEN ~ trim in the
# worker, so memory stays in budget without eviction. If memory hits
# the cap something has gone wrong upstream — failing loudly is the
# correct behavior.
maxmemory-policy noeviction

# Async free of large values + expirations + DEL / UNLINK / FLUSH so
# big stream nodes never block the event loop.
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
lazyfree-lazy-user-del yes
lazyfree-lazy-user-flush yes
replica-lazy-flush yes

# ── Persistence ──────────────────────────────────────────────────────

# AOF only — RDB snapshots are unnecessary for a queue + ephemeral-
# stream store, and add fork-induced latency spikes.
save ""

appendonly yes
appendfilename "crabcc-agents.aof"
appendfsync everysec                   # ≤ 1 s of work loss; standard tradeoff.
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes
aof-use-rdb-preamble yes
aof-timestamp-enabled yes              # easier post-incident replay.

# ── IO threads ────────────────────────────────────────────────────────

# Read parsing + reply writing on dedicated threads. Tune to host
# cores — 4 is a sane default for an 8-core machine. Set to 1 to
# disable. Reads-too costs ~5% CPU but halves command latency under
# contention.
io-threads 4
io-threads-do-reads yes

# ── Streams ──────────────────────────────────────────────────────────

# Per-stream-node packing. Smaller nodes → faster MAXLEN ~ trim
# cycles (entire nodes are dropped at once, never rewritten). Our
# entries are tiny (s/t/m fields, < 200 B each) so 256 entries per
# node ≈ 50 KB nodes — trim work stays bounded.
stream-node-max-bytes 4096
stream-node-max-entries 256

# ── Latency hygiene ───────────────────────────────────────────────────

# Faster background-task tick (default 10 → 100). Better expiration
# precision and quicker dead-client cleanup; ~1% CPU cost. dynamic-hz
# scales further under load.
hz 100
dynamic-hz yes

# Active rehashing avoids latency spikes when the keyspace grows.
activerehashing yes

# Output-buffer caps — `normal` clients (XREAD subscribers) can buffer
# more before disconnect. The default 0 0 0 means "unlimited" which
# is fine, but make it explicit and tunable.
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Slowlog — keep enough history to investigate without blowing memory.
slowlog-log-slower-than 10000          # microseconds — log >10 ms commands
slowlog-max-len 256

# Latency monitor — capture stalls that don't show up as slow commands
# (e.g. fork lag, AOF rewrite stalls).
latency-monitor-threshold 100

# ── Logs ─────────────────────────────────────────────────────────────

loglevel notice
logfile ""                             # stderr — captured by docker logs.

# ── Misc ─────────────────────────────────────────────────────────────

databases 16
always-show-logo no
proc-title-template "{title} {listen-addr}"
