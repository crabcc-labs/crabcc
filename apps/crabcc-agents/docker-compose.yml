# Local dev / smoke stack for crabcc-agents.
#
# Brings up Redis (with the workload-tuned redis.conf), the worker,
# and an optional axint-mcp-http sidecar. Drop a job onto the queue
# from the host with `cargo run --bin seed -- "<prompt>"`.

name: crabcc-agents

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    init: true
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis-data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 10
    sysctls:
      net.core.somaxconn: 4096          # match `tcp-backlog` in redis.conf
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/peterlodri-sec/crabcc-agents:dev
    restart: unless-stopped
    init: true                          # tini PID1 — zombie reaper for the worker too
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
      AGENTS_QUEUE: crabcc:agents
      AGENTS_CONCURRENCY: "4"
      AGENT_IMAGE: ghcr.io/peterlodri-sec/crabcc-agent-runner:latest
      AGENT_DEFAULT_MODEL: claude-sonnet-4-6
      AGENT_DEFAULT_EFFORT: high
      RUST_LOG: info,crabcc_agents=debug
    volumes:
      # Docker socket — the worker spawns peer containers via this.
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "127.0.0.1:9090:9090"           # /healthz
    healthcheck:
      test: ["CMD", "/usr/local/bin/crabcc-agents", "--health"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Optional: host-side axint MCP. Comment out if you'd rather use the
  # in-container stdio default. When this service is up, set
  # HOST_AXINT_MCP_URL=http://axint-mcp:7785/mcp on the worker (uncomment
  # below).
  # axint-mcp:
  #   image: node:22-alpine
  #   restart: unless-stopped
  #   init: true
  #   command: ["sh", "-c", "npm install -g @axint/compiler && exec axint-mcp-http --port 7785"]
  #   ports:
  #     - "127.0.0.1:7785:7785"
  #   healthcheck:
  #     test: ["CMD", "wget", "-qO-", "http://localhost:7785/healthz"]
  #     interval: 30s
  #     timeout: 3s
  #     retries: 3

volumes:
  redis-data:
