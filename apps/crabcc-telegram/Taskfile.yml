# https://taskfile.dev — install with `brew install go-task` or
# `go install github.com/go-task/task/v3/cmd/task@latest`.
#
# Local-dev Taskfile for apps/crabcc-telegram (the bot is excluded
# from the workspace per /Cargo.toml's teloxide-ICE comment, so it
# builds standalone).
#
# Quick start:
#   task env-init       # interactive — populates .env with token
#   task env-validate   # verifies token via getMe (no false-pass)
#   task                # build + lint + test (the daily gate)
#   task run            # foreground run (uses .env automatically)
#
# Container path (mirrors root Taskfile's `task telegram-up`):
#   task docker-build   # delegates to root Taskfile
#   task docker-up      # detached + auto-restart
#   task docker-down
#
# Legacy LaunchAgent path (triggers macOS persistence detection in
# some EDRs — prefer the docker path; kept for parity with #155):
#   task install-service / uninstall-service
#
# All tasks at the same level so `task --list` is your menu.

version: '3'

# Auto-load .env into every task's environment — `cargo run`,
# `cargo test`, etc. all see TELEGRAM_BOT_TOKEN / CRABCC_PUBLIC_URL.
# Required: false → tasks that don't need .env (env-init, fmt) don't
# fail when it's absent.
dotenv: ['.env']
env:
  # Mirrors the bot's compile-time default for the local viz endpoint.
  CRABCC_SERVE_URL: '{{.CRABCC_SERVE_URL | default "http://localhost:8090"}}'

vars:
  ENV_FILE: '.env'
  BIN_NAME: crabcc-telegram
  CARGO_BIN: '{{.HOME}}/.cargo/bin'
  TARGET_BIN: 'target/release/{{.BIN_NAME}}'

tasks:
  default:
    desc: Build + lint + test (the daily-driver gate)
    cmds:
      - task: build
      - task: fmt-check
      - task: lint
      - task: test

  # ── build / run ────────────────────────────────────────────────────────────

  build:
    desc: Release build (standalone — excluded from workspace)
    sources:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'src/**/*.rs'
    generates:
      - '{{.TARGET_BIN}}'
    cmds:
      - cargo build --release

  build-debug:
    desc: Debug build (faster iteration)
    cmds:
      - cargo build

  run:
    desc: Foreground run (reads .env via Taskfile's dotenv)
    deps: [env-validate]
    cmds:
      - cargo run

  watch:
    desc: cargo watch — rebuild + restart on src/ change (needs cargo-watch)
    deps: [env-validate]
    cmds:
      - cargo watch -x run

  test:
    desc: Run unit tests
    cmds:
      - cargo test

  # ── code quality ───────────────────────────────────────────────────────────

  lint:
    desc: clippy --all-targets -- -D warnings
    cmds:
      - cargo clippy --all-targets -- -D warnings

  fmt:
    desc: cargo fmt --all
    cmds:
      - cargo fmt --all

  fmt-check:
    desc: cargo fmt --all -- --check
    cmds:
      - cargo fmt --all -- --check

  # ── env management ─────────────────────────────────────────────────────────
  #
  # `.env` is gitignored and chmod 0600. The init task wraps the
  # heredoc-with-aliased-cat footgun the user hit during initial
  # bring-up — `printf` bypasses any cat=bat alias.

  env-init:
    desc: Interactively populate .env (token + tunnel URL); chmod 0600
    interactive: true
    cmds:
      - |
        read -rp "TELEGRAM_BOT_TOKEN (from BotFather): " tok
        read -rp "CRABCC_PUBLIC_URL (cloudflared/ngrok URL, optional): " url
        printf 'TELEGRAM_BOT_TOKEN=%s\n' "$tok" > {{.ENV_FILE}}
        if [ -n "$url" ]; then printf 'CRABCC_PUBLIC_URL=%s\n' "$url" >> {{.ENV_FILE}}; fi
        chmod 0600 {{.ENV_FILE}}
        echo "✓ wrote {{.ENV_FILE}} ($(wc -c < {{.ENV_FILE}} | tr -d ' ') bytes)"

  env-validate:
    desc: Verify .env exists + getMe returns ok=true
    silent: true
    cmds:
      - |
        if [ ! -r {{.ENV_FILE}} ]; then
            echo "✗ missing: {{.ENV_FILE}} — run: task env-init" >&2
            exit 1
        fi
        TOKEN=$(command grep -E '^TELEGRAM_BOT_TOKEN=' {{.ENV_FILE}} | cut -d= -f2- | tr -d '"\r' | xargs)
        if [ -z "$TOKEN" ]; then
            echo "✗ TELEGRAM_BOT_TOKEN missing or empty in {{.ENV_FILE}}" >&2
            exit 1
        fi
        ok=$(curl -fsS --max-time 5 "https://api.telegram.org/bot${TOKEN}/getMe" | jq -r '.ok // false')
        if [ "$ok" = "true" ]; then
            who=$(curl -fsS --max-time 5 "https://api.telegram.org/bot${TOKEN}/getMe" | jq -r '.result.username')
            echo "✓ token valid — bot: @${who} (length ${#TOKEN})"
        else
            echo "✗ token rejected by Telegram — getMe returned ok=false (404 / not_found?)" >&2
            echo "  prefix: ${TOKEN:0:10}…  length: ${#TOKEN}" >&2
            exit 1
        fi

  env-show:
    desc: Print .env (with token redacted)
    silent: true
    cmds:
      - |
        if [ ! -r {{.ENV_FILE}} ]; then
            echo "missing: {{.ENV_FILE}}"; exit 1
        fi
        command grep -v '^#' {{.ENV_FILE}} \
            | sed -E 's/^(TELEGRAM_BOT_TOKEN=).*/\1***REDACTED***/'

  # ── binary install / launchagent ───────────────────────────────────────────

  install:
    desc: Install the bot binary to ~/.cargo/bin/{{.BIN_NAME}}
    deps: [build]
    cmds:
      - cp '{{.TARGET_BIN}}' '{{.CARGO_BIN}}/{{.BIN_NAME}}'
      - '{{.CARGO_BIN}}/{{.BIN_NAME}} --version'

  install-service:
    desc: Register LaunchAgent (legacy — prefer `task docker-up`)
    deps: [install, env-validate]
    cmds:
      - '{{.CARGO_BIN}}/{{.BIN_NAME}} install-service'

  uninstall-service:
    desc: Remove the LaunchAgent
    cmds:
      - 'launchctl bootout "gui/$(id -u)/com.crabcc.telegram-bot" 2>/dev/null || true'
      - 'rm -f $HOME/Library/LaunchAgents/com.crabcc.telegram-bot.plist'
      - 'echo "✓ LaunchAgent removed"'

  # ── observability ──────────────────────────────────────────────────────────

  logs:
    desc: Tail bot stdout + stderr (LaunchAgent path)
    cmds:
      - 'tail -f $HOME/Library/Logs/Crabcc/telegram-bot.out.log $HOME/Library/Logs/Crabcc/telegram-bot.err.log'

  status:
    desc: launchctl print of the bot service (or "not loaded")
    cmds:
      - 'launchctl print "gui/$(id -u)/com.crabcc.telegram-bot" 2>&1 | head -20 || echo "(not loaded — run: task install-service or task docker-up)"'

  # ── docker / container path (delegates to root Taskfile, #203) ─────────────

  docker-build:
    desc: Build the bot container image — delegates to root Taskfile
    dir: ../..
    cmds:
      - task docker-build-telegram

  docker-up:
    desc: Run the bot container detached + auto-restart
    dir: ../..
    cmds:
      - task telegram-up

  docker-down:
    desc: Stop + remove the bot container
    dir: ../..
    cmds:
      - task telegram-down

  docker-logs:
    desc: docker logs -f for the bot container
    cmds:
      - docker logs -f crabcc-telegram

  # ── housekeeping ───────────────────────────────────────────────────────────

  clean:
    desc: cargo clean (does NOT remove .env)
    cmds:
      - cargo clean

  doctor:
    desc: Diagnose bot setup — env, binary, service, container
    silent: true
    cmds:
      - |
        echo "── env"
        if [ -r {{.ENV_FILE}} ]; then
            echo "  ✓ {{.ENV_FILE}} ($(wc -c < {{.ENV_FILE}} | tr -d ' ') bytes)"
        else
            echo "  ✗ {{.ENV_FILE}} missing"
        fi
        echo "── binary"
        if [ -x '{{.CARGO_BIN}}/{{.BIN_NAME}}' ]; then
            echo "  ✓ {{.CARGO_BIN}}/{{.BIN_NAME}} ($('{{.CARGO_BIN}}/{{.BIN_NAME}}' --version))"
        else
            echo "  ✗ {{.CARGO_BIN}}/{{.BIN_NAME}} missing — run: task install"
        fi
        echo "── LaunchAgent"
        if launchctl print "gui/$(id -u)/com.crabcc.telegram-bot" >/dev/null 2>&1; then
            echo "  ✓ loaded"
        else
            echo "  ○ not loaded"
        fi
        echo "── docker container"
        if docker ps --filter name=crabcc-telegram --format '{{`{{.Names}}`}}' 2>/dev/null | grep -q .; then
            echo "  ✓ running"
        else
            echo "  ○ not running"
        fi
        echo "── tunnel"
        if [ -f "$HOME/.crabcc/cloudflared.url" ]; then
            echo "  ✓ $(cat $HOME/.crabcc/cloudflared.url)"
        else
            echo "  ○ no tunnel — run: task tunnel-start (root Taskfile)"
        fi
