<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>crabcc bridge</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <h1>crabcc bridge</h1>
      <span id="schema" class="badge">schema —</span>
    </header>
    <section class="status" aria-live="polite">
      <div><span class="label">tab</span> <span id="tab-url">—</span></div>
      <div><span class="label">calls</span> <span id="stats">0 / 0</span></div>
      <div><span class="label">last</span> <span id="last">—</span></div>
    </section>
    <section class="block">
      <h2>navigation</h2>
      <div class="row">
        <button data-method="goBack">← back</button>
        <button data-method="goForward">forward →</button>
      </div>
      <div class="row">
        <input id="nav-url" type="url" placeholder="https://example.com" />
        <button id="nav-go" data-method="navigate">go</button>
      </div>
    </section>
    <section class="block">
      <h2>by selector</h2>
      <input id="sel" type="text" placeholder="CSS selector (e.g. button.primary)" />
      <div class="row">
        <button data-method="click" data-arity="sel">click</button>
        <button data-method="hover" data-arity="sel">hover</button>
        <button data-method="waitFor" data-arity="sel">wait for</button>
      </div>
      <div class="row">
        <input id="type-text" type="text" placeholder="text to type" />
        <label class="check"><input id="type-submit" type="checkbox" /> submit</label>
      </div>
      <div class="row">
        <button data-method="type" data-arity="sel-text">type</button>
        <button data-method="selectOption" data-arity="sel-text">select option</button>
      </div>
    </section>
    <section class="block">
      <h2>keyboard</h2>
      <div class="row">
        <input id="key" type="text" placeholder="Enter / a / ArrowDown" />
        <button data-method="pressKey" data-arity="key">press</button>
      </div>
    </section>
    <section class="block">
      <h2>aria snapshot</h2>
      <div class="row">
        <button id="snap" data-method="ariaSnapshot">snapshot</button>
        <span id="snap-summary" class="muted">no snapshot yet</span>
      </div>
    </section>
    <section class="block">
      <h2>last result</h2>
      <pre id="result">—</pre>
    </section>
    <script type="module" src="popup.js"></script>
  </body>
</html>
