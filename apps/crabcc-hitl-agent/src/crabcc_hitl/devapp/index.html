<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>crabcc HITL — local dev console</title>
    <style>
      :root {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 14px;
      }
      body {
        margin: 0;
        padding: 16px;
        background: #f8f9fb;
        color: #1f2328;
        max-width: 980px;
        margin-inline: auto;
        line-height: 1.45;
      }
      h1 {
        font-size: 20px;
        margin: 0 0 4px;
        font-weight: 700;
      }
      h2 {
        font-size: 14px;
        font-weight: 700;
        margin: 24px 0 8px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #57606a;
      }
      .sub {
        color: #6e7781;
        font-size: 13px;
        margin-bottom: 12px;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      @media (max-width: 760px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
      .card {
        background: #fff;
        border: 1px solid #d0d7de;
        border-radius: 8px;
        padding: 12px 14px;
      }
      label {
        display: block;
        font-size: 12px;
        color: #57606a;
        margin-bottom: 4px;
      }
      input[type="text"],
      input[type="password"],
      textarea {
        width: 100%;
        box-sizing: border-box;
        font: inherit;
        padding: 6px 8px;
        border: 1px solid #d0d7de;
        border-radius: 6px;
        background: #fff;
      }
      textarea {
        min-height: 72px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 13px;
      }
      .row {
        margin-bottom: 8px;
      }
      .actions {
        display: flex;
        gap: 8px;
        margin-top: 8px;
      }
      button {
        font: inherit;
        padding: 6px 14px;
        border: 1px solid #d0d7de;
        border-radius: 6px;
        background: #f6f8fa;
        cursor: pointer;
        font-weight: 500;
      }
      button.primary {
        background: #1f6feb;
        color: #fff;
        border-color: #1f6feb;
      }
      button.approve {
        background: #2ea043;
        color: #fff;
        border-color: #2ea043;
      }
      button.deny {
        background: #cf222e;
        color: #fff;
        border-color: #cf222e;
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      .reply {
        white-space: pre-wrap;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 13px;
        background: #f6f8fa;
        border-radius: 6px;
        padding: 10px;
        margin-top: 8px;
        max-height: 240px;
        overflow: auto;
      }
      .pill {
        display: inline-block;
        padding: 1px 6px;
        font-size: 11px;
        border-radius: 9999px;
        background: #ddf4ff;
        color: #0969da;
        margin-right: 4px;
      }
      .pill.deny { background: #ffebe9; color: #cf222e; }
      .pill.approve { background: #dafbe1; color: #1a7f37; }
      .pill.auto { background: #fff8c5; color: #9a6700; }
      .pill.policy { background: #fbefff; color: #8250df; }
      .pill.timeout, .pill.prompt_failed, .pill.misconfigured {
        background: #ffe5d9;
        color: #cf222e;
      }
      .item {
        padding: 8px 0;
        border-top: 1px solid #eaeef2;
        font-size: 13px;
      }
      .item:first-child { border-top: 0; }
      .args {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
        color: #57606a;
        white-space: pre-wrap;
        word-break: break-all;
      }
      .meta {
        font-size: 11px;
        color: #6e7781;
        margin-top: 2px;
      }
      .empty {
        color: #6e7781;
        text-align: center;
        padding: 12px;
      }
      .err {
        color: #cf222e;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <h1>crabcc HITL — dev console</h1>
    <div class="sub">
      Bearer-auth UI for local end-to-end testing. No Telegram needed. Token + chat id persist
      in <code>localStorage</code>; clear via the browser if you switch accounts.
    </div>

    <div class="card">
      <h2 style="margin-top:0">Auth</h2>
      <div class="row">
        <label for="token">CRABCC_HITL_API_TOKEN</label>
        <input id="token" type="password" placeholder="paste bearer token" />
      </div>
      <div class="row">
        <label for="chatid">tg_chat_id (optional — for routing approvals)</label>
        <input id="chatid" type="text" placeholder="e.g. 5875395828" />
      </div>
      <div class="actions">
        <button id="save">Save</button>
        <button id="ping">Ping /healthz</button>
        <span id="ping-status" class="err" style="align-self:center"></span>
      </div>
    </div>

    <h2>Chat</h2>
    <div class="card">
      <div class="row">
        <label for="task">Task</label>
        <textarea id="task" placeholder="e.g. fetch https://example.com and summarise"></textarea>
      </div>
      <div class="actions">
        <button id="send" class="primary">Send /chat</button>
        <span id="chat-status" class="err" style="align-self:center"></span>
      </div>
      <div id="reply" class="reply" hidden></div>
    </div>

    <div class="grid">
      <div>
        <h2>Pending approvals</h2>
        <div id="pending" class="card"><div class="empty">Loading…</div></div>
      </div>
      <div>
        <h2>Recent decisions</h2>
        <div id="audit" class="card"><div class="empty">Loading…</div></div>
      </div>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);

      const TOKEN_KEY = "crabcc-hitl-token";
      const CHAT_KEY = "crabcc-hitl-chat-id";

      $("token").value = localStorage.getItem(TOKEN_KEY) || "";
      $("chatid").value = localStorage.getItem(CHAT_KEY) || "";

      $("save").addEventListener("click", () => {
        localStorage.setItem(TOKEN_KEY, $("token").value.trim());
        localStorage.setItem(CHAT_KEY, $("chatid").value.trim());
        $("ping-status").textContent = "saved";
        setTimeout(() => ($("ping-status").textContent = ""), 1500);
      });

      const authHeaders = (extra = {}) => {
        const t = ($("token").value || "").trim();
        const h = { ...extra };
        if (t) h["Authorization"] = `Bearer ${t}`;
        return h;
      };

      async function api(path, opts = {}) {
        const res = await fetch(path, {
          ...opts,
          headers: { "Content-Type": "application/json", ...authHeaders(opts.headers || {}) },
        });
        if (!res.ok) {
          const txt = await res.text().catch(() => "");
          throw new Error(`HTTP ${res.status}: ${txt.slice(0, 200)}`);
        }
        return res.json();
      }

      $("ping").addEventListener("click", async () => {
        $("ping-status").textContent = "…";
        try {
          const r = await api("/healthz");
          $("ping-status").textContent = `OK · ${r.status} · ${r.version}`;
        } catch (e) {
          $("ping-status").textContent = e.message;
        }
      });

      $("send").addEventListener("click", async () => {
        const task = $("task").value.trim();
        if (!task) return;
        const chatRaw = ($("chatid").value || "").trim();
        const tgChatId = chatRaw ? Number(chatRaw) : null;
        $("chat-status").textContent = "…";
        $("reply").hidden = true;
        try {
          const body = { task };
          if (tgChatId) body.tg_chat_id = tgChatId;
          const r = await api("/chat", { method: "POST", body: JSON.stringify(body) });
          $("chat-status").textContent = `model: ${r.model}`;
          $("reply").textContent = r.reply;
          $("reply").hidden = false;
        } catch (e) {
          $("chat-status").textContent = e.message;
        }
      });

      async function respondTo(requestId, decision) {
        await api("/approval/respond", {
          method: "POST",
          body: JSON.stringify({ request_id: requestId, decision }),
        });
      }

      function renderPending(items) {
        const root = $("pending");
        if (!items.length) {
          root.innerHTML = '<div class="empty">No pending approvals.</div>';
          return;
        }
        root.innerHTML = "";
        for (const a of items) {
          const card = document.createElement("div");
          card.className = "item";
          const title = document.createElement("div");
          title.innerHTML = `<strong>${a.tool}</strong> <span class="meta">· expires in ${Math.round(a.remaining_s)}s</span>`;
          const args = document.createElement("div");
          args.className = "args";
          args.textContent = JSON.stringify(a.arguments, null, 2);
          const actions = document.createElement("div");
          actions.className = "actions";
          for (const kind of ["approve", "deny"]) {
            const b = document.createElement("button");
            b.className = kind;
            b.textContent = kind === "approve" ? "✅ Approve" : "🛑 Deny";
            b.addEventListener("click", async () => {
              card.querySelectorAll("button").forEach((x) => (x.disabled = true));
              try {
                await respondTo(a.id, kind);
                tick();
              } catch (e) {
                card.querySelectorAll("button").forEach((x) => (x.disabled = false));
                $("chat-status").textContent = e.message;
              }
            });
            actions.appendChild(b);
          }
          card.append(title, args, actions);
          root.appendChild(card);
        }
      }

      function renderAudit(records) {
        const root = $("audit");
        if (!records.length) {
          root.innerHTML = '<div class="empty">No decisions yet.</div>';
          return;
        }
        root.innerHTML = "";
        for (const r of records) {
          const card = document.createElement("div");
          card.className = "item";
          const t = new Date(r.timestamp * 1000).toLocaleTimeString();
          const pill = `<span class="pill ${r.source}">${r.source}</span>`;
          let detail = "";
          if (r.matched_rule) detail += ` · rule: <code>${r.matched_rule}</code>`;
          if (r.reason) detail += ` · ${r.reason}`;
          card.innerHTML =
            `<div>${pill} <strong>${r.tool}</strong> <span class="meta">· ${t}${detail}</span></div>` +
            `<div class="args">${JSON.stringify(r.arguments)}</div>`;
          root.appendChild(card);
        }
      }

      async function tick() {
        if (!$("token").value.trim()) {
          $("pending").innerHTML = '<div class="empty">Save a token to start.</div>';
          $("audit").innerHTML = '<div class="empty">Save a token to start.</div>';
          return;
        }
        try {
          const [pending, audit] = await Promise.all([
            api("/approval/list"),
            api("/approval/audit?limit=20"),
          ]);
          renderPending(pending.pending);
          renderAudit(audit.records);
        } catch (e) {
          $("pending").innerHTML = `<div class="err">${e.message}</div>`;
        }
      }

      tick();
      setInterval(tick, 3000);
    </script>
  </body>
</html>
