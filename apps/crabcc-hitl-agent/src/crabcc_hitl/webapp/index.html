<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>crabcc HITL — pending approvals</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      body {
        margin: 0;
        padding: 16px 12px 32px;
        background: var(--tg-theme-bg-color, #fff);
        color: var(--tg-theme-text-color, #000);
        max-width: 640px;
        margin-inline: auto;
        font-size: 15px;
        line-height: 1.4;
      }
      h1 {
        font-size: 18px;
        margin: 0 0 14px;
        font-weight: 600;
      }
      .empty,
      .loading,
      .error {
        text-align: center;
        padding: 32px 12px;
        color: var(--tg-theme-hint-color, #888);
      }
      .error {
        color: #c0392b;
      }
      .row {
        background: var(--tg-theme-secondary-bg-color, #f3f3f3);
        border-radius: 12px;
        padding: 12px 14px;
        margin-bottom: 10px;
      }
      .row .tool {
        font-weight: 600;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 14px;
        margin-bottom: 4px;
      }
      .row .args {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
        white-space: pre-wrap;
        word-break: break-all;
        color: var(--tg-theme-hint-color, #555);
        margin-bottom: 8px;
      }
      .row .meta {
        font-size: 12px;
        color: var(--tg-theme-hint-color, #888);
        margin-bottom: 10px;
      }
      .actions {
        display: flex;
        gap: 8px;
      }
      button {
        flex: 1;
        font-size: 14px;
        font-weight: 600;
        padding: 10px 12px;
        border: 0;
        border-radius: 10px;
        cursor: pointer;
      }
      button.approve {
        background: #2ecc71;
        color: #fff;
      }
      button.deny {
        background: #e74c3c;
        color: #fff;
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
    </style>
  </head>
  <body>
    <h1>Pending approvals</h1>
    <div id="root" class="loading">Loading…</div>

    <h1 style="margin-top: 28px">Recent decisions</h1>
    <div id="audit" class="loading">Loading…</div>

    <script>
      // Telegram exposes the WebApp object globally; missing == loaded
      // outside Telegram, in which case we just show the data with no
      // back-button / theme colors. initData is unverifiable then so
      // the API will 401 — that's the right behaviour.
      const tg = window.Telegram && window.Telegram.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
      }

      const initData = (tg && tg.initData) || "";
      const root = document.getElementById("root");
      const audit = document.getElementById("audit");

      async function fetchApprovals() {
        const res = await fetch("/webapp/api/approvals", {
          headers: { "X-Telegram-Init-Data": initData },
        });
        if (!res.ok) throw new Error(`http ${res.status}`);
        return (await res.json()).pending;
      }

      async function fetchAudit() {
        const res = await fetch("/webapp/api/audit?limit=20", {
          headers: { "X-Telegram-Init-Data": initData },
        });
        if (!res.ok) throw new Error(`http ${res.status}`);
        return (await res.json()).records;
      }

      function fmtTime(ts) {
        const d = new Date(ts * 1000);
        return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
      }

      const SOURCE_BADGE = {
        approve: "✅ approve",
        deny: "🛑 deny",
        auto: "▶ auto",
        policy: "📜 policy",
        timeout: "⌛ timeout",
        prompt_failed: "⚠️ prompt fail",
        misconfigured: "⚠️ no channel",
      };

      function renderAudit(items) {
        if (!items.length) {
          audit.className = "empty";
          audit.textContent = "No decisions yet.";
          return;
        }
        audit.className = "";
        audit.innerHTML = "";
        for (const r of items) {
          const card = document.createElement("div");
          card.className = "row";
          const tool = document.createElement("div");
          tool.className = "tool";
          tool.textContent = `${SOURCE_BADGE[r.source] || r.source} • ${r.tool}`;
          const meta = document.createElement("div");
          meta.className = "meta";
          let line = fmtTime(r.timestamp);
          if (r.matched_rule) line += ` • ${r.matched_rule}`;
          if (r.reason) line += ` • ${r.reason}`;
          meta.textContent = line;
          card.append(tool, meta);
          audit.appendChild(card);
        }
      }

      async function respond(requestId, decision) {
        const res = await fetch("/webapp/api/respond", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-Telegram-Init-Data": initData,
          },
          body: JSON.stringify({ request_id: requestId, decision }),
        });
        if (!res.ok) throw new Error(`http ${res.status}`);
      }

      function render(items) {
        if (!items.length) {
          root.className = "empty";
          root.textContent = "No pending approvals.";
          return;
        }
        root.className = "";
        root.innerHTML = "";
        for (const a of items) {
          const card = document.createElement("div");
          card.className = "row";
          const tool = document.createElement("div");
          tool.className = "tool";
          tool.textContent = a.tool;
          const args = document.createElement("div");
          args.className = "args";
          args.textContent = JSON.stringify(a.arguments, null, 2);
          const meta = document.createElement("div");
          meta.className = "meta";
          meta.textContent = `Expires in ${Math.round(a.remaining_s)}s`;
          const actions = document.createElement("div");
          actions.className = "actions";
          for (const kind of ["approve", "deny"]) {
            const btn = document.createElement("button");
            btn.className = kind;
            btn.textContent = kind === "approve" ? "✅ Approve" : "🛑 Deny";
            btn.addEventListener("click", async () => {
              card.querySelectorAll("button").forEach((b) => (b.disabled = true));
              try {
                await respond(a.id, kind);
                card.remove();
                if (!root.children.length) {
                  root.className = "empty";
                  root.textContent = "No pending approvals.";
                }
              } catch (e) {
                card.querySelectorAll("button").forEach((b) => (b.disabled = false));
                showError(e.message);
              }
            });
            actions.appendChild(btn);
          }
          card.append(tool, args, meta, actions);
          root.appendChild(card);
        }
      }

      function showError(msg) {
        root.className = "error";
        root.textContent = `Error: ${msg}`;
      }

      async function tick() {
        try {
          const [items, history] = await Promise.all([fetchApprovals(), fetchAudit()]);
          render(items);
          renderAudit(history);
        } catch (e) {
          showError(e.message);
        }
      }

      tick();
      setInterval(tick, 4000);
    </script>
  </body>
</html>
