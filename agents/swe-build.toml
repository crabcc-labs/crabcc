[agent]
name        = "swe-build"
description = "Full-depth SWE agent for build, architecture, and correctness tasks"
model       = "openrouter/deepseek/deepseek-v4-pro"

[agent.prompt]
file = "agents/prompts/swe-build.md"

[agent.tools]
allowlist = ["Read", "Write", "Edit", "Bash", "Grep", "Glob"]

[agent.limits]
timeout_minutes = 30
max_retries     = 2
