[agent]
name        = "swe-fast"
description = "Fast, cheap SWE agent for small patches, lint fixes, and focused single-file changes"
model       = "openrouter/deepseek/deepseek-v4-flash"

[agent.prompt]
file = "agents/prompts/swe-fast.md"

[agent.tools]
allowlist = ["Read", "Write", "Edit", "Bash", "Grep", "Glob"]

[agent.limits]
timeout_minutes = 10
max_retries     = 1
