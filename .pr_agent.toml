# PR-Agent project configuration for crabcc.
#
# Source of truth for all per-repo tuning. Values here override the
# upstream defaults in:
#   https://github.com/The-PR-Agent/pr-agent/blob/main/pr_agent/settings/configuration.toml
#
# CLI usage (one-off, no GHA required):
#   pip install pr-agent
#   export ANTHROPIC_API_KEY=your_key_here
#   pr-agent --pr_url https://github.com/peterlodri-sec/crabcc/pull/123 review

[config]
model = "claude-sonnet-4-6"
fallback_models = ["claude-haiku-4-5-20251001"]
git_provider = "github"
max_model_tokens = 32000
temperature = 0.2

# Compression strategy — clips oversized diffs instead of truncating whole
# files. Keeps context relevant on large Rust refactors (500+ line diffs).
# See: https://docs.pr-agent.ai/core-abilities/compression_strategy/
large_patch_policy = "clip"
patch_extra_lines_before = 4
patch_extra_lines_after = 2

[pr_reviewer]
require_score_review = false
require_tests_review = true
require_security_review = true
num_max_findings = 5
persistent_comment = true
enable_review_labels_security = true
enable_review_labels_effort = true

extra_instructions = """
This is a Rust workspace (crabcc — symbol index + call-graph for AI coding agents).

Focus on:
- Memory safety, lifetime issues, and unsafe blocks
- SQLite schema migrations: must be strictly additive (no DROP COLUMN, no RENAME without
  backward-compat alias). New columns require idempotent ALTER TABLE in Store::open.
- Serialized API surface: Rust structs in crabcc-viz/src/{forge,git_analytics}.rs must
  stay in sync with openapi.yaml and crates/crabcc-viz/web/src/api.ts.
- tiny_http is sync/threaded — flag any async/blocking code mixing.
- crabcc-viz is excluded from the workspace Cargo.toml; changes there need
  separate `cargo check` in crates/crabcc-viz/.
- Performance: single-pass git log patterns, bounded query limits (MAX_DEPTH,
  MAX_NODES, FILES_PAGE_LIMIT).

Skip:
- Style nits that `cargo fmt` / `cargo clippy -D warnings` already enforce.
- Trivial whitespace or import ordering.
"""

[pr_code_suggestions]
focus_only_on_problems = true
suggestions_score_threshold = 6
num_code_suggestions_per_chunk = 3
max_number_of_calls = 3
persistent_comment = true
commitable_code_suggestions = false

[pr_description]
publish_labels = true
add_original_user_description = true
generate_ai_title = false
use_bullet_points = true
enable_pr_diagram = true
collapsible_file_list = "adaptive"

[github_action_config]
# auto_review / auto_describe are set in the workflow env so they can be
# toggled per-repo-environment without a toml edit. Kept here for visibility.
auto_review = "true"
auto_describe = "true"
auto_improve = "false"
