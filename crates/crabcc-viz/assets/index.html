<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="referrer" content="no-referrer">
<meta name="color-scheme" content="light dark">
<title>crabcc · live call-graph</title>
<style>
  :root {
    color-scheme: light dark;
    --bg:        #fafafa;
    --fg:        #1a1a1a;
    --muted:     #6a6a6a;
    --panel:     #ffffff;
    --border:    #e3e3e3;
    --accent:    #d35400;
    --node:      #2c3e50;
    --node-root: #d35400;
    --edge:      #b8b8b8;
    --hover-bg:  #fff7e6;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:        #0e0e10;
      --fg:        #e8e8e8;
      --muted:     #8a8a8a;
      --panel:     #161618;
      --border:    #2a2a2c;
      --accent:    #ff8c42;
      --node:      #e8e8e8;
      --node-root: #ff8c42;
      --edge:      #4a4a4c;
      --hover-bg:  #2a1f10;
    }
  }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--fg);
    font: 13px/1.4 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    display: flex; flex-direction: column;
  }
  header {
    display: flex; gap: 12px; align-items: center;
    padding: 8px 14px; border-bottom: 1px solid var(--border);
    background: var(--panel); flex-wrap: wrap;
  }
  header .brand { font-weight: 600; color: var(--accent); margin-right: 6px; }
  header label { color: var(--muted); display: inline-flex; gap: 4px; align-items: center; }
  header input, header select, header button {
    font: inherit; color: var(--fg); background: var(--bg);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 3px 6px;
  }
  header input[type=text] { width: 220px; }
  header input[type=number] { width: 56px; }
  header button { cursor: pointer; }
  header button:hover { border-color: var(--accent); color: var(--accent); }
  header .status { color: var(--muted); margin-left: auto; }
  main { flex: 1; position: relative; overflow: hidden; }
  canvas { display: block; width: 100%; height: 100%; cursor: grab; }
  canvas.dragging { cursor: grabbing; }
  #tooltip {
    position: absolute; pointer-events: none;
    background: var(--hover-bg); color: var(--fg);
    border: 1px solid var(--accent); border-radius: 4px;
    padding: 4px 8px; font-size: 12px;
    max-width: 360px; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
    box-shadow: 0 2px 8px rgba(0,0,0,.18);
    transform: translate(8px, 8px);
    display: none;
  }
  #empty {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); pointer-events: none; text-align: center;
    padding: 0 20px;
  }
  #empty.hidden { display: none; }
  #empty kbd {
    background: var(--panel); border: 1px solid var(--border); border-radius: 3px;
    padding: 1px 5px; font-size: 11px;
  }
</style>
</head>
<body>
<header>
  <span class="brand">crabcc</span>
  <label>root <input id="root" type="text" placeholder="Symbol name" value=""></label>
  <label>dir
    <select id="dir">
      <option value="callers">callers</option>
      <option value="callees">callees</option>
    </select>
  </label>
  <label>depth <input id="depth" type="number" min="1" max="6" value="2"></label>
  <button id="go">load</button>
  <span class="status" id="status">enter a symbol and press <kbd>load</kbd></span>
</header>
<main>
  <canvas id="graph"></canvas>
  <div id="tooltip"></div>
  <div id="empty">No graph yet — type a symbol name above and press <kbd>load</kbd>.</div>
</main>
<script>
(() => {
  "use strict";

  const canvas  = document.getElementById("graph");
  const ctx     = canvas.getContext("2d");
  const tooltip = document.getElementById("tooltip");
  const status  = document.getElementById("status");
  const empty   = document.getElementById("empty");

  let nodes = [];   // { id, depth, x, y, vx, vy, fx, fy, root }
  let edges = [];   // { src, dst }

  const view = { tx: 0, ty: 0, scale: 1 };
  let dragging = null;     // dragged node, or null
  let panning  = false;
  let panStart = null;
  let hoverIdx = -1;

  function resize() {
    const dpr = window.devicePixelRatio || 1;
    const w = canvas.clientWidth, h = canvas.clientHeight;
    canvas.width  = Math.round(w * dpr);
    canvas.height = Math.round(h * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    draw();
  }
  window.addEventListener("resize", resize);

  // Force-directed layout — simple Eades-style spring + repulsion. Runs on
  // requestAnimationFrame; cools as kinetic energy drops below an epsilon.
  function step() {
    if (!nodes.length) return;
    const w = canvas.clientWidth, h = canvas.clientHeight;
    const cx = w / 2, cy = h / 2;
    const REPULSE = 6500, SPRING = 0.04, REST_LEN = 110, DAMP = 0.78, CENTER = 0.012;

    for (const a of nodes) {
      if (a.fx != null) continue;
      let fx = (cx - a.x) * CENTER, fy = (cy - a.y) * CENTER;
      for (const b of nodes) {
        if (a === b) continue;
        const dx = a.x - b.x, dy = a.y - b.y;
        const d2 = Math.max(dx * dx + dy * dy, 100);
        const d  = Math.sqrt(d2);
        const f  = REPULSE / d2;
        fx += (dx / d) * f;
        fy += (dy / d) * f;
      }
      a._fx = fx; a._fy = fy;
    }
    for (const e of edges) {
      const a = nodes[e.src], b = nodes[e.dst];
      const dx = b.x - a.x, dy = b.y - a.y;
      const d  = Math.sqrt(dx * dx + dy * dy) || 1;
      const f  = SPRING * (d - REST_LEN);
      const ux = dx / d, uy = dy / d;
      if (a.fx == null) { a._fx += ux * f; a._fy += uy * f; }
      if (b.fx == null) { b._fx -= ux * f; b._fy -= uy * f; }
    }
    let energy = 0;
    for (const a of nodes) {
      if (a.fx != null) { a.x = a.fx; a.y = a.fy; continue; }
      a.vx = (a.vx + a._fx) * DAMP;
      a.vy = (a.vy + a._fy) * DAMP;
      a.x += a.vx; a.y += a.vy;
      energy += a.vx * a.vx + a.vy * a.vy;
    }
    draw();
    if (energy > 0.5 || dragging) requestAnimationFrame(step);
  }

  function draw() {
    const w = canvas.clientWidth, h = canvas.clientHeight;
    ctx.save();
    ctx.clearRect(0, 0, w, h);
    ctx.translate(view.tx, view.ty);
    ctx.scale(view.scale, view.scale);

    const cs = getComputedStyle(document.documentElement);
    const edgeColor = cs.getPropertyValue("--edge").trim() || "#b8b8b8";
    const nodeColor = cs.getPropertyValue("--node").trim() || "#2c3e50";
    const rootColor = cs.getPropertyValue("--node-root").trim() || "#d35400";
    const fg        = cs.getPropertyValue("--fg").trim() || "#1a1a1a";

    ctx.strokeStyle = edgeColor;
    ctx.lineWidth = 1.2;
    for (const e of edges) {
      const a = nodes[e.src], b = nodes[e.dst];
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.stroke();
      // Arrow head
      const dx = b.x - a.x, dy = b.y - a.y;
      const d  = Math.sqrt(dx * dx + dy * dy) || 1;
      const ux = dx / d, uy = dy / d;
      const ax = b.x - ux * 16, ay = b.y - uy * 16;
      const px = -uy, py = ux;
      ctx.beginPath();
      ctx.moveTo(ax + px * 4, ay + py * 4);
      ctx.lineTo(b.x - ux * 9, b.y - uy * 9);
      ctx.lineTo(ax - px * 4, ay - py * 4);
      ctx.stroke();
    }

    ctx.font = "12px ui-monospace, Menlo, Consolas, monospace";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    for (let i = 0; i < nodes.length; i++) {
      const n = nodes[i];
      ctx.beginPath();
      ctx.fillStyle = n.root ? rootColor : nodeColor;
      ctx.arc(n.x, n.y, n.root ? 9 : 6, 0, Math.PI * 2);
      ctx.fill();
      if (i === hoverIdx) {
        ctx.strokeStyle = rootColor; ctx.lineWidth = 2;
        ctx.stroke();
      }
      const label = n.id.length > 32 ? n.id.slice(0, 30) + "…" : n.id;
      ctx.fillStyle = fg;
      ctx.fillText(label, n.x, n.y + (n.root ? 22 : 18));
    }
    ctx.restore();
  }

  function nodeAt(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const x = (clientX - rect.left - view.tx) / view.scale;
    const y = (clientY - rect.top  - view.ty) / view.scale;
    for (let i = nodes.length - 1; i >= 0; i--) {
      const n = nodes[i];
      const r = n.root ? 9 : 6;
      const dx = x - n.x, dy = y - n.y;
      if (dx * dx + dy * dy <= (r + 4) * (r + 4)) return i;
    }
    return -1;
  }

  canvas.addEventListener("mousedown", (e) => {
    const idx = nodeAt(e.clientX, e.clientY);
    if (idx >= 0) {
      dragging = nodes[idx];
      const rect = canvas.getBoundingClientRect();
      dragging.fx = (e.clientX - rect.left - view.tx) / view.scale;
      dragging.fy = (e.clientY - rect.top  - view.ty) / view.scale;
      requestAnimationFrame(step);
    } else {
      panning = true;
      panStart = { x: e.clientX - view.tx, y: e.clientY - view.ty };
      canvas.classList.add("dragging");
    }
  });
  window.addEventListener("mousemove", (e) => {
    if (dragging) {
      const rect = canvas.getBoundingClientRect();
      dragging.fx = (e.clientX - rect.left - view.tx) / view.scale;
      dragging.fy = (e.clientY - rect.top  - view.ty) / view.scale;
      return;
    }
    if (panning) {
      view.tx = e.clientX - panStart.x;
      view.ty = e.clientY - panStart.y;
      draw();
      return;
    }
    const idx = nodeAt(e.clientX, e.clientY);
    if (idx !== hoverIdx) {
      hoverIdx = idx;
      draw();
    }
    if (idx >= 0) {
      const n = nodes[idx];
      tooltip.style.display = "block";
      tooltip.style.left = e.clientX + "px";
      tooltip.style.top  = e.clientY + "px";
      tooltip.textContent = `${n.id} · depth ${n.depth}`;
    } else {
      tooltip.style.display = "none";
    }
  });
  window.addEventListener("mouseup", () => {
    if (dragging) { dragging.fx = null; dragging.fy = null; dragging = null; }
    panning = false;
    canvas.classList.remove("dragging");
  });
  canvas.addEventListener("wheel", (e) => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const k  = Math.exp(-e.deltaY * 0.0015);
    const next = Math.max(0.2, Math.min(4, view.scale * k));
    const ratio = next / view.scale;
    view.tx = mx - (mx - view.tx) * ratio;
    view.ty = my - (my - view.ty) * ratio;
    view.scale = next;
    draw();
  }, { passive: false });

  async function load() {
    const root  = document.getElementById("root").value.trim();
    const dir   = document.getElementById("dir").value;
    const depth = document.getElementById("depth").value;
    if (!root) { status.textContent = "enter a symbol name"; return; }
    status.textContent = `loading ${dir} of "${root}" depth=${depth}…`;
    empty.classList.add("hidden");
    const url = `/api/graph?root=${encodeURIComponent(root)}&dir=${dir}&depth=${depth}`;
    try {
      const r = await fetch(url, { headers: { Accept: "application/json" } });
      if (!r.ok) throw new Error(await r.text());
      const j = await r.json();
      buildLayout(j);
      status.textContent = `${j.nodes.length} nodes · ${j.edges.length} edges`;
    } catch (e) {
      status.textContent = `error: ${e.message || e}`;
    }
  }

  function buildLayout(g) {
    const w = canvas.clientWidth, h = canvas.clientHeight;
    const idx = new Map();
    nodes = g.nodes.map((n, i) => {
      idx.set(n.id, i);
      const ang = (i / Math.max(1, g.nodes.length)) * Math.PI * 2;
      const r   = n.depth === 0 ? 0 : 80 + n.depth * 70;
      return {
        ...n,
        x: w / 2 + Math.cos(ang) * r + (Math.random() - 0.5) * 30,
        y: h / 2 + Math.sin(ang) * r + (Math.random() - 0.5) * 30,
        vx: 0, vy: 0, fx: null, fy: null,
        root: n.depth === 0,
      };
    });
    edges = g.edges.map(e => ({ src: idx.get(e.src), dst: idx.get(e.dst) }))
                   .filter(e => e.src != null && e.dst != null);
    requestAnimationFrame(step);
  }

  document.getElementById("go").addEventListener("click", load);
  document.getElementById("root").addEventListener("keydown", (e) => {
    if (e.key === "Enter") load();
  });

  // Pre-fill from ?root=…&dir=…&depth=… in the URL.
  const params = new URLSearchParams(location.search);
  if (params.has("root"))  document.getElementById("root").value  = params.get("root");
  if (params.has("dir"))   document.getElementById("dir").value   = params.get("dir");
  if (params.has("depth")) document.getElementById("depth").value = params.get("depth");

  resize();
  if (params.has("root")) load();
})();
</script>
</body>
</html>
