<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>crabcc-mcp · admin</title>
<style>
  :root {
    --bg:        #0e0e10;
    --card:      #161618;
    --border:    #2a2a2e;
    --text:      #c4c4c8;
    --dim:       #6b6b72;
    --accent:    #ff8c42;
    --green:     #4ade80;
    --red:       #f87171;
    --amber:     #fbbf24;
    --font:      'JetBrains Mono', 'SF Mono', 'Cascadia Code', monospace;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--font);
    font-size:13px;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  header{
    border-bottom:1px solid var(--border);
    padding:16px 24px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:var(--card);
  }
  header h1{
    font-size:15px;
    font-weight:800;
    color:var(--accent);
    letter-spacing:-0.02em;
  }
  header .meta{
    color:var(--dim);
    font-size:12px;
  }
  main{
    padding:24px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
    gap:16px;
  }
  .card{
    background:var(--card);
    border:1px solid var(--border);
    padding:16px;
  }
  .card h2{
    font-size:12px;
    font-weight:800;
    color:var(--accent);
    text-transform:uppercase;
    letter-spacing:0.06em;
    margin-bottom:12px;
  }
  .kv{
    display:grid;
    grid-template-columns:auto 1fr;
    gap:4px 16px;
  }
  .kv .k{color:var(--dim)}
  .kv .v{text-align:right;font-weight:600}
  .bar{
    height:8px;
    background:var(--border);
    margin-top:4px;
  }
  .bar-fill{
    height:100%;
    background:var(--accent);
    transition:width .3s;
  }
  .bar-fill.warn{background:var(--amber)}
  .bar-fill.full{background:var(--red)}
  table{
    width:100%;
    border-collapse:collapse;
    font-size:12px;
  }
  th,td{
    padding:4px 8px;
    text-align:left;
    border-bottom:1px solid var(--border);
  }
  th{color:var(--dim);font-weight:600;font-size:11px;text-transform:uppercase}
  td{white-space:nowrap}
  .status-ok{color:var(--green)}
  .status-error{color:var(--red)}
  .elapsed{color:var(--dim)}
  .pulse{animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .footer{
    padding:12px 24px;
    border-top:1px solid var(--border);
    color:var(--dim);
    font-size:11px;
    text-align:center;
  }
  .empty{color:var(--dim);font-style:italic;padding:8px 0}
</style>
</head>
<body>
<header>
  <h1>🦀 crabcc-mcp</h1>
  <span class="meta" id="uptime">—</span>
</header>
<main>
  <div class="card">
    <h2>Server</h2>
    <div class="kv" id="server-info"></div>
  </div>
  <div class="card">
    <h2>Rate Limits</h2>
    <div id="rate-limits"></div>
  </div>
  <div class="card" style="grid-column:1/-1">
    <h2>Recent Requests</h2>
    <div id="history"></div>
  </div>
</main>
<div class="footer">localhost-only · no external binding · <span id="poll-status" class="pulse">●</span> live</div>
<script>
const STATS_URL = '/stats';
const POLL_MS = 5000;

function fmt(n){return n.toLocaleString()}
function ago(ts){
  const s=Math.floor(Date.now()/1000)-ts;
  if(s<60)return s+'s ago';
  if(s<3600)return Math.floor(s/60)+'m ago';
  if(s<86400)return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}
function uptime(s){
  const h=Math.floor(s/3600),m=Math.floor(s%3600/60),sec=s%60;
  return `${h}h ${m}m ${sec}s`;
}

function render(data){
  document.getElementById('uptime').textContent='up '+uptime(data.uptime_seconds);

  // Server info
  document.getElementById('server-info').innerHTML=
    `<span class="k">cache entries</span><span class="v">${fmt(data.cache_entries)}</span>`+
    `<span class="k">max body</span><span class="v">${fmt(data.config.max_body_size)} bytes</span>`+
    `<span class="k">cache TTL</span><span class="v">${data.config.cache_ttl_seconds}s</span>`+
    `<span class="k">rate window</span><span class="v">${data.config.rate_limit_window_hours}h</span>`;

  // Rate limits
  const rl=data.rate_limits||[];
  if(!rl.length){
    document.getElementById('rate-limits').innerHTML='<div class="empty">no rate-limit activity yet</div>';
  }else{
    let html='';
    rl.forEach(r=>{
      const pct=r.used/r.max*100;
      let cls='';
      if(pct>=100)cls='full';
      else if(pct>=60)cls='warn';
      html+=`<div style="margin-bottom:12px">`+
        `<div style="display:flex;justify-content:space-between;margin-bottom:2px">`+
          `<span style="font-size:11px;color:var(--dim)">${r.token_hash}</span>`+
          `<span style="font-weight:600">${r.used}/${r.max}</span>`+
        `</div>`+
        `<div class="bar"><div class="bar-fill ${cls}" style="width:${Math.min(pct,100)}%"></div></div>`+
      `</div>`;
    });
    document.getElementById('rate-limits').innerHTML=html;
  }

  // History
  const hist=data.recent_history||[];
  if(!hist.length){
    document.getElementById('history').innerHTML='<div class="empty">no requests yet</div>';
  }else{
    let rows=hist.map(h=>
      `<tr>`+
        `<td>${h.tool}</td>`+
        `<td class="status-${h.status==='ok'?'ok':'error'}">${h.status}</td>`+
        `<td class="elapsed">${h.elapsed_ms}ms</td>`+
        `<td>${fmt(h.payload_size)}b</td>`+
        `<td class="elapsed">${ago(h.created_at)}</td>`+
      `</tr>`
    ).join('');
    document.getElementById('history').innerHTML=
      `<table><thead><tr><th>tool</th><th>status</th><th>latency</th><th>size</th><th>when</th></tr></thead><tbody>${rows}</tbody></table>`;
  }
}

function poll(){
  fetch(STATS_URL)
    .then(r=>r.json())
    .then(data=>{
      render(data);
      document.getElementById('poll-status').style.color='var(--green)';
    })
    .catch(()=>{
      document.getElementById('poll-status').style.color='var(--red)';
    });
}

poll();
setInterval(poll,POLL_MS);
</script>
</body>
</html>
