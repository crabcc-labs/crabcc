id = "crabcc"
name = "crabcc (ucracc-lsp)"
version = "0.1.0"
schema_version = 1
authors = ["crabcc-labs"]
description = "AI-first navigation + retrieval LSP backed by the crabcc symbol DB. Runs alongside rust-analyzer / pyright / gopls — instant cold start, sub-10 µs hover/definition, repo-wide workspace symbols, and memory/web-fetch/rerank execute-commands for agents."
repository = "https://github.com/crabcc-labs/crabcc"

# `ucracc-lsp` is a *navigation + retrieval* server. It does not do
# diagnostics, completion, formatting, or rename — those stay with the
# semantic server for each language. Zed merges results from every server
# bound to a language, so listing the same languages a semantic server
# already owns is intentional: ucracc-lsp adds repo-wide symbol search and
# call-hierarchy on top, it doesn't replace anything.
[language_servers.ucracc-lsp]
name = "ucracc-lsp"
languages = [
    "Rust",
    "TypeScript",
    "TSX",
    "JavaScript",
    "JSDoc",
    "Python",
    "Ruby",
    "Go",
    "Swift",
    "Java",
    "YAML",
    "Markdown",
]

# Map Zed's display names to the LSP `languageId` the server advertises in
# `SUPPORTED_LANGUAGE_IDS` (see crates/ucracc-lsp/src/lang.rs). Where Zed's
# name already matches the conventional LSP id we still list it so the
# mapping stays explicit and copy-paste-debuggable.
[language_servers.ucracc-lsp.language_ids]
"Rust" = "rust"
"TypeScript" = "typescript"
"TSX" = "typescriptreact"
"JavaScript" = "javascript"
"JSDoc" = "javascript"
"Python" = "python"
"Ruby" = "ruby"
"Go" = "go"
"Swift" = "swift"
"Java" = "java"
"YAML" = "yaml"
"Markdown" = "markdown"
