name: bench-opt-bin reminder

# Weekly "run or skip?" nudge for the binary-optimization sweep matrix
# (scripts/bench-opt-bin/sweep.py: target-cpu × allocator × PGO × BOLT + opt-z).
#
# The sweep is NOT a GitHub Actions workflow — it runs on an ad-hoc OVH box via
# scripts/bench-opt-bin/provision-ovh.sh (OpenStack), which spins the VM, runs
# the matrix, pulls results, and tears down. Discord incoming webhooks are
# post-only, so this can't collect a reply — it posts a prompt with the runbook
# link + the one-line invocation, and you decide whether to kick it off.
#
# ── Required secret ─────────────────────────────────────────────────────
#   DISCORD_WEBHOOK_URL   Discord incoming-webhook URL. If unset, the job
#                         no-ops (never fails) so the schedule stays quiet
#                         until you wire it up.
# ────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # Mondays 14:00 UTC
    - cron: "0 14 * * 1"
  workflow_dispatch: {}   # manual test trigger

permissions:
  contents: read

jobs:
  remind:
    runs-on: ubuntu-latest
    # Never run on forks.
    if: github.repository == 'crabcc-labs/crabcc'
    steps:
      - name: Post weekly Discord reminder
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RUNBOOK_URL: ${{ github.server_url }}/${{ github.repository }}/blob/main/scripts/bench-opt-bin/README.md
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
            echo "::notice::DISCORD_WEBHOOK_URL not set — skipping reminder."
            exit 0
          fi
          payload=$(cat <<JSON
          {
            "username": "crabcc bench",
            "embeds": [{
              "title": "⚙️ Weekly bench-opt-bin reminder — run or skip?",
              "description": "Run the Rust binary-optimization matrix this week?\n**target-cpu × allocator × PGO × BOLT** + opt-level=z.\n\n▶️ **Run:** \`source ~/ovh-openrc.sh && ./scripts/bench-opt-bin/provision-ovh.sh\` — spins an OVH box, runs the sweep, posts results, tears down. See the [runbook](${RUNBOOK_URL}).\n⏸️ **Skip:** ignore this message.",
              "color": 15233059,
              "fields": [
                { "name": "Last headline", "value": "snmalloc fastest (−2.8% index), opt-z smallest (52 MB). BOLT pending runtime-lib fix.", "inline": false }
              ],
              "footer": { "text": "Posts every Monday 14:00 UTC · silence = skip" }
            }]
          }
          JSON
          )
          code=$(curl -sS -o /tmp/resp -w '%{http_code}' \
            -H "Content-Type: application/json" \
            -d "${payload}" "${DISCORD_WEBHOOK_URL}")
          echo "Discord responded: ${code}"
          cat /tmp/resp || true
          # 2xx = delivered; anything else is a real failure worth surfacing.
          case "${code}" in 2*) ;; *) echo "::error::Discord webhook failed (${code})"; exit 1 ;; esac
