name: release-ucracc-lsp-image

# Builds + publishes the `ucracc-lsp` image to Docker Hub (private) and
# cosign-signs it, on each `ucracc-lsp-v*` tag.
#
# Secrets (configured): docker_user, docker_pat.
# Fast cloud builder (opt-in): set repo VARIABLE
#   DOCKER_BUILD_CLOUD_ENDPOINT = "<docker-org>/<builder>"
# (provision once: docker buildx create --driver cloud <org>/<builder>).
# Unset -> local buildx + QEMU. Signing keyless by default; COSIGN_PRIVATE_KEY
# + COSIGN_PASSWORD for key-based. See docs/COSIGN-SETUP.md.

on:
  push:
    tags: ['ucracc-lsp-v*']

permissions:
  contents: read
  id-token: write

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - id: check
        env:
          DOCKER_USER: ${{ secrets.docker_user }}
          DOCKER_PAT: ${{ secrets.docker_pat }}
        run: |
          if [ -n "$DOCKER_USER" ] && [ -n "$DOCKER_PAT" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=image publish skipped::Set docker_user + docker_pat."
          fi

  image:
    needs: preflight
    if: needs.preflight.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.docker_user }}
          password: ${{ secrets.docker_pat }}
      - name: set up Docker Build Cloud
        if: vars.DOCKER_BUILD_CLOUD_ENDPOINT != ''
        uses: docker/setup-buildx-action@v4
        with:
          driver: cloud
          endpoint: ${{ vars.DOCKER_BUILD_CLOUD_ENDPOINT }}
      - name: set up QEMU (fallback)
        if: vars.DOCKER_BUILD_CLOUD_ENDPOINT == ''
        uses: docker/setup-qemu-action@v4
      - name: set up local buildx (fallback)
        if: vars.DOCKER_BUILD_CLOUD_ENDPOINT == ''
        uses: docker/setup-buildx-action@v4
      - name: image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ vars.DOCKERHUB_IMAGE_UCRACC_LSP || format('{0}/ucracc-lsp', secrets.docker_user) }}
          tags: |
            type=match,pattern=ucracc-lsp-v(.*),group=1
            type=raw,value=latest
      - name: build + push (multi-arch)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: install/Dockerfile.ucracc-lsp
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
      - name: install cosign
        uses: sigstore/cosign-installer@v3
      - name: cosign sign image
        env:
          IMAGE: ${{ vars.DOCKERHUB_IMAGE_UCRACC_LSP || format('{0}/ucracc-lsp', secrets.docker_user) }}
          DIGEST: ${{ steps.build.outputs.digest }}
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          set -euo pipefail
          REF="${IMAGE}@${DIGEST}"
          if [ -n "${COSIGN_PRIVATE_KEY:-}" ]; then
            trap 'rm -f cosign.key' EXIT   # remove key even if signing fails
            printf '%s' "$COSIGN_PRIVATE_KEY" > cosign.key
            cosign sign --yes --key cosign.key "$REF"
          else
            cosign sign --yes "$REF"
          fi
          echo "::notice title=signed::$REF"
