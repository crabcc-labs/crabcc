name: CI

# PR CI is intentionally narrow: lint, plus tests for the crates the PR
# actually touches, plus a 3-command smoke E2E. The full matrix
# (Ubuntu + macOS, all workspace tests) runs on push to main and on tag
# (release.yml). PR-time goal is fast feedback, not exhaustive coverage.
on:
  push:
    branches: [main]
  pull_request:

# Cancel previous runs on the same ref. When a fixup commit lands on a PR
# before the prior run finishes, the prior run is killed — saves runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Wire sccache as the rustc wrapper. Without this `RUSTC_WRAPPER`,
  # `mozilla-actions/sccache-action` installs the binary and exports
  # `SCCACHE_PATH` but cargo never invokes it (we observed
  # `Compile requests 0` in run #25185569799). With it set, cargo
  # routes every rustc call through sccache and the second-build
  # cache hit rate jumps to ~95% on this workspace.
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"
  # Swatinem rust-cache requires `CARGO_INCREMENTAL=0` for cache
  # determinism — incremental fingerprints poison the cache key.
  CARGO_INCREMENTAL: 0
  # Linux-only mold linker — slashes link time on debug + ci profiles
  # for big workspaces (we have 567 deps). The flag is a no-op on
  # macOS jobs (the lld/zld fallback is fine there).
  CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: clang
  CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "-C link-arg=-fuse-ld=mold"

jobs:
  lint:
    name: lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Issue #87 — Pillar 3: need history for git-diff scoping.
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: mozilla-actions/sccache-action@v0.0.9

      # OS-only registry cache — never invalidates on Cargo.lock changes
      # (Swatinem caches per-lockfile; this layer stays warm across the
      # whole branch fleet and removes the `Updating crates.io index`
      # round-trip on cold runs).
      - name: cache cargo registry index
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-

      # mold linker — Apache-2.0, ~3-5x faster link than lld on big
      # debug + ci profile builds. Apt install is sub-second.
      - name: install mold linker
        run: sudo apt-get install -y --no-install-recommends mold

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-lint
          # Aggressive: save the cache on every branch (not just main) so
          # repeat PR pushes hit a warm target/, and persist even when
          # the lint job fails so the next attempt starts warm.
          save-if: "true"
          cache-on-failure: "true"
          cache-all-crates: "true"

      # Issue #87 — Pillar 3 (PR-only-changed-files CI). On PR, scope
      # clippy + aliases-smoke to changed crates / scripts. On push to
      # main, run everything (full belt-and-suspenders pre-release.yml).
      - name: detect changed scope
        id: scope
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            CHANGED=$(git diff --name-only "$BASE" "$HEAD")
            echo "changed files:"; echo "$CHANGED"
            CRATES=$(echo "$CHANGED" | awk -F/ '/^crates\// {print $2}' | sort -u)
            ARGS=""
            for c in $CRATES; do ARGS="$ARGS -p $c"; done
            echo "clippy_scope=$ARGS" >> "$GITHUB_OUTPUT"
            if echo "$CHANGED" | grep -qE '^scripts/(install-aliases|aliases-smoke)\.sh$'; then
              echo "aliases_smoke=1" >> "$GITHUB_OUTPUT"
            fi
            if [ -z "$CRATES" ]; then
              echo "::notice::No crate-level changes — skipping clippy"
            else
              echo "::notice::Clippy scope:$ARGS"
            fi
          else
            echo "clippy_scope=--workspace" >> "$GITHUB_OUTPUT"
            echo "aliases_smoke=1" >> "$GITHUB_OUTPUT"
          fi

      # fmt is workspace-wide unconditionally — sub-second; no value in scoping.
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      # Scoped clippy: PR runs only against changed crates; push-to-main
      # runs `--workspace`. Empty scope (docs-only PR) skips entirely.
      # `--all-targets` covers lib + bins + tests + examples + benches —
      # binary-only crates (e.g. crabcc-cli) reject `--lib`, so we can't
      # rely on `--lib --bins` here.
      - name: cargo clippy (scoped)
        if: steps.scope.outputs.clippy_scope != ''
        run: cargo clippy ${{ steps.scope.outputs.clippy_scope }} --all-targets -- -D warnings

      # Issue #81: shell-only smoke for scripts/install-aliases.sh.
      # Sub-second; asserts --aggressive verbs and idempotence.
      # PR runs only when the alias scripts changed; push-to-main always runs.
      - name: aliases-smoke
        if: steps.scope.outputs.aliases_smoke == '1'
        run: bash scripts/aliases-smoke.sh

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

  test:
    name: test (ubuntu, scoped)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need git history to diff PR head against base for crate scoping.
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      # OS-only registry cache — see lint-job comment above. Same key
      # is shared across both jobs intentionally (single registry
      # download warms both target/s).
      - name: cache cargo registry index
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-

      - name: install mold linker
        run: sudo apt-get install -y --no-install-recommends mold

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-ubuntu
          # Aggressive: save the cache on every branch (not just main).
          # PR re-pushes hit warm target/, the test job specifically
          # benefits — full workspace nextest is the longest CI step.
          save-if: "true"
          cache-on-failure: "true"
          cache-all-crates: "true"

      - name: install cargo-nextest (JUnit reporter)
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      # Scope policy:
      #   - push to main → full workspace (covers any cross-crate fallout)
      #   - PR → only the crates touched by the diff. Faster feedback, and
      #     anything we'd miss is caught by the post-merge run on main.
      #   - PR with no crate changes (docs/CI only) → skip nextest entirely.
      - name: detect changed crates
        id: scope
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            CHANGED=$(git diff --name-only "$BASE" "$HEAD")
            echo "changed files:"
            echo "$CHANGED"
            CRATES=$(echo "$CHANGED" | awk -F/ '/^crates\// {print $2}' | sort -u)
            if [ -z "$CRATES" ]; then
              echo "scope=" >> "$GITHUB_OUTPUT"
              echo "::notice::No crate-level changes — skipping nextest + smoke"
            else
              ARGS=""
              for c in $CRATES; do ARGS="$ARGS -p $c"; done
              # shellcheck disable=SC2086
              echo "scope=$ARGS" >> "$GITHUB_OUTPUT"
              echo "::notice::Test scope:$ARGS"
            fi
            # Issue #87 — Pillar 3: smoke runs only when crabcc-cli or
            # crabcc-core changed (it exercises the release CLI binary).
            if echo "$CHANGED" | grep -qE '^crates/(crabcc-cli|crabcc-core)/'; then
              echo "smoke=1" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "scope=--workspace" >> "$GITHUB_OUTPUT"
            echo "smoke=1" >> "$GITHUB_OUTPUT"
          fi

      - name: cargo nextest (scoped)
        if: steps.scope.outputs.scope != ''
        run: cargo nextest run ${{ steps.scope.outputs.scope }} --profile ci

      - name: upload test report (JUnit XML)
        if: always() && steps.scope.outputs.scope != ''
        uses: actions/upload-artifact@v4
        with:
          name: junit-ubuntu
          path: target/nextest/ci/junit.xml
          if-no-files-found: warn
          retention-days: 30

      # nextest compiles in test mode; the smoke step exercises the release
      # binary so end-users hit the same path. Build it explicitly here.
      # `continue-on-error: true` keeps these from gating CI / future releases
      # — the 150+ unit tests already cover correctness. Smoke is a signal
      # only.
      - name: build release binary for smoke test
        if: steps.scope.outputs.smoke == '1'
        continue-on-error: true
        run: cargo build --release -p crabcc-cli

      # Trimmed smoke set: index → sym → callers. Covers the hot path that
      # 99% of agent traffic hits. The fuller set (outline / files / prefix /
      # watch) ran in v1 CI; those are unit-tested and reproven on push-to-main.
      # `continue-on-error: true` keeps smoke informational — the 200+ unit
      # tests already cover correctness.
      - name: smoke — index + sym + callers
        if: steps.scope.outputs.smoke == '1'
        continue-on-error: true
        shell: bash
        run: |
          set -e
          FIXTURE=$(mktemp -d)
          cd "$FIXTURE"
          cat > a.ts <<'EOF'
          export function hello(name: string) { return name; }
          hello("world");
          EOF
          BIN="$GITHUB_WORKSPACE/target/release/crabcc"
          "$BIN" index
          "$BIN" sym hello | jq -e '.[0].name == "hello"'
          "$BIN" callers hello --count | jq -e '.count >= 1'

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true
