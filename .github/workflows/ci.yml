name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-${{ matrix.os }}

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: install cargo-nextest (JUnit reporter)
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: cargo nextest (with JUnit report)
        run: |
          cargo nextest run --workspace --profile ci

      - name: upload test report (JUnit XML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-${{ matrix.os }}
          path: target/nextest/ci/junit.xml
          if-no-files-found: warn
          retention-days: 30

      - name: smoke — index + query a small fixture
        shell: bash
        run: |
          mkdir -p /tmp/fixture && cd /tmp/fixture
          cat > a.ts <<'EOF'
          export function hello(name: string) { return name; }
          hello("world");
          EOF
          "$GITHUB_WORKSPACE/target/release/crabcc" index
          "$GITHUB_WORKSPACE/target/release/crabcc" sym hello | jq -e '.[0].name == "hello"'
          "$GITHUB_WORKSPACE/target/release/crabcc" callers hello --count | jq -e '.count >= 1'
