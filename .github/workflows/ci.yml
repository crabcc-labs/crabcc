name: CI

# PR CI is intentionally narrow: lint, plus tests for the crates the PR
# actually touches, plus a 3-command smoke E2E. The full matrix
# (Ubuntu + macOS, all workspace tests) runs on push to main and on tag
# (release.yml). PR-time goal is fast feedback, not exhaustive coverage.
on:
  push:
    branches: [main]
  pull_request:

# Cancel previous runs on the same ref. When a fixup commit lands on a PR
# before the prior run finishes, the prior run is killed — saves runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Wire sccache as the rustc wrapper. Without this `RUSTC_WRAPPER`,
  # `mozilla-actions/sccache-action` installs the binary and exports
  # `SCCACHE_PATH` but cargo never invokes it (we observed
  # `Compile requests 0` in run #25185569799). With it set, cargo
  # routes every rustc call through sccache and the second-build
  # cache hit rate jumps to ~95% on this workspace.
  #
  # Note: rust-cache and sccache are complementary, not redundant —
  # rust-cache stores the dependency `target/` + `~/.cargo` blobs as
  # a single GHA artifact (one big restore at job start); sccache
  # caches per-source-hash rustc output via the GHA cache backend
  # (lookups during compile). Together they hit both warm-restart
  # and warm-incremental scenarios.
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"
  # CARGO_INCREMENTAL is intentionally NOT set here — `Swatinem/rust-cache`
  # sets `CARGO_INCREMENTAL=0` itself (per its README's Cache Details
  # section), and explicit env-vars added at the workflow level become
  # part of rust-cache's env-vars cache key (default prefixes: CARGO,
  # CC, CFLAGS, CXX, CMAKE, RUST). Setting it here would slightly
  # destabilize the key without changing behavior.
  #
  # CC=cc ensures build scripts use the system C compiler consistently.
  # Combined with the wild linker below this is the standard cc-driver
  # + fast-linker pairing (same as the mold pattern but wild is a
  # pure-Rust linker installed via cargo, so it travels in ~/.cargo/bin
  # and is automatically warmed by rust-cache with no apt dependency).
  CC: cc
  # Linux-only wild linker — pure-Rust drop-in for GNU ld, comparable
  # to mold in link-time savings (~3-5x on this workspace). Installed
  # once via `cargo install wild --locked` and cached by rust-cache;
  # no apt dependency.  The flag is a no-op on macOS jobs.
  CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: cc
  CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "-C link-arg=-fuse-ld=wild"

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: ""  # override global; cargo fmt never invokes rustc
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  lint:
    name: lint (clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # fetch-depth 0 only needed on PRs to diff HEAD against base;
          # push-to-main always runs --workspace so depth 1 is enough.
          fetch-depth: ${{ github.event_name == 'pull_request' && 0 || 1 }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: mozilla-actions/sccache-action@v0.0.10

      # rust-cache caches `~/.cargo` (registry index + cache + git
      # deps) AND `target/` keyed off Cargo.lock + rustc + env-var
      # hashes. `~/.cargo/bin` is included so the wild linker binary
      # (installed below) and other cargo-installed tools persist
      # across runs without re-compilation.
      - uses: Swatinem/rust-cache@v2
        with:
          # Bump prefix-key (e.g. v1 → v2) to force-clear the cache when
          # the toolchain or profile set changes and the old entry would
          # otherwise cause subtle cache-poisoning failures.
          prefix-key: "v1"
          shared-key: ci-lint
          cache-on-failure: "true"
          cache-all-crates: "true"
          # Don't write a new cache entry for cancelled runs — the partial
          # target/ would poison the next warm start.
          save-if: ${{ !cancelled() }}
          # Persist cargo-installed binaries (wild, sccache, nextest).
          cache-directories: ~/.cargo/bin

      # wild linker — pure-Rust, no apt dependency; travels in
      # ~/.cargo/bin which is warmed by rust-cache above. First run
      # compiles + caches; every subsequent run restores in <1s.
      - name: install wild linker
        run: command -v wild || cargo install wild --locked

      # Issue #87 — Pillar 3 (PR-only-changed-files CI). On PR, scope
      # clippy + aliases-smoke to changed crates / scripts. On push to
      # main, run everything (full belt-and-suspenders pre-release.yml).
      #
      # Scoped crates are filtered through `cargo metadata --no-deps`
      # so we never emit `-p <name>` for crates that live under
      # `crates/` but are deliberately excluded from the parent
      # workspace (e.g. crabcc-desktop carries its own gpui/zed
      # toolchain and a private Cargo.lock — see its Cargo.toml header
      # for the rationale). Without this filter `cargo clippy -p
      # crabcc-desktop` from the workspace root errors with "package
      # ID specification did not match any packages".
      - name: detect changed scope
        id: scope
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            CHANGED=$(git diff --name-only "$BASE" "$HEAD")
            echo "changed files:"; echo "$CHANGED"
            RAW_CRATES=$(echo "$CHANGED" | awk -F/ '/^crates\// {print $2}' | sort -u)
            WORKSPACE_CRATES=$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[].name')
            CRATES=$(echo "$RAW_CRATES" | grep -Fxf <(echo "$WORKSPACE_CRATES") || true)
            DROPPED=$(echo "$RAW_CRATES" | grep -Fvxf <(echo "$WORKSPACE_CRATES") || true)
            if [ -n "$DROPPED" ]; then
              echo "::notice::Dropped non-workspace crates from scope: $(echo $DROPPED | tr '\n' ' ')"
            fi
            ARGS=""
            for c in $CRATES; do ARGS="$ARGS -p $c"; done
            echo "clippy_scope=$ARGS" >> "$GITHUB_OUTPUT"
            if echo "$CHANGED" | grep -qE '^scripts/(install-aliases|aliases-smoke)\.sh$'; then
              echo "aliases_smoke=1" >> "$GITHUB_OUTPUT"
            fi
            if [ -z "$CRATES" ]; then
              echo "::notice::No workspace-crate changes — skipping clippy"
            else
              echo "::notice::Clippy scope:$ARGS"
            fi
          else
            echo "clippy_scope=--workspace" >> "$GITHUB_OUTPUT"
            echo "aliases_smoke=1" >> "$GITHUB_OUTPUT"
          fi

      # Scoped clippy: PR runs only against changed crates; push-to-main
      # runs `--workspace`. Empty scope (docs-only PR) skips entirely.
      # `--all-targets` covers lib + bins + tests + examples + benches —
      # binary-only crates (e.g. crabcc-cli) reject `--lib`, so we can't
      # rely on `--lib --bins` here.
      - name: cargo clippy (scoped)
        if: steps.scope.outputs.clippy_scope != ''
        run: cargo clippy ${{ steps.scope.outputs.clippy_scope }} --all-targets -- -D warnings

      # Issue #81: shell-only smoke for scripts/install-aliases.sh.
      # Sub-second; asserts --aggressive verbs and idempotence.
      # PR runs only when the alias scripts changed; push-to-main always runs.
      - name: aliases-smoke
        if: steps.scope.outputs.aliases_smoke == '1'
        run: bash scripts/aliases-smoke.sh

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

  test:
    name: test (ubuntu, scoped)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # fetch-depth 0 only needed on PRs to diff HEAD against base;
          # push-to-main always runs --workspace so depth 1 is enough.
          fetch-depth: ${{ github.event_name == 'pull_request' && 0 || 1 }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.10

      # `ci-ubuntu` key is distinct from `ci-lint` — different feature
      # flags + RUSTFLAGS between clippy and nextest would poison a
      # shared target/. ~/.cargo/bin cached here warmed wild + nextest.
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1"
          shared-key: ci-ubuntu
          cache-on-failure: "true"
          cache-all-crates: "true"
          save-if: ${{ !cancelled() }}
          cache-directories: ~/.cargo/bin

      - name: install wild linker
        run: command -v wild || cargo install wild --locked

      - name: install cargo-nextest (JUnit reporter)
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      # Scope policy:
      #   - push to main → full workspace (covers any cross-crate fallout)
      #   - PR → only the crates touched by the diff. Faster feedback, and
      #     anything we'd miss is caught by the post-merge run on main.
      #   - PR with no crate changes (docs/CI only) → skip nextest entirely.
      # Same workspace-member filter as the lint job — see comment there
      # for rationale. crates/ paths that aren't workspace members
      # (e.g. crabcc-desktop) are dropped before nextest sees them.
      - name: detect changed crates
        id: scope
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            CHANGED=$(git diff --name-only "$BASE" "$HEAD")
            echo "changed files:"
            echo "$CHANGED"
            RAW_CRATES=$(echo "$CHANGED" | awk -F/ '/^crates\// {print $2}' | sort -u)
            WORKSPACE_CRATES=$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[].name')
            CRATES=$(echo "$RAW_CRATES" | grep -Fxf <(echo "$WORKSPACE_CRATES") || true)
            DROPPED=$(echo "$RAW_CRATES" | grep -Fvxf <(echo "$WORKSPACE_CRATES") || true)
            if [ -n "$DROPPED" ]; then
              echo "::notice::Dropped non-workspace crates from scope: $(echo $DROPPED | tr '\n' ' ')"
            fi
            if [ -z "$CRATES" ]; then
              echo "scope=" >> "$GITHUB_OUTPUT"
              echo "::notice::No workspace-crate changes — skipping nextest + smoke"
            else
              ARGS=""
              for c in $CRATES; do ARGS="$ARGS -p $c"; done
              # shellcheck disable=SC2086
              echo "scope=$ARGS" >> "$GITHUB_OUTPUT"
              echo "::notice::Test scope:$ARGS"
            fi
            # Issue #87 — Pillar 3: smoke runs only when crabcc-cli or
            # crabcc-core changed (it exercises the release CLI binary).
            if echo "$CHANGED" | grep -qE '^crates/(crabcc-cli|crabcc-core)/'; then
              echo "smoke=1" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "scope=--workspace" >> "$GITHUB_OUTPUT"
            echo "smoke=1" >> "$GITHUB_OUTPUT"
          fi

      - name: cargo nextest (scoped)
        if: steps.scope.outputs.scope != ''
        run: cargo nextest run ${{ steps.scope.outputs.scope }} --profile ci

      - name: upload test report (JUnit XML)
        if: always() && steps.scope.outputs.scope != ''
        uses: actions/upload-artifact@v4
        with:
          name: junit-ubuntu
          path: target/nextest/ci/junit.xml
          if-no-files-found: warn
          retention-days: 30

      # nextest compiles in test mode; the smoke step exercises the CLI binary.
      # Dev profile is fast to build (no LTO) and sufficient for correctness
      # smoke — we're not benchmarking here. `continue-on-error: true` keeps
      # smoke informational; the 150+ unit tests gate correctness.
      - name: build binary for smoke test
        if: steps.scope.outputs.smoke == '1'
        continue-on-error: true
        run: cargo build -p crabcc-cli --profile ci

      # Trimmed smoke set: index → sym → callers. Covers the hot path that
      # 99% of agent traffic hits. The fuller set (outline / files / prefix /
      # watch) ran in v1 CI; those are unit-tested and reproven on push-to-main.
      # `continue-on-error: true` keeps smoke informational — the 200+ unit
      # tests already cover correctness.
      - name: smoke — index + sym + callers
        if: steps.scope.outputs.smoke == '1'
        continue-on-error: true
        shell: bash
        run: |
          set -e
          FIXTURE=$(mktemp -d)
          cd "$FIXTURE"
          cat > a.ts <<'EOF'
          export function hello(name: string) { return name; }
          hello("world");
          EOF
          BIN="$GITHUB_WORKSPACE/target/ci/crabcc"
          "$BIN" index
          "$BIN" sym hello | jq -e '.[0].name == "hello"'
          "$BIN" callers hello --count | jq -e '.count >= 1'

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true
