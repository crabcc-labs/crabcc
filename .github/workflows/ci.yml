name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel previous runs on the same ref. When a fixup commit lands on a PR
# before the prior run finishes, the prior run is killed — saves runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # fmt + clippy don't depend on OS — run them once on Linux only instead of
  # duplicating the pass on macOS.
  lint:
    name: lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: mozilla-actions/sccache-action@v0.0.6

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-lint
          # Only write cache on main — keeps PR builds from churning the cache.
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      # `--lib --bins` covers the public surface; test-only clippy lints are
      # caught by `cargo nextest` since it type-checks the same code.
      - name: cargo clippy
        run: cargo clippy --workspace --lib --bins -- -D warnings

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.6

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-${{ matrix.os }}
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: install cargo-nextest (JUnit reporter)
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: cargo nextest (with JUnit report)
        run: |
          cargo nextest run --workspace --profile ci

      - name: upload test report (JUnit XML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-${{ matrix.os }}
          path: target/nextest/ci/junit.xml
          if-no-files-found: warn
          retention-days: 30

      # nextest compiles in test mode; the smoke step exercises the release
      # binary so end-users hit the same path. Build it explicitly here.
      # `continue-on-error: true` keeps these from gating CI / future releases
      # — the 150+ unit tests already cover correctness. Smoke is a signal
      # only.
      - name: build release binary for smoke test
        continue-on-error: true
        run: cargo build --release -p crabcc-cli

      - name: smoke — index + query a small fixture
        continue-on-error: true
        shell: bash
        run: |
          set -e
          FIXTURE=$(mktemp -d)
          cd "$FIXTURE"
          cat > a.ts <<'EOF'
          export function hello(name: string) { return name; }
          hello("world");
          EOF
          BIN="$GITHUB_WORKSPACE/target/release/crabcc"
          "$BIN" index
          "$BIN" sym hello | jq -e '.[0].name == "hello"'
          "$BIN" callers hello --count | jq -e '.count >= 1'
          "$BIN" files --ext ts | jq -e 'length >= 1'
          "$BIN" outline a.ts | jq -e 'length >= 1'
          # Watch sidecar — start, write a file, give the debouncer a tick, stop.
          "$BIN" watch --debounce 100 &
          WATCH_PID=$!
          sleep 0.5
          echo 'export function added() { return 1; }' >> a.ts
          sleep 1.5
          kill $WATCH_PID 2>/dev/null || true
          wait $WATCH_PID 2>/dev/null || true
          # Fuzzy + prefix sidecar.
          "$BIN" prefix hello | jq -e 'length >= 1'

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true
