# Lint auto-fixer for an open PR. Fires automatically when CI's `fmt` or
# `lint (clippy)` job fails, or manually from the Actions tab / CLI:
#   gh workflow run "Auto-fix lint" -f pr=<N>
#
# Pipeline:
#   1. Resolve the PR's head branch + SHA.
#   2. Checkout the PR branch.
#   3. Run `cargo fmt --all` to fix rustfmt complaints.
#   4. Run `cargo clippy --fix --allow-dirty` for the fixable clippy subset.
#   5. If the working tree changed, commit with an `[auto-fix]` prefix and
#      push back to the PR branch (CI re-runs on the new commit).
#   6. Post a one-time PR comment summarising what got fixed.
#
# History: this workflow ran on `workflow_run` originally, was switched to
# manual-only because the fix -> CI -> fix loop risk + runner-load was high.
# Re-enabled in claude/jolly-lamport-C35Co with two guardrails that mitigate
# both concerns:
#   - `[auto-fix]` HEAD prefix loop guard (unchanged) -- workflow refuses to
#     run on a commit it already fixed.
#   - workflow_run trigger gates on `fmt` / `lint (clippy)` job conclusions
#     specifically, so a test-job ENOSPC or any unrelated CI flake does NOT
#     spawn an auto-fix attempt.

name: Auto-fix lint

on:
  # Proactive: run on every PR push so `cargo fmt --all` + `clippy --fix` land
  # EARLY as one [auto-fix] commit, instead of only reacting after CI goes red.
  # Now that fmt/clippy are advisory on PRs (ci.yml), the workflow_run-on-failure
  # trigger rarely fires for them -- so this PR trigger is what keeps the tree
  # tidy. The `[auto-fix]` HEAD loop-guard (triage job) stops fix->push->fix.
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr:
        description: 'PR number to fmt + clippy-fix'
        required: true
        type: string
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  # One auto-fix in flight per PR. The group key prefers the explicit input
  # (workflow_dispatch) and falls back to the workflow_run's head SHA so
  # parallel CI failures for the same commit collapse to one run.
  group: auto-fix-lint-${{ github.event.inputs.pr || github.event.workflow_run.head_sha }}
  cancel-in-progress: true

jobs:
  triage:
    name: Resolve PR + loop guard
    # workflow_run fires for *every* CI completion. Drop the obvious no-ops
    # at the job level so we don't even spin up a runner:
    #   - skip non-failure conclusions (success / cancelled / skipped)
    #   - skip runs that weren't triggered by a PR (pushes to main, etc.)
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'failure' &&
       github.event.workflow_run.event == 'pull_request')
    runs-on: [self-hosted, linux, hetzner]
    outputs:
      should_fix: ${{ steps.classify.outputs.should_fix }}
      pr_number: ${{ steps.classify.outputs.pr_number }}
      head_ref: ${{ steps.classify.outputs.head_ref }}
      head_sha: ${{ steps.classify.outputs.head_sha }}
    steps:
      - name: Resolve PR head
        id: classify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVT: ${{ github.event_name }}
          DISPATCH_PR: ${{ github.event.inputs.pr }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          WR_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          if [ "$EVT" = "workflow_run" ]; then
            # Only auto-fix when fmt or lint specifically failed -- test job
            # ENOSPC / flake / network errors are not our problem here. Match
            # by exact job name (see .github/workflows/ci.yml).
            fails=$(gh api "/repos/${{ github.repository }}/actions/runs/$RUN_ID/jobs" \
              --jq '[.jobs[] | select(.conclusion=="failure") | .name] | @json')
            if ! echo "$fails" | grep -qE '"fmt"|"lint \(clippy\)"'; then
              echo "no fmt/lint failure in run $RUN_ID (failing jobs: $fails); skip"
              echo "should_fix=false" >> "$GITHUB_OUTPUT"; exit 0
            fi

            # Resolve PR from head_sha. /commits/<sha>/pulls is the supported
            # reverse lookup; takes the first open PR for this SHA.
            PR=$(gh api "/repos/${{ github.repository }}/commits/$WR_HEAD_SHA/pulls" \
              --jq '[.[] | select(.state=="open")] | .[0].number // empty')
            if [ -z "$PR" ]; then
              echo "no open PR for $WR_HEAD_SHA; skip"
              echo "should_fix=false" >> "$GITHUB_OUTPUT"; exit 0
            fi
          elif [ "$EVT" = "pull_request" ]; then
            PR="$PR_NUMBER"
          else
            PR="$DISPATCH_PR"
          fi

          # Manually triggered for a specific PR number — fetch head branch,
          # SHA, and commits in one call so loop-guard needs no extra API hit.
          meta=$(gh pr view "$PR" --json headRefName,headRefOid,commits 2>/dev/null || echo '{}')
          HEAD_BRANCH=$(echo "$meta" | jq -r '.headRefName // empty')
          HEAD_SHA=$(echo "$meta" | jq -r '.headRefOid // empty')
          if [ -z "$HEAD_BRANCH" ] || [ -z "$HEAD_SHA" ]; then
            echo "PR #$PR not found or has no head; nothing to fix"
            echo "should_fix=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "pr_number=$PR" >> "$GITHUB_OUTPUT"
          echo "head_ref=$HEAD_BRANCH" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"

          # Stop infinite loops — try the commits list already in the pr view
          # response; fall back to direct commit API when HEAD_SHA falls outside
          # gh's first-page window (gh CLI caps commits at 100, see cli/cli#5415).
          last_msg=$(echo "$meta" | jq -r --arg sha "$HEAD_SHA" \
            '.commits // [] | map(select(.oid == $sha)) | .[0].messageHeadline // empty')
          if [ -z "$last_msg" ]; then
            last_msg=$(gh api "/repos/${{ github.repository }}/commits/$HEAD_SHA" \
              --jq '.commit.message | split("\n")[0]' 2>/dev/null || true)
          fi
          if echo "$last_msg" | head -1 | grep -q '^\[auto-fix\]'; then
            echo "head commit already auto-fixed; not retrying"
            echo "should_fix=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_fix=true" >> "$GITHUB_OUTPUT"

  fix:
    name: Run cargo fmt + clippy --fix
    needs: triage
    if: needs.triage.outputs.should_fix == 'true'
    runs-on: [self-hosted, linux, hetzner]
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.triage.outputs.head_ref }}
          # Need a real (not shallow) clone so the auto-commit lands on top
          # of whatever was there.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-lint
          save-if: "false"   # read-only; the main CI lint job owns writes

      - name: cargo fmt --all
        run: cargo fmt --all

      - name: cargo clippy --fix (workspace, --allow-dirty)
        # --allow-dirty/--allow-staged: we already ran fmt above, tree may be modified.
        # Don't fail the step on residual warnings — re-run CI will catch them.
        run: |
          cargo clippy --fix --allow-dirty --allow-staged --workspace --all-targets || true

      - name: Detect changes
        id: diff
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat | tail -10
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit + push fixes
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name 'crabcc-auto-fix[bot]'
          git config user.email 'crabcc-auto-fix@users.noreply.github.com'
          git add -A
          git commit -m '[auto-fix] cargo fmt + clippy --fix

          Manually triggered via the Auto-fix lint workflow:
          .github/workflows/auto-fix-lint.yml

          If you see something here that looks wrong, just push another
          commit (or revert this one) — the workflow refuses to retry on
          a HEAD it already fixed.'
          git push origin HEAD:${{ needs.triage.outputs.head_ref }}

      - name: Comment on PR — fixes applied
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ needs.triage.outputs.pr_number }} --body "$(cat <<'EOF'
          **Auto-fix applied** — `cargo fmt` and `cargo clippy --fix`.

          Manually triggered. CI will re-run on the new commit. If the lint job still fails, the remaining issues need a human (e.g. unfixable clippy warnings, shellcheck, custom lint rules).
          EOF
          )"

      - name: Comment on PR — nothing fixable
        if: steps.diff.outputs.changed == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ needs.triage.outputs.pr_number }} --body "$(cat <<'EOF'
          **Auto-fix attempted** — but `cargo fmt` and `cargo clippy --fix` produced no changes.

          The lint failure isn't auto-fixable. Most likely a manual clippy rewrite, shellcheck on a `.sh` file, or a custom CI gate. Please open the failing job log and fix by hand.
          EOF
          )"
