name: Claude Assistant

# Triggered by @claude mentions in PR/issue comments and review bodies.
# OAuth auth via Claude Max subscription (no separate API key required).
#
# Secrets required (Settings → Secrets → Actions):
#   CLAUDE_ACCESS_TOKEN   — from ~/.claude/.credentials.json
#   CLAUDE_REFRESH_TOKEN  — from ~/.claude/.credentials.json
#   CLAUDE_EXPIRES_AT     — from ~/.claude/.credentials.json
#   SECRETS_ADMIN_PAT     — classic PAT with repo scope (for token auto-refresh)

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned, labeled]

# cancel-in-progress MUST be false: claude-code-action posts an "I'll analyze
# this..." tracking comment at start, which fires an issue_comment event in
# this same group. With cancel-in-progress the queued (bot) run cancels the
# real in-flight run -> "The operation was canceled" before any PR can be
# opened. The bot run is then skipped by the job-level `if` anyway, so letting
# it queue behind (not cancel) is correct.
concurrency:
  group: claude-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  claude:
    if: |
      github.event.sender.type != 'Bot' && (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
        (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: grll/claude-code-action@beta
        with:
          use_oauth: true
          claude_access_token: ${{ secrets.CLAUDE_ACCESS_TOKEN }}
          claude_refresh_token: ${{ secrets.CLAUDE_REFRESH_TOKEN }}
          claude_expires_at: ${{ secrets.CLAUDE_EXPIRES_AT }}
          secrets_admin_pat: ${{ secrets.SECRETS_ADMIN_PAT }}
          timeout_minutes: "60"
