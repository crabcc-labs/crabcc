name: Linear sync (GitHub → Linear)

# One-way: GitHub Issues are the source of truth for the crabcc Linear project.
# Requires repo secrets: LINEAR_API_KEY, GH_PERSONAL_TOKEN
on:
  issues:
    types: [opened, edited, closed, reopened, labeled, unlabeled]
  workflow_dispatch:
  schedule:
  - cron: "0 */6 * * *"

permissions:
  contents: read
  issues: read

concurrency:
  group: linear-sync-${{ github.event.issue.number || 'all' }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Sync triggered issue
      if: github.event_name == 'issues'
      env:
        LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        GH_PERSONAL_TOKEN: ${{ secrets.GH_PERSONAL_TOKEN }}
      run: python3 tools/linear/sync_github_issues.py --issue-number "${{ github.event.issue.number }}"

    - name: Full catch-up sync
      if: github.event_name != 'issues'
      env:
        LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        GH_PERSONAL_TOKEN: ${{ secrets.GH_PERSONAL_TOKEN }}
      run: python3 tools/linear/sync_github_issues.py --include-recently-closed
