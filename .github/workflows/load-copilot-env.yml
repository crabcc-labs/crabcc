# Export GitHub Environment "copilot" secrets into a short-lived private artifact.
# Values are NOT readable via `gh secret list`; this workflow is the supported
# path for loading them onto dev machines (m3, Hetzner, etc.).
#
# Usage (from a machine with `gh auth`):
#   ./scripts/load-copilot-env.sh
#   ./scripts/load-copilot-env.sh --target m3

name: Load copilot env

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: load-copilot-env
  cancel-in-progress: true

jobs:
  export:
    runs-on: [self-hosted, linux, light]
    environment: copilot
    steps:
      - uses: actions/checkout@v4

      - name: Write copilot.env
        env:
          CRABCC_AUTH_TOKEN: ${{ secrets.CRABCC_AUTH_TOKEN }}
          CRABCC_MCP_URL: ${{ secrets.CRABCC_MCP_URL }}
          DOCKER_PAT: ${{ secrets.DOCKER_PAT }}
          DOCKER_USER: ${{ secrets.DOCKER_USER }}
          GH_PERSONAL_TOKEN: ${{ secrets.GH_PERSONAL_TOKEN }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          umask 077
          mkdir -p out
          {
            echo '# Generated by load-copilot-env.yml — do not commit.'
            echo '# Source: GitHub Environment copilot (peterlodri-sec/crabcc).'
            printf 'export CRABCC_AUTH_TOKEN=%q\n' "$CRABCC_AUTH_TOKEN"
            printf 'export CRABCC_MCP_URL=%q\n' "$CRABCC_MCP_URL"
            printf 'export DOCKER_PAT=%q\n' "$DOCKER_PAT"
            printf 'export DOCKER_USER=%q\n' "$DOCKER_USER"
            printf 'export GH_PERSONAL_TOKEN=%q\n' "$GH_PERSONAL_TOKEN"
            printf 'export OLLAMA_API_KEY=%q\n' "$OLLAMA_API_KEY"
            printf 'export OPENROUTER_API_KEY=%q\n' "$OPENROUTER_API_KEY"
          } > out/copilot.env
          chmod 600 out/copilot.env

      - uses: actions/upload-artifact@v4
        with:
          name: copilot-env
          path: out/copilot.env
          retention-days: 1
