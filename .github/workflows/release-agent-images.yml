name: release-agent-images

# Builds + publishes the agent images (crabcc-agents worker + agent-runner) to
# Docker Hub (private) and cosign-signs them. Triggers on crabcc release tags
# (v*.*.*) and manual dispatch. Mirrors release-ucracc-lsp-image.yml: Build
# Cloud opt-in via the DOCKER_BUILD_CLOUD_ENDPOINT repo variable, keyless cosign
# (or key-based via COSIGN_PRIVATE_KEY). Secrets: docker_user, docker_pat.

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - id: check
        env:
          DOCKER_USER: ${{ secrets.docker_user }}
          DOCKER_PAT: ${{ secrets.docker_pat }}
        run: |
          if [ -n "$DOCKER_USER" ] && [ -n "$DOCKER_PAT" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=image publish skipped::Set docker_user + docker_pat."
          fi

  image:
    needs: preflight
    if: needs.preflight.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: crabcc-agents
            context: apps/crabcc-agents
            file: apps/crabcc-agents/Dockerfile
          - name: crabcc-agent-runner
            context: apps/crabcc-agents/agent-runner
            file: apps/crabcc-agents/agent-runner/Dockerfile
    steps:
      - uses: actions/checkout@v6
      - name: log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.docker_user }}
          password: ${{ secrets.docker_pat }}
      - name: set up Docker Build Cloud
        if: vars.DOCKER_BUILD_CLOUD_ENDPOINT != ''
        uses: docker/setup-buildx-action@v3
        with:
          driver: cloud
          endpoint: ${{ vars.DOCKER_BUILD_CLOUD_ENDPOINT }}
      - name: set up QEMU (fallback)
        if: vars.DOCKER_BUILD_CLOUD_ENDPOINT == ''
        uses: docker/setup-qemu-action@v3
      - name: set up local buildx (fallback)
        if: vars.DOCKER_BUILD_CLOUD_ENDPOINT == ''
        uses: docker/setup-buildx-action@v3
      - name: image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ format('{0}/{1}', secrets.docker_user, matrix.name) }}
          tags: |
            type=match,pattern=v(.*),group=1
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=dev,enable=${{ github.event_name == 'workflow_dispatch' }}
            type=sha
      - name: build + push (multi-arch)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
      - name: install cosign
        uses: sigstore/cosign-installer@v3
      - name: cosign sign image
        env:
          IMAGE: ${{ format('{0}/{1}', secrets.docker_user, matrix.name) }}
          DIGEST: ${{ steps.build.outputs.digest }}
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          set -euo pipefail
          REF="${IMAGE}@${DIGEST}"
          if [ -n "${COSIGN_PRIVATE_KEY:-}" ]; then
            printf '%s' "$COSIGN_PRIVATE_KEY" > cosign.key
            cosign sign --yes --key cosign.key "$REF"; rm -f cosign.key
          else
            cosign sign --yes "$REF"
          fi
          echo "::notice title=signed::$REF"
