name: Style hints

# Advisory-only scan of PR diff lines for known improvable Rust patterns.
# Never blocks merge тАФ results appear in the workflow step summary only.
on:
  pull_request:

concurrency:
  group: style-hints-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quick-win-hints:
    name: quick-win hints (advisory)
    runs-on: [self-hosted, linux, hetzner]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Scan PR diff for improvable patterns
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          # Extract only newly-added lines from .rs files (strip leading +,
          # skip the +++ file-header lines).
          ADDED=$(git diff "${BASE}..${HEAD}" -- '*.rs' \
            | grep '^+' | grep -v '^+++' | sed 's/^+//' || true)

          if [ -z "$ADDED" ]; then
            echo "## тЬЕ No Rust lines added тАФ nothing to check" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          TOTAL=0
          REPORT=$(mktemp)

          # hit LABEL GREP_PATTERN SUGGESTION
          # Appends a section to $REPORT and increments $TOTAL when matches exist.
          hit() {
            local label="$1" pattern="$2" suggestion="$3"
            local lines n
            lines=$(printf '%s\n' "$ADDED" | grep -E "$pattern" || true)
            [ -z "$lines" ] && return
            n=$(printf '%s\n' "$lines" | wc -l)
            TOTAL=$((TOTAL + n))
            {
              printf '### `%s` тАФ %d hit%s\n\n' \
                "$label" "$n" "$([ "$n" -gt 1 ] && printf s)"
              printf '> ЁЯТб %s\n\n' "$suggestion"
              printf '```rust\n%s\n```\n\n' "$lines"
            } >> "$REPORT"
          }

          hit 'push_str(&format!())' \
              'push_str\(&format!\(' \
              'Replace with `write!(buf, тАж).unwrap()` тАФ avoids an intermediate String allocation per call'

          hit '.to_string_lossy().to_string()' \
              'to_string_lossy\(\)\.to_string\(\)' \
              'Replace with `.to_string_lossy().into_owned()` тАФ skips a redundant clone when the Cow is already Owned'

          hit '.unwrap_or("")' \
              '\.unwrap_or\(""' \
              'Replace with `.unwrap_or_default()` for `Option<&str>` / `Option<String>`'

          hit '.map(|x| x.to_string()) тАФ single-var closure' \
              '\.map\(\|[a-z]\| [a-z]\.to_string\(\)\)' \
              'Consider `map(str::to_string)` for `&str` iterators (avoids a redundant closure)'

          hit '.map(|x| x.clone()) тАФ single-var closure' \
              '\.map\(\|[a-z]\| [a-z]\.clone\(\)\)' \
              'Replace with `.map(Clone::clone)` or `.cloned()` when iterating over references'

          hit 'return Err(anyhow::anyhow!())' \
              'return Err\(anyhow::anyhow!\(' \
              'Replace with `anyhow::bail!(тАж)` тАФ one macro instead of two, and no need for the explicit `return`'

          hit '.map(|x| x.into()) тАФ single-var closure' \
              '\.map\(\|[a-z]\| [a-z]\.into\(\)\)' \
              'Replace with `.map(Into::into)` тАФ point-free, no closure boilerplate'

          hit '.iter().filter(тАж).count() > 0' \
              'filter\(.*\)\.count\(\) *[>!]= *[01][^0-9]' \
              'Replace `.filter(тАж).count() > 0` with `.any(тАж)` and `.count() == 0` with `!.any(тАж)`'

          hit 'if cond { Some(val) } else { None }' \
              'if .* \{ Some(' \
              'Replace with `cond.then_some(val)` тАФ bool::then_some is cleaner for Option-producing conditions'

          {
            if [ "$TOTAL" -eq 0 ]; then
              printf '## тЬЕ No improvable style patterns in this diff\n'
            else
              printf '## ЁЯТб %d improvable pattern%s detected (advisory тАФ does not block merge)\n\n' \
                "$TOTAL" "$([ "$TOTAL" -gt 1 ] && printf s)"
              printf 'These are quick Rust-idiomatic improvements. Fix in a follow-up or in the same PR.\n\n'
              cat "$REPORT"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          rm -f "$REPORT"
          # Always exit 0 тАФ this job is informational only.
          exit 0
