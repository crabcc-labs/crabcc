name: release

# Triggers on tag push (v*.*.*). Builds, tests, uploads release tarballs.
on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write   # needed to create releases + upload artifacts

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          # x86_64-apple-darwin (macos-13 runner) was dropped in v1.0.1: the
          # macos-13 GitHub-hosted runner pool is being deprecated and runner
          # allocation routinely sat in the queue for 60+ minutes during the
          # v1.0.0 tag push. Intel-Mac users can `cargo install --path
          # crates/crabcc-cli` from source until we move to a self-hosted
          # macOS-Intel runner. arm64 macOS still ships a binary.
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: install cross (linux aarch64 only)
        if: matrix.cross
        run: cargo install cross --locked

      - name: build release
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p crabcc-cli
          else
            cargo build --release --target ${{ matrix.target }} -p crabcc-cli
          fi

      - name: package
        shell: bash
        run: |
          BIN="target/${{ matrix.target }}/release/crabcc"
          NAME="crabcc-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "dist/$NAME"
          cp "$BIN" "dist/$NAME/"
          cp README.md LICENSE CHANGELOG.md "dist/$NAME/" 2>/dev/null || true
          tar -czf "dist/$NAME.tar.gz" -C dist "$NAME"
          (cd dist && shasum -a 256 "$NAME.tar.gz" > "$NAME.tar.gz.sha256")
          ls -la dist

      - uses: actions/upload-artifact@v4
        with:
          name: crabcc-${{ matrix.target }}
          path: dist/*

  release:
    name: release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: list artifacts
        run: ls -la dist

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
