name: release

# Triggers on tag push (v*.*.*). Builds, tests, uploads release tarballs.
on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write   # needed to create releases + upload artifacts

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: [self-hosted, linux, hetzner]
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: [self-hosted, linux, hetzner]
            archive: tar.gz
            cross: true
          # x86_64-apple-darwin (macos-13 runner) was dropped in v1.0.1: the
          # macos-13 GitHub-hosted runner pool is being deprecated and runner
          # allocation routinely sat in the queue for 60+ minutes during the
          # v1.0.0 tag push. Intel-Mac users can `cargo install --path
          # crates/crabcc-cli` from source until we move to a self-hosted
          # macOS-Intel runner. arm64 macOS still ships a binary.
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: install cross (linux aarch64 only)
        if: matrix.cross
        run: cargo install cross --locked

      - name: build release
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p crabcc-cli --features jemalloc
          else
            cargo build --release --target ${{ matrix.target }} -p crabcc-cli --features jemalloc
          fi

      - name: package
        shell: bash
        run: |
          # Issue #74 — `cargo install --path crates/crabcc-cli` produces
          # BOTH `crabcc` (low-level surface) and `ccc` (high-level combo
          # binary). Both ship together; users who installed via tarball
          # before would otherwise lack `ccc`.
          BIN_CRABCC="target/${{ matrix.target }}/release/crabcc"
          BIN_CCC="target/${{ matrix.target }}/release/ccc"
          NAME="crabcc-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "dist/$NAME"
          cp "$BIN_CRABCC" "dist/$NAME/"
          if [ -f "$BIN_CCC" ]; then
            cp "$BIN_CCC" "dist/$NAME/"
          else
            echo "::warning::ccc binary missing at $BIN_CCC — pre-#74 build?"
          fi
          cp README.md LICENSE CHANGELOG.md "dist/$NAME/" 2>/dev/null || true
          tar -czf "dist/$NAME.tar.gz" -C dist "$NAME"
          (cd dist && shasum -a 256 "$NAME.tar.gz" > "$NAME.tar.gz.sha256")
          # Issue #111 prereq — per-binary SHA-256 manifest the signed
          # SHA256SUMS.txt + .asc step will subsume; for now the
          # unsigned per-binary list lets install.sh start verifying
          # in increments.
          (cd "dist/$NAME" && shasum -a 256 crabcc ccc 2>/dev/null > "../$NAME.bin-sha256.txt" || true)
          ls -la dist

      - uses: actions/upload-artifact@v7
        with:
          name: crabcc-${{ matrix.target }}
          path: dist/*

  release:
    name: release
    needs: build
    runs-on: [self-hosted, linux, hetzner]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: list artifacts
        run: ls -la dist

      - uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
