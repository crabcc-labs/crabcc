name: dependabot auto-merge

# Auto-merge weekly dependency bumps (minor + patch) once CI is green.
# Major version bumps open a PR but do NOT auto-merge — require a human review.
on:
  pull_request:
    paths:
      - 'Cargo.lock'
      - 'Cargo.toml'
      - '.github/workflows/**'
      - 'install/Dockerfile*'

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Enable auto-merge for minor + patch; let major bumps queue for review.
      - name: Enable auto-merge (minor + patch only)
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-minor' ||
          steps.meta.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Label major bumps for review
        if: steps.meta.outputs.update-type == 'version-update:semver-major'
        run: gh pr edit "$PR_URL" --add-label "needs-review,major-bump"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
