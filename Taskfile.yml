# https://taskfile.dev — install with `brew install go-task` or
# `go install github.com/go-task/task/v3/cmd/task@latest`.
#
# Quick start (the daily-driver targets):
#   task                    # build + test (the default)
#   task install            # `cargo install` to ~/.cargo/bin/crabcc
#   task ci                 # full local CI (fmt + clippy + test + smoke)
#   task act                # run CI via act/Docker — full workspace (push-mode)
#   task act-pr             # run CI via act/Docker — scoped to diff (PR-mode)
#   task local-ci           # snapshot fmt+clippy+test to .summary/local-ci.txt
#                           # (used in PR descriptions when GH CI is offline)
#   task coverage           # generate code-coverage report (cargo-llvm-cov)
#   task version            # print the workspace version (Cargo.toml truth)
#
# Local dev pipeline (seamless end-to-end commands):
#   task dev:local:start    # pull fresh main → new worktree + branch (BRANCH=feat/…)
#   task dev:local:ship     # autofix → commit → CI → push → PR (MSG='…')
#   task dev:local:bump     # semver bump → CHANGELOG → README → docs (BUMP=minor)
#   task dev:local:build-prod  # optimized release → non-root hardened Docker image
#   task dev:clean:all         # stash + prune old worktrees + sync + install deps
#
# Workflow extras (one-off / situational):
#   task viz                # localhost call-graph viewer (issue #64)
#   task bench              # raw-CLI A/B benchmark + visualization
#   task bench-compress     # FSST off-vs-on gate bench
#   task release            # cut a tag; CI workflow handles the rest
#   task check-deps         # audit external dev tools (jq/yq/rg/gh/…)
#   task doctor             # diagnose crabcc dev install (CLI/MCP/skill/hooks)
#   task aliases            # install grep→rg / find→fd / etc. shell aliases
#   task docs-refresh       # spawn background `claude -p` to update docs
#
# Pass `task --list` for everything (descriptions auto-render).
#
# Modular layout — tasks live in taskfiles/:
#   taskfiles/build.yml      build, test, lint, fmt, smoke, coverage, images-*
#   taskfiles/install.yml    install, dmg, man, aliases, doctor, version, setup
#   taskfiles/release.yml    release, local-ci, prep-pr, gen-summary, docs-refresh
#   taskfiles/bench.yml      bench, bench-compress, memory-smoke, memory-bench
#   taskfiles/viz.yml        viz, repomix, repomix-context, docs:ingest
#   taskfiles/ollama.yml     ollama-bootstrap, ollama-stack-*, ask, agent-runtime-smoke
#   taskfiles/docker.yml     docker-build/push/sbom, setup-orbstack
#   taskfiles/telemetry.yml  telemetry-*, db-inspect, fetch
#   taskfiles/profile.yml    profile-build/index, flamegraph-index
#   taskfiles/e2e.yml        e2e, e2e:dashboard, e2e:graph, e2e:cli, …
#   taskfiles/cron.yml       cron-lint, cron-test
#   taskfiles/index-publish.yml  index-publish-lint, index-publish-test
#   taskfiles/linear.yml     linear-sync (GitHub → Linear backfill)
#   taskfiles/dev-local.yml  dev:local:start/ship/bump/build-prod

version: '3'

# Prefix every output line with the generating task's name so multi-step
# pipelines (dev:local:ship, ci, etc.) are easy to attribute at a glance.
output: prefixed

vars:
  # Default to sibling directory under the current user's home so any
  # developer can run bench tasks without setting env vars.
  REPO_FIXTURE: '{{.REPO_FIXTURE | default (printf "%s/workspace/mc-mothership" .HOME)}}'

  # Toolchain entry points. Centralized so a swap (e.g. `cross` for
  # cross-compilation) ripples to every task without find/replace.
  CARGO: cargo
  RUSTC: rustc
  GH:    gh

  # Binaries we ship + the conventional install location.
  # Use {{.HOME}} (not ~) for cross-shell reliability.
  CARGO_BIN:    '{{.HOME}}/.cargo/bin'
  CRABCC:       '{{.HOME}}/.cargo/bin/crabcc'
  CCC:          '{{.HOME}}/.cargo/bin/ccc'

  # State directories. Per-repo .crabcc/ holds the symbol index and graph
  # sidecar; ~/.crabcc/ holds the singleton _internal.db (agent runs,
  # cli_calls, manager heartbeats) shared across repos.
  # Anchored to {{.ROOT_DIR}} so `task` invoked from a subdirectory resolves correctly.
  REPO_CRABCC_DIR:   '{{.ROOT_DIR}}/.crabcc'
  INDEX_DB:          '{{.ROOT_DIR}}/.crabcc/index.db'
  GRAPH_JSON:        '{{.ROOT_DIR}}/.crabcc/graph.json'
  USER_CRABCC_DIR:   '{{.HOME}}/.crabcc'
  INTERNAL_DB:       '{{.HOME}}/.crabcc/_internal.db'

  # macOS surfaces (issue #107). Build outputs land in dist/; the .app
  # bundle source lives under installer/.
  DMG_DIR:           '{{.ROOT_DIR}}/dist'
  DMG_OUT:           '{{.ROOT_DIR}}/dist/crabcc-{{.CRABCC_VERSION}}.dmg'
  APP_BUNDLE_SRC:    '{{.ROOT_DIR}}/installer/Crabcc.app'
  APP_INSTALLED:     /Applications/Crabcc.app
  LOGS_DIR:          '{{.HOME}}/Library/Logs/Crabcc'
  LAUNCH_AGENTS_DIR: '{{.HOME}}/Library/LaunchAgents'

  # Repomix output (token-minimized bundle for LLM ingestion).
  REPOMIX_OUT: '{{.ROOT_DIR}}/.repomix/crabcc.xml'

  # Single source of truth for the workspace version. Other tasks read
  # through {{.CRABCC_VERSION}} so bumping Cargo.toml flips banners,
  # release messages, and `task version` automatically.
  # NOTE: this shell command runs on every `task` invocation including
  # `task --list`. Keep scripts/version.sh fast (grep, no cargo invocations).
  CRABCC_VERSION:
    sh: bash scripts/version.sh

includes:
  build:         { taskfile: taskfiles/build.yml,         flatten: true }
  install:       { taskfile: taskfiles/install.yml,       flatten: true }
  release:       { taskfile: taskfiles/release.yml,       flatten: true }
  bench:         { taskfile: taskfiles/bench.yml,         flatten: true }
  viz:           { taskfile: taskfiles/viz.yml,           flatten: true }
  ollama:        { taskfile: taskfiles/ollama.yml,        flatten: true }
  docker:        { taskfile: taskfiles/docker.yml,        flatten: true }
  telemetry:     { taskfile: taskfiles/telemetry.yml,     flatten: true }
  profile:       { taskfile: taskfiles/profile.yml,       flatten: true }
  e2e:           { taskfile: taskfiles/e2e.yml,           flatten: true }
  cron:          { taskfile: taskfiles/cron.yml,          flatten: true }
  index-publish: { taskfile: taskfiles/index-publish.yml, flatten: true }
  dev-local:     { taskfile: taskfiles/dev-local.yml,     flatten: true }

tasks:
  default:
    desc: Build + test (the daily-driver task)
    cmds:
      - task: build
      - task: test

