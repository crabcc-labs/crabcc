# https://taskfile.dev — install with `brew install go-task` or
# `go install github.com/go-task/task/v3/cmd/task@latest`.
#
# Quick start (the daily-driver targets):
#   task                    # build + test (the default)
#   task install            # `cargo install` to ~/.cargo/bin/crabcc
#   task ci                 # full local CI (fmt + clippy + test + smoke)
#   task local-ci           # snapshot fmt+clippy+test to .summary/local-ci.txt
#                           # (used in PR descriptions when GH CI is offline)
#   task coverage           # generate code-coverage report (cargo-llvm-cov)
#   task version            # print the workspace version (Cargo.toml truth)
#
# Workflow extras (one-off / situational):
#   task viz                # localhost call-graph viewer (issue #64)
#   task bench              # raw-CLI A/B benchmark + visualization
#   task bench-compress     # FSST off-vs-on gate bench
#   task release            # cut a tag; CI workflow handles the rest
#   task check-deps         # audit external dev tools (jq/yq/rg/gh/…)
#   task doctor             # diagnose crabcc dev install (CLI/MCP/skill/hooks)
#   task aliases            # install grep→rg / find→fd / etc. shell aliases
#   task docs-refresh       # spawn background `claude -p` to update docs
#
# Pass `task --list` for everything (descriptions auto-render).

version: '3'

vars:
  REPO_FIXTURE: '{{.REPO_FIXTURE | default "/Users/peter.lodri/workspace/mc-mothership"}}'

  # Toolchain entry points. Centralized so a swap (e.g. `cross` for
  # cross-compilation) ripples to every task without find/replace.
  CARGO: cargo
  RUSTC: rustc
  GH:    gh

  # Binaries we ship + the conventional install location.
  CARGO_BIN:    ~/.cargo/bin
  CRABCC:       ~/.cargo/bin/crabcc
  CCC:          ~/.cargo/bin/ccc

  # State directories. Per-repo .crabcc/ holds the symbol index and graph
  # sidecar; ~/.crabcc/ holds the singleton _internal.db (agent runs,
  # cli_calls, manager heartbeats) shared across repos.
  REPO_CRABCC_DIR:   .crabcc
  INDEX_DB:          .crabcc/index.db
  GRAPH_JSON:        .crabcc/graph.json
  USER_CRABCC_DIR:   '{{.HOME}}/.crabcc'
  INTERNAL_DB:       '{{.HOME}}/.crabcc/_internal.db'

  # macOS surfaces (issue #107). Build outputs land in dist/; the .app
  # bundle source lives under installer/.
  DMG_DIR:           dist
  DMG_OUT:           'dist/crabcc-{{.CRABCC_VERSION}}.dmg'
  APP_BUNDLE_SRC:    installer/Crabcc.app
  APP_INSTALLED:     /Applications/Crabcc.app
  LOGS_DIR:          '{{.HOME}}/Library/Logs/Crabcc'
  LAUNCH_AGENTS_DIR: '{{.HOME}}/Library/LaunchAgents'

  # Repomix output (token-minimized bundle for LLM ingestion).
  REPOMIX_OUT: .repomix/crabcc.xml

  # Single source of truth for the workspace version. Other tasks read
  # through {{.CRABCC_VERSION}} so bumping Cargo.toml flips banners,
  # release messages, and `task version` automatically.
  CRABCC_VERSION:
    sh: bash scripts/version.sh

tasks:
  default:
    desc: Build + test (the daily-driver task)
    cmds:
      - task: build
      - task: test

  build:
    desc: Release build (LTO=fat — slower compile, ~5–10% faster runtime)
    cmds:
      - "{{.CARGO}} build --release"

  build-fast:
    desc: Iteration-friendly build (-O1, minimal debug info, ~half the time)
    cmds:
      - "{{.CARGO}} build --profile dev-fast"

  build-native:
    desc: Native-CPU release build (issue #112) — local-only; do NOT ship
    summary: |
      Builds with the dedicated `release-native` Cargo profile (inherits
      from `release`) plus `RUSTFLAGS=-C target-cpu=native`. LLVM
      specialises on every ISA extension the host CPU exposes (AVX2 /
      AVX-512 / NEON / ...). ~5-15% on hot paths in our benches; the
      resulting binary will SIGILL on any CPU that doesn't share the
      same feature set.

      Use for personal dev builds and local benchmarks ONLY. The
      published release binary stays portable (plain `task build`).
    cmds:
      - 'RUSTFLAGS="-C target-cpu=native" {{.CARGO}} build --profile release-native'
      - 'echo "Built with target-cpu=native — local use only, do not redistribute"'

  images-build:
    desc: Build local Docker images (crabcc binary + dev compose), with cache (issue #105)
    summary: |
      Builds:
        - crabcc:local from install/Dockerfile.crabcc (multi-stage)
        - All `build:` services from install/dev/docker-compose.yml
          (today: just `crabcc`)

      Image labels: OCI Image-Spec annotations (revision, created,
      version, source, licenses) + crabcc-specific (com.crabcc.role,
      com.crabcc.issue, com.crabcc.build.local). Source for these
      values: workspace Cargo.toml + git rev-parse + ISO-8601 now.

      Set NO_CACHE=1 (or call `task images-build-nocache`) to skip
      BuildKit cache mounts AND --no-cache for the Compose builds.

      BuildKit cache mounts on the Rust builder stage make iterative
      `cargo build` rebuilds ~10–20 s instead of ~2 min cold.
    vars:
      NOCACHE: '{{.NO_CACHE | default ""}}'
      GIT_SHA:
        sh: git rev-parse --short HEAD 2>/dev/null || echo unknown
      BUILD_DATE:
        sh: date -u +%Y-%m-%dT%H:%M:%SZ
      VERSION:
        sh: bash scripts/version.sh 2>/dev/null || echo dev
    env:
      CRABCC_GIT_SHA: '{{.GIT_SHA}}'
      CRABCC_BUILD_DATE: '{{.BUILD_DATE}}'
      CRABCC_VERSION: '{{.VERSION}}'
    cmds:
      - >-
        DOCKER_BUILDKIT=1 docker build
        {{if eq .NOCACHE "1"}}--no-cache --pull{{end}}
        --build-arg "RUST_VERSION=${RUST_VERSION:-1.83}"
        --build-arg "GIT_SHA={{.GIT_SHA}}"
        --build-arg "BUILD_DATE={{.BUILD_DATE}}"
        --build-arg "VERSION={{.VERSION}}"
        -t crabcc:local
        -t crabcc:{{.VERSION}}
        -t crabcc:{{.GIT_SHA}}
        -f install/Dockerfile.crabcc .
      - >-
        docker compose -f install/dev/docker-compose.yml build
        {{if eq .NOCACHE "1"}}--no-cache --pull{{end}}

  images-build-nocache:
    desc: Same as images-build but forces --no-cache + --pull on every layer (slow but reproducible)
    cmds:
      - task: images-build
        vars:
          NO_CACHE: '1'

  images-inspect:
    desc: Show image labels + size for crabcc:local (issue #105 verification)
    cmds:
      - 'docker image inspect crabcc:local | jq ".[0] | {labels: .Config.Labels, size_mb: (.Size / 1024 / 1024 | floor)}"'

  pgo-release:
    desc: Profile-guided optimization release build (issue #112) — typical 10–20% gain on hot paths
    summary: |
      Two-pass build via `cargo-pgo` (https://github.com/Kobzol/cargo-pgo):
        pass 1 — `cargo pgo build` instrumented binary
        pass 2 — `cargo pgo run -- <training corpus>` to generate profile data
        pass 3 — `cargo pgo optimize` final release with profile data baked in

      Training corpus runs `crabcc index` + `crabcc sym Foo` + `crabcc agent
      --dry-run` against this repo (deterministic, ~30 s).

      Prerequisites: `cargo install cargo-pgo` and llvm-profdata on PATH
      (Xcode Command Line Tools on macOS, llvm-tools-preview rustup component
      on Linux).

      Output: target/release/crabcc with profile data baked in. Drops in
      next to the regular release binary; install via `task install` after.
    cmds:
      - >-
        if ! command -v cargo-pgo >/dev/null 2>&1; then
          echo 'cargo-pgo missing; install: cargo install cargo-pgo' >&2; exit 1;
        fi
      - "{{.CARGO}} pgo build"
      - >-
        HOST=$(rustc -vV | sed -n 's/host: //p');
        BIN="target/$HOST/release/crabcc";
        "$BIN" index --root . >/dev/null 2>&1 || true;
        "$BIN" sym Store --root . >/dev/null 2>&1 || true;
        "$BIN" agent --dry-run --run "ping" --root . >/dev/null 2>&1 || true
      - "{{.CARGO}} pgo optimize"

  test:
    desc: Run all 60 unit tests across the workspace
    cmds:
      - "{{.CARGO}} test --workspace"

  fmt:
    desc: Format all Rust files
    cmds:
      - "{{.CARGO}} fmt --all"

  fmt-check:
    desc: Check formatting without modifying files (CI gate)
    cmds:
      - "{{.CARGO}} fmt --all -- --check"

  lint:
    desc: Strict clippy — fails on any warning
    cmds:
      - "{{.CARGO}} clippy --workspace --all-targets -- -D warnings"

  chore:
    desc: All-in-one DX chore — fmt, lint, test, dmg, doctor. Use before opening a release PR.
    summary: |
      Runs the full validation chain that gates a release-ready PR:
      fmt-check → clippy (-D warnings) → tests → DMG build →
      doctor --quiet. Each step short-circuits on failure so you see
      the first thing that broke. Stand-alone — does not run prep-pr
      or write any artifacts beyond dist/crabcc-<version>.dmg.
    cmds:
      - task: fmt-check
      - task: lint
      - task: test
      - task: dmg
      - task: doctor
      - task: agent-status

  agent-status:
    desc: Snapshot of the singleton agent-runs DB — active, recent, and kill events.
    cmds:
      - "{{.CRABCC}} agent-ls --limit 10"
      - "{{.CRABCC}} agent-kills --limit 10"

  service-discovery-check:
    desc: Probe every known crabcc service (issue #143) — text report + non-zero exit if all are unreachable.
    summary: |
      Calls `crabcc debug-service-discovery` and asserts at least one
      service is reachable. Useful as a smoke gate after a Compose
      bring-up: `task service-discovery-check` should pass once the
      stack is up.
    cmds:
      - "{{.CRABCC}} debug-service-discovery"
      - |
        UP=$({{.CRABCC}} debug-service-discovery --json | jq '[.services[] | select(.reachable)] | length')
        if [ "${UP:-0}" -eq 0 ]; then
          echo "service-discovery-check: no services reachable — bring up the stack" >&2
          exit 1
        fi
        echo "service-discovery-check: $UP service(s) reachable"

  dmg:
    desc: Build dist/crabcc-<version>.dmg — installer .app + menubar UI + LaunchAgent (issue #107)
    summary: |
      Stages installer/Crabcc.app, populates Resources/ with release-mode
      crabcc/ccc binaries, skill/, commands/, and install-aliases.sh,
      compiles the menubar Swift shim, ad-hoc codesigns the bundle, then
      packages it into dist/crabcc-<version>.dmg via hdiutil. The .app
      shows up in System Settings → Privacy & Security → App Management
      thanks to the proper Info.plist + ad-hoc signature.
      Pass SKIP_BUILD=1 to reuse target/release/{crabcc,ccc} unchanged.
    vars:
      SKIP_BUILD: '{{.SKIP_BUILD | default ""}}'
    cmds:
      - bash scripts/build-dmg.sh {{if .SKIP_BUILD}}--skip-build{{end}}

  setup-orbstack:
    desc: Install + start OrbStack and link it as the active Docker context (#195)
    summary: |
      OrbStack is the recommended Docker daemon for Apple Silicon Mac
      per apps/CONTAINER-POLICY.md — faster, lighter, arm64-native vs
      Docker Desktop. Idempotent; safe to re-run.

      Run this once before `task docker-build-crabcc`. The script:
        1. Installs OrbStack via brew cask (skip if already present)
        2. Launches OrbStack and waits for the docker daemon
        3. Switches `docker context` to 'orbstack'
        4. Ensures a buildx builder exists
        5. Smoke-tests with `docker run hello-world`
    cmds:
      - bash scripts/setup-orbstack.sh

  # Container images (#195) — distroless-first per apps/CONTAINER-POLICY.md.
  # Each service gets `task docker-build-<name>`, `docker-push-<name>`, and
  # `docker-sbom-<name>`.
  #
  # Tagging policy (per CONTAINER-POLICY.md): semver only. No `:latest`
  # is produced — production deploys MUST pin to a semver tag and dev
  # convenience uses the bare `:<version>` instead.
  #
  # Platform: linux/arm64 only (Apple Silicon Mac is the target host).
  # Multi-arch was dropped per #195 follow-up — re-add when a non-arm64
  # consumer shows up.

  docker-build-crabcc:
    desc: Build ghcr.io/peterlodri-sec/crabcc:<semver> locally for linux/arm64 (#195)
    summary: |
      Multi-stage build via crates/crabcc-cli/Dockerfile. Runtime is
      gcr.io/distroless/cc-debian12:nonroot. Single platform
      (linux/arm64 — Apple Silicon target). Semver tag only; no
      `:latest`. Build-time ARGs populate the OCI metadata labels
      (version, revision, created) so the registry-side metadata
      reflects the actual commit + build timestamp.
    vars:
      GIT_SHA:
        sh: git rev-parse HEAD
      BUILD_DATE:
        sh: date -u +%Y-%m-%dT%H:%M:%SZ
    cmds:
      - >-
        docker buildx build
        -f crates/crabcc-cli/Dockerfile
        --platform linux/arm64
        --build-arg VERSION="{{.CRABCC_VERSION}}"
        --build-arg REVISION="{{.GIT_SHA}}"
        --build-arg CREATED="{{.BUILD_DATE}}"
        -t ghcr.io/peterlodri-sec/crabcc:{{.CRABCC_VERSION}}
        --load
        .

  docker-push-crabcc:
    desc: Push ghcr.io/peterlodri-sec/crabcc:<semver> to GHCR (#195)
    summary: |
      Pushes the semver tag only — no `:latest`. Requires GHCR write
      credentials in DOCKER_CONFIG (run `gh auth login` then
      `gh auth setup-git` once, or `echo $GHCR_TOKEN | docker login
      ghcr.io -u <user> --password-stdin`).
    deps: [docker-build-crabcc]
    cmds:
      - docker push ghcr.io/peterlodri-sec/crabcc:{{.CRABCC_VERSION}}

  docker-sbom-crabcc:
    desc: Generate SPDX SBOM for ghcr.io/peterlodri-sec/crabcc:<semver> (#195)
    summary: |
      Runs Syft against the locally-built image and writes
      dist/sbom/crabcc-<version>.spdx.json. CI publishes this alongside
      the image to GHCR via anchore/sbom-action — this target is the
      local-dev equivalent for inspecting the SBOM ad-hoc.
      Install Syft: `brew install syft` (or curl the install script
      from https://github.com/anchore/syft).
    deps: [docker-build-crabcc]
    vars:
      SBOM_DIR: dist/sbom
      SBOM_FILE: 'dist/sbom/crabcc-{{.CRABCC_VERSION}}.spdx.json'
    cmds:
      - mkdir -p {{.SBOM_DIR}}
      - >-
        syft ghcr.io/peterlodri-sec/crabcc:{{.CRABCC_VERSION}}
        -o spdx-json={{.SBOM_FILE}}
      - echo "SBOM written to {{.SBOM_FILE}}"

  # cloudflared quick-tunnel for the Telegram Mini App / public dashboard.
  # Spawns cloudflared in the background, tails its log until the
  # trycloudflare.com URL appears, prints the URL + ready-to-paste
  # CRABCC_PUBLIC_URL + BotFather Mini App URL lines.
  # State: ~/.crabcc/cloudflared.{pid,url} + ~/Library/Logs/Crabcc/cloudflared.log

  tunnel-start:
    desc: Start cloudflared quick-tunnel for crabcc serve (port 8090) — prints public URL
    summary: |
      Backgrounds cloudflared via nohup, waits up to 30s for the
      trycloudflare.com URL to appear in its log, prints the URL plus
      the matching `CRABCC_PUBLIC_URL=…` line for the bot's .env and
      the `…/?role=mini` URL to paste into BotFather.
      Idempotent — re-running while the tunnel is up just re-prints
      the URL. Pass `PORT=N` to expose a different port.
    cmds:
      - bash scripts/cloudflared-tunnel.sh start

  tunnel-stop:
    desc: Stop the backgrounded cloudflared tunnel
    cmds:
      - bash scripts/cloudflared-tunnel.sh stop

  tunnel-url:
    desc: Print the cloudflared tunnel URL (assumes tunnel-start has run)
    cmds:
      - bash scripts/cloudflared-tunnel.sh url

  tunnel-status:
    desc: Liveness check for the cloudflared tunnel
    cmds:
      - bash scripts/cloudflared-tunnel.sh status

  # crabcc MCP server over HTTP (#204 phase 1). Loopback-only; the
  # docker bot reaches it via host.docker.internal:8091. Set
  # MCP_AUTH_TOKEN in the environment to require a Bearer header on
  # every POST /mcp.

  mcp-serve:
    desc: Run the crabcc MCP server over HTTP on 127.0.0.1:8091 (#204)
    summary: |
      Foreground server. Loopback-only by default — the bot container
      reaches it via host.docker.internal. Auth via MCP_AUTH_TOKEN env
      var when set; unset = no auth (acceptable for single-user
      loopback). Add `--dev` (or set CRABCC_MCP_DEV=1) for the dev
      tool surface (_openapi/_health endpoints).

      Service-discovery already advertises this endpoint via
      `crabcc-core::service_discovery::known_services()` (#205) so
      the viz dashboard's /api/services + the menubar Services panel
      light up the moment the server is reachable.
    cmds:
      - "{{.CRABCC}} --mcp-http 127.0.0.1:8091"

  # Telegram bot in a container (#195 phase 2). Replaces the
  # `crabcc-telegram install-service` LaunchAgent flow which trips the
  # macOS persistence-detection EDR. Container has no host mounts —
  # `/dashboard` works (sends CRABCC_PUBLIC_URL); subprocess CLI
  # commands need a future MCP-over-network refactor.

  docker-build-telegram:
    desc: Build ghcr.io/peterlodri-sec/crabcc-telegram:<semver> for linux/arm64 (#195)
    summary: |
      Multi-stage build via apps/crabcc-telegram/Dockerfile. Build
      context is apps/crabcc-telegram/ (the crate is excluded from
      the workspace per /Cargo.toml's teloxide ICE comment, so the
      build is standalone). Runtime is gcr.io/distroless/cc-debian12:nonroot.
      OCI labels populated from VERSION/REVISION/CREATED build-args.
    vars:
      GIT_SHA:
        sh: git rev-parse HEAD
      BUILD_DATE:
        sh: date -u +%Y-%m-%dT%H:%M:%SZ
      BOT_VERSION:
        sh: awk -F'"' '/^version[[:space:]]*=/ {print $2; exit}' apps/crabcc-telegram/Cargo.toml
    cmds:
      - >-
        docker buildx build
        -f apps/crabcc-telegram/Dockerfile
        --platform linux/arm64
        --build-arg VERSION="{{.BOT_VERSION}}"
        --build-arg REVISION="{{.GIT_SHA}}"
        --build-arg CREATED="{{.BUILD_DATE}}"
        -t ghcr.io/peterlodri-sec/crabcc-telegram:{{.BOT_VERSION}}
        --load
        apps/crabcc-telegram

  telegram-up:
    desc: Run the telegram bot in a docker container, detached (#195)
    summary: |
      Stops + removes any prior 'crabcc-telegram' container, then
      starts a fresh one with --restart=unless-stopped. Reads
      apps/crabcc-telegram/.env at run time via --env-file (.env is
      gitignored + .dockerignored — never baked into the image).
      No host mounts — purely subprocess-isolated. Use `task
      telegram-logs` to watch output.
    deps: [docker-build-telegram]
    vars:
      BOT_VERSION:
        sh: awk -F'"' '/^version[[:space:]]*=/ {print $2; exit}' apps/crabcc-telegram/Cargo.toml
    cmds:
      - docker rm -f crabcc-telegram 2>/dev/null || true
      - >-
        docker run -d
        --name crabcc-telegram
        --restart=unless-stopped
        --env-file apps/crabcc-telegram/.env
        ghcr.io/peterlodri-sec/crabcc-telegram:{{.BOT_VERSION}}
      - docker ps --filter name=crabcc-telegram --format 'table {{`{{.Names}}`}}\t{{`{{.Status}}`}}\t{{`{{.Image}}`}}'

  telegram-down:
    desc: Stop + remove the telegram bot container (#195)
    cmds:
      - docker rm -f crabcc-telegram 2>/dev/null || echo "(not running)"

  telegram-logs:
    desc: Tail the telegram bot container's logs (Ctrl-C to stop)
    cmds:
      - docker logs -f crabcc-telegram

  telegram-status:
    desc: Liveness check + recent logs for the telegram bot container
    cmds:
      - >-
        docker ps -a --filter name=crabcc-telegram
        --format 'table {{`{{.Names}}`}}\t{{`{{.Status}}`}}\t{{`{{.Image}}`}}'
      - echo "--- last 20 log lines ---"
      - docker logs --tail 20 crabcc-telegram 2>&1 || echo "(container not present)"

  install:
    desc: Cargo install crabcc to ~/.cargo/bin/crabcc; auto-bootstraps shell aliases (idempotent)
    summary: |
      Builds release, installs the binary to ~/.cargo/bin/crabcc, then
      runs scripts/install-aliases.sh which writes a fenced
      `# >>> crabcc-aliases >>>` block into ~/.zshrc / ~/.bashrc /
      fish config — only on shells that exist, only if the block isn't
      already present (idempotent — safe to re-run).
      Pass NO_ALIASES=1 to skip the alias step.
    deps: [build]
    vars:
      NO_ALIASES: '{{.NO_ALIASES | default ""}}'
    cmds:
      - "{{.CARGO}} install --path crates/crabcc-cli --force"
      - "{{.CRABCC}} --version"
      - 'if [ -z "{{.NO_ALIASES}}" ]; then bash scripts/install-aliases.sh; else echo "NO_ALIASES=1 — skipping alias bootstrap"; fi'

  aliases-check:
    desc: Detect whether crabcc shell aliases are installed (read-only)
    summary: |
      Greps ~/.zshrc / ~/.bashrc / ~/.config/fish/config.fish for the
      fenced `# >>> crabcc-aliases >>>` block written by
      scripts/install-aliases.sh. Prints status per shell rc and exits 0
      if at least one shell has the block, 1 if none do. Pure detection —
      never modifies any file. Use `task aliases` to install if missing.
    silent: true
    cmds:
      - |
        installed=0
        any_rc=0
        for rc in "$HOME/.zshrc" "$HOME/.bashrc" "$HOME/.config/fish/config.fish"; do
          if [ -f "$rc" ]; then
            any_rc=1
            if grep -q '# >>> crabcc-aliases >>>' "$rc"; then
              echo "✓ $rc — aliases installed"
              installed=1
            else
              echo "✗ $rc — aliases missing"
            fi
          fi
        done
        if [ "$any_rc" = "0" ]; then
          echo "no shell rc files found (~/.zshrc, ~/.bashrc, ~/.config/fish/config.fish)"
          exit 1
        fi
        if [ "$installed" = "1" ]; then
          echo "" && echo "→ at least one shell has aliases. Run \`task aliases\` to (re-)install on others."
          exit 0
        else
          echo "" && echo "→ aliases not installed in any shell. Run \`task aliases\` (or \`task install\`) to install."
          exit 1
        fi

  install-upgrade-smoke:
    desc: Smoke-test install.sh upgrade-on-rerun (closes #24)
    summary: |
      Verifies the upgrade path: runs install.sh once (build), records
      the resulting version, runs install.sh --check (must report up
      to date), then runs install.sh again (must short-circuit to a
      no-op build). Idempotency is the contract.
        - first run         build path
        - --check           no writes; reports up-to-date
        - second run        no-op build skip
      Manual platform sweep target — runs locally on macOS arm64 and
      linux x86_64 (per the issue spec). Output captured at
      .summary/install-upgrade-smoke.txt.
    cmds:
      - mkdir -p .summary
      - 'echo "=== first run (initial install or upgrade) ==="           | tee .summary/install-upgrade-smoke.txt'
      - 'bash install.sh 2>&1                                            | tee -a .summary/install-upgrade-smoke.txt'
      - 'echo "" && echo "=== version probe ==="                         | tee -a .summary/install-upgrade-smoke.txt'
      - '{{.CRABCC}} --version                                           | tee -a .summary/install-upgrade-smoke.txt'
      - 'echo "" && echo "=== --check (read-only) ==="                   | tee -a .summary/install-upgrade-smoke.txt'
      - 'bash install.sh --check 2>&1                                    | tee -a .summary/install-upgrade-smoke.txt'
      - 'echo "" && echo "=== second run (must be a no-op) ==="          | tee -a .summary/install-upgrade-smoke.txt'
      - 'bash install.sh 2>&1                                            | tee -a .summary/install-upgrade-smoke.txt'
      - 'echo "" && echo "=== second-run version (must equal first) ===" | tee -a .summary/install-upgrade-smoke.txt'
      - '{{.CRABCC}} --version                                           | tee -a .summary/install-upgrade-smoke.txt'
      - 'grep -q "no-op build skip" .summary/install-upgrade-smoke.txt || (echo "FAIL: no-op message not seen on second run" && exit 1)'
      - 'echo "" && echo "✓ upgrade-on-rerun smoke passed"               | tee -a .summary/install-upgrade-smoke.txt'

  install-iterm2:
    desc: Install crabcc iTerm2 daemon into AutoLaunch + print activation steps (issue #132)
    summary: |
      Copies apps/crabcc-iterm2/main.py into
      ~/Library/Application Support/iTerm2/Scripts/AutoLaunch/crabcc.py
      then prints the remaining two manual steps (Python API pref + Automation).
    cmds:
      - |
        AUTOLAUNCH="$HOME/Library/Application Support/iTerm2/Scripts/AutoLaunch"
        mkdir -p "$AUTOLAUNCH"
        if ! pip3 show iterm2 >/dev/null 2>&1; then
          echo "▶ Installing iterm2 Python package..."
          pip3 install iterm2
        fi
        cp "$(pwd)/apps/crabcc-iterm2/main.py" "$AUTOLAUNCH/crabcc.py"
        echo "✓ Daemon installed: $AUTOLAUNCH/crabcc.py"
        echo ""
        echo "Remaining steps:"
        echo "  1. iTerm2 → Preferences → General → Magic → ✅ Allow full Python API"
        echo "  2. System Settings → Privacy & Security → Automation → iTerm2 → ✅"
        echo "  3. Restart iTerm2"
        echo "  4. Verify: crabcc doctor iterm2"

  iterm2-test:
    desc: Run crabcc-iterm2 HUD unit tests (no live iTerm2 required)
    cmds:
      - 'python3 -m unittest apps/crabcc-iterm2/tests/test_hud -v'

  install-skill:
    desc: Symlink the skill + slash command into ~/.claude/
    cmds:
      - mkdir -p ~/.claude/skills/crabcc ~/.claude/commands
      - ln -sf "$(pwd)/skill/crabcc/SKILL.md" ~/.claude/skills/crabcc/SKILL.md
      - ln -sf "$(pwd)/commands/crabcc-init.md" ~/.claude/commands/crabcc-init.md
      - ln -sf "$(pwd)/commands/crabcc-upgrade.md" ~/.claude/commands/crabcc-upgrade.md
      - ln -sf "$(pwd)/commands/crabcc-install.md" ~/.claude/commands/crabcc-install.md
      - 'echo "skill + 3 commands symlinked. Add the MCP server to ~/.claude.json manually if needed."'

  system-check:
    desc: Verify host (RAM / disk / arch / daemon) can run the configured Ollama model
    summary: |
      Pre-flight gate for the audit skills. Pass MODEL=… to check a
      specific tag, or rely on $CRABCC_OLLAMA_MODEL.
        exit 0 → OK
        exit 1 → WARN (model will run but slowly)
        exit 2 → FAIL (red item must be fixed)
    vars:
      MODEL: '{{.MODEL | default ""}}'
    cmds:
      - 'bash scripts/ollama-system-check.sh{{if .MODEL}} --model {{.MODEL}}{{end}}'

  ollama-bootstrap:
    desc: System-check + install Ollama (macOS) + pull the OpenClaw model used by audit skills
    summary: |
      Replaces Claude-Code-`Agent`-tool sub-agent fan-out with a local
      Ollama backend. The audit skills (warp-speed-audit, rust-logging-
      audit) call scripts/ollama-fanout.sh which POSTs each cluster's
      prompt to /api/generate in parallel.

      Runs `task system-check` first — refuses to proceed on FAIL (exit
      2), warns on WARN (exit 1) but continues. Pass IGNORE_SYSTEM=1 to
      bypass the gate entirely.

      Default model: voytas26/openclaw-oss-20b-deterministic — gpt-oss
      20B fine-tune for OpenClaw autonomous agents. Per the model card:
      "Designed for autonomous agents, strict tool schema adherence,
      concise outputs, and stable behavior in automation workflows."
      Needs ~13 GB disk + ~16 GB RAM (32 GB Apple Silicon: comfortable).

      Override the default with CRABCC_OLLAMA_MODEL=… or MODEL=…
        - voytas26/openclaw-qwen3vl-8b-opt          (8B, 8 GB RAM)
        - 64500165/openclaw-omnicoder-2             (Qwen3.5-9B, long loops)
        - qwen2.5-coder:7b                          (no agent tuning)

      Idempotent: skips install if `ollama` is on PATH; skips pull if
      the model is already present locally.
    deps: [system-check]
    vars:
      MODEL: '{{.MODEL | default "qwen3.5:35b-a3b-coding-nvfp4"}}'
    cmds:
      - |
        if ! command -v ollama >/dev/null 2>&1; then
          echo "ollama not on PATH — installing via Homebrew (macOS)…"
          if command -v brew >/dev/null 2>&1; then
            brew install ollama
          else
            echo "no brew. Install Ollama manually: https://ollama.com/download"
            exit 1
          fi
        else
          echo "✓ ollama already installed: $(ollama --version 2>&1 | head -1)"
        fi
      - |
        if ! curl -fsS --max-time 5 "${OLLAMA_HOST:-http://127.0.0.1:11434}/api/version" >/dev/null 2>&1; then
          echo "ollama daemon not reachable — start it with:  ollama serve  (or run the desktop app)"
          echo "(continuing — pull will fail if daemon stays down)"
        else
          echo "✓ ollama daemon reachable at ${OLLAMA_HOST:-http://127.0.0.1:11434}"
        fi
      - 'ollama pull {{.MODEL}}'
      - 'echo "" && echo "✓ ready: scripts/ollama-fanout.sh --prompts … --output … --json-mode"'

  ollama-smoke:
    desc: Smoke-test scripts/ollama-fanout.sh with a 2-prompt fixture (uses default model)
    summary: |
      Verifies Ollama is reachable, the model is present, and the
      fan-out script returns merged JSON on the contract the audit
      skills expect. Builds a tiny 2-prompt fixture, fires it, jq-asserts
      both replies came back ok=true. Cleans up after itself.
    vars:
      MODEL: '{{.MODEL | default "voytas26/openclaw-oss-20b-deterministic"}}'
    cmds:
      - mkdir -p .summary
      - |
        cat > /tmp/crabcc-ollama-smoke-prompts.json <<'EOF'
        [
          {"name":"A","prompt":"Reply with valid JSON only. Schema: {\"agent\":\"A\",\"ok\":true}. Do not add commentary."},
          {"name":"B","prompt":"Reply with valid JSON only. Schema: {\"agent\":\"B\",\"ok\":true}. Do not add commentary."}
        ]
        EOF
      - 'CRABCC_OLLAMA_MODEL={{.MODEL}} bash scripts/ollama-fanout.sh --prompts /tmp/crabcc-ollama-smoke-prompts.json --output .summary/ollama-smoke.json --json-mode --parallel 2'
      - 'jq -e ''length == 2 and (map(.ok) | all)'' .summary/ollama-smoke.json >/dev/null && echo "✓ ollama fan-out smoke passed"'
      - 'rm -f /tmp/crabcc-ollama-smoke-prompts.json'

  ollama-models:
    desc: List installed Ollama models on $OLLAMA_HOST with size + modified date
    cmds:
      - 'curl -fsS "${OLLAMA_HOST:-http://127.0.0.1:11434}/api/tags" | jq -r ''.models[] | "\(.name)\t\((.size/1e9)|floor)GB\t\(.modified_at[:10])"'' | column -t'

  # ─── shell-ask integration (install/shell-ask.md) ────────────────────
  ask:
    desc: 'Pipe stdin into shell-ask: task ask -- "<prompt>" — gated on `command -v ask`'
    summary: |
      Thin wrapper around https://github.com/egoist/shell-ask. Pass the
      prompt + optional flags after `--`. The crabcc-flavored reusable
      commands (crabcc-explain, crabcc-cycles, telemetry-digest, cm,
      openapi-drift) are installed via `task ask-config`.

      Examples:
        crabcc sym Store      | task ask -- crabcc-explain
        crabcc graph cycles   | task ask -- crabcc-cycles
        git diff --cached     | task ask -- cm
        tail -200 .crabcc/telemetry.jsonl | task ask -- telemetry-digest
    cmds:
      - |
        if ! command -v ask >/dev/null 2>&1; then
          echo "shell-ask not installed — run \`task ask-install\` (or \`npm i -g shell-ask\`)"
          exit 1
        fi
        ask {{.CLI_ARGS}}

  ask-install:
    desc: Install shell-ask globally via npm + drop the crabcc command bundle into ~/.config/shell-ask/
    summary: |
      Idempotent. Skips the npm install if `ask` is already on PATH.
      The config is COPIED, not symlinked — re-run after pulling repo
      updates if you want the latest crabcc commands.
    cmds:
      - |
        if ! command -v ask >/dev/null 2>&1; then
          npm i -g shell-ask
        else
          echo "shell-ask already installed: $(command -v ask)"
        fi
      - mkdir -p "$HOME/.config/shell-ask"
      - 'if [ -f "$HOME/.config/shell-ask/config.json" ] && [ ! -L "$HOME/.config/shell-ask/config.json.crabcc-bak" ]; then mv "$HOME/.config/shell-ask/config.json" "$HOME/.config/shell-ask/config.json.crabcc-bak"; fi'
      - cp install/shell-ask.json "$HOME/.config/shell-ask/config.json"
      - 'echo "✓ shell-ask config installed at $HOME/.config/shell-ask/config.json"'
      - 'echo "  pre-existing config (if any) saved as config.json.crabcc-bak"'

  ask-config:
    desc: Re-copy install/shell-ask.json to ~/.config/shell-ask/config.json (skip the npm install step)
    cmds:
      - mkdir -p "$HOME/.config/shell-ask"
      - cp install/shell-ask.json "$HOME/.config/shell-ask/config.json"
      - 'echo "✓ shell-ask config refreshed at $HOME/.config/shell-ask/config.json"'

  ollama-network-check:
    desc: Probe a network-exposed Ollama daemon (LAN / VPN / mDNS); pass HOST=… or set $OLLAMA_HOST
    summary: |
      For setups where Ollama runs off-box (e.g. on a Mac Studio while
      dev happens on a laptop). Distinct from `task system-check` which
      runs on the Ollama host itself.

      Checks (fail-fast):
        1. URL parse + DNS / mDNS / hosts resolution
        2. TCP reachability on the daemon port
        3. /api/version returns a real Ollama version
        4. /api/tags lists at least one model
        5. Configured model is present in the tag list
        6. (--smoke) /api/generate round-trip with a 1-token completion

      Pass HOST=http://… to override $OLLAMA_HOST inline. Pass
      SMOKE=1 to include the /api/generate round-trip.

      Exit: 0 OK · 1 WARN (model missing) · 2 FAIL (daemon unreachable)
        · 3 SMOKE-FAIL (listed but inference broken).
    vars:
      HOST:  '{{.HOST  | default ""}}'
      MODEL: '{{.MODEL | default ""}}'
      SMOKE: '{{.SMOKE | default ""}}'
    cmds:
      - 'bash scripts/ollama-network-check.sh{{if .HOST}} --host {{.HOST}}{{end}}{{if .MODEL}} --model {{.MODEL}}{{end}}{{if .SMOKE}} --smoke{{end}}'

  agent-runtime-smoke:
    desc: Smoke-test scripts/ollama-agent-runtime.sh — single-shot tool-calling round-trip
    summary: |
      Builds a 1-tool fixture (crabcc.fuzzy), asks the model "find the
      Store symbol", parses the JSON reply. Validates the agent
      runtime's JSON contract (tool_call XOR final + optional
      thinking) end-to-end against the local or network Ollama.

      Pass HOST=… to test against a remote daemon.
    vars:
      HOST:  '{{.HOST  | default ""}}'
      MODEL: '{{.MODEL | default "qwen3.5:35b-a3b-coding-nvfp4"}}'
    cmds:
      - mkdir -p .summary
      - |
        cat > /tmp/crabcc-agent-task.json <<'EOF'
        {
          "system": "You are a code-search agent for the crabcc repo. Use crabcc.fuzzy to locate symbols.",
          "user":   "Find the Store symbol in this repo.",
          "tools": [
            {"name":"crabcc.fuzzy",
             "description":"Levenshtein-2 fuzzy search over indexed symbol names",
             "schema":{"type":"object","properties":{"query":{"type":"string"}},"required":["query"]}}
          ]
        }
        EOF
      - '{{if .HOST}}OLLAMA_HOST={{.HOST}} {{end}}CRABCC_OLLAMA_MODEL={{.MODEL}} bash scripts/ollama-agent-runtime.sh --task /tmp/crabcc-agent-task.json --output .summary/agent-runtime-smoke.json'
      - 'jq -e ''.ok == true and (.tool_call != null or .final != null)'' .summary/agent-runtime-smoke.json >/dev/null && echo "✓ agent runtime smoke passed: $(jq -c ''{tool_call:.tool_call, final:.final}'' .summary/agent-runtime-smoke.json)"'
      - 'rm -f /tmp/crabcc-agent-task.json'

  bench:
    desc: Run the raw-CLI A/B benchmark against REPO_FIXTURE
    deps: [install]
    cmds:
      - "( cd {{.REPO_FIXTURE}} && {{.CRABCC}} index >/dev/null )"
      - 'PATH="$HOME/.cargo/bin:$PATH" python3 bench/raw-bench.py {{.REPO_FIXTURE}}'

  bench-viz:
    desc: Generate REPORT.md + PNG charts from latest bench results
    cmds:
      - 'test -f bench/results/raw.json || (echo "run `task bench` first" && exit 1)'
      - 'if command -v {{"/tmp/crabcc-bench-venv/bin/python"}} >/dev/null 2>&1; then /tmp/crabcc-bench-venv/bin/python bench/visualize.py; else python3 bench/visualize.py; fi'

  bench-all:
    desc: Bench + visualize in one shot
    cmds:
      - task: bench
      - task: bench-viz

  bench-e2e:
    desc: |
      Full end-to-end bench sweep against REPO_FIXTURE — runs every harness
      under bench/ + the moka cache micro-bench + the pinned-walkdir e2e
      integration test. Results land in bench/results/ (JSON snapshots) and
      the rendered Markdown reports stay in tree.
    deps: [build]
    cmds:
      # 1. Raw CLI A/B (crabcc vs grep/find/rg/fd) → bench/results/raw.json
      - task: bench
      # 2. PNG charts + bench/results/REPORT.md
      - task: bench-viz
      # 3. FSST off-vs-on gate (single trial) → bench/results/fsst-gate.md
      - task: bench-compress
      # 4. moka cache micro-bench → bench/results/cache-bench-REPORT.md
      - 'python3 bench/cache-bench.py'
      # 5. e2e integration test against pinned BurntSushi/walkdir 2.5.0
      - '{{.CARGO}} test -p crabcc-cli --test e2e_walkdir -- --ignored --nocapture'
      # 6. Surface the three rendered reports together so the run summary
      # has everything in one scroll.
      - 'echo "" && echo "── bench-e2e summary ──" && ls -la bench/results/ | head -30'

  man:
    desc: Render the manpage to a viewable PDF preview (and confirm troff syntax)
    cmds:
      - 'man -t man/crabcc.1 | open -fa Preview'

  install-man:
    desc: Install crabcc.1 into the local man-page tree
    cmds:
      - sudo install -m 0644 man/crabcc.1 /usr/local/share/man/man1/crabcc.1
      - 'echo "test with: man crabcc"'

  viz-web-build:
    desc: |
      Build the React /live dashboard bundle (phase 1 of #17). Outputs
      a single self-contained HTML at crates/crabcc-viz/web/dist/live.html
      which the Rust crate include_str!s at compile time. Re-run after
      editing crates/crabcc-viz/web/src/.
    cmds:
      - 'cd crates/crabcc-viz/web && bun install --silent && bun run build'

  viz-web-test:
    desc: Run the React frontend's bun:test suite + tsgo typecheck.
    cmds:
      - 'cd crates/crabcc-viz/web && bun install --silent && bun run typecheck && bun test src'

  viz-web-dev:
    desc: |
      Watch crates/crabcc-viz/web/src/ and rebuild dist/live.html on save.
      Pair with `task viz` in another terminal to see live reloads after
      Cmd-R in the browser.
    cmds:
      - 'cd crates/crabcc-viz/web && bun install --silent && bun run dev'

  viz:
    desc: |
      Start the localhost call-graph viewer (issue #64). Builds release,
      makes sure the index + graph sidecar exist, then opens the browser.
      Pass PORT=NNNN to override the default 7878. Pass NO_OPEN=1 to skip
      the auto-browser-open (useful over SSH or in test loops).
    deps: [build]
    vars:
      PORT: '{{.PORT | default "7878"}}'
      NO_OPEN: '{{.NO_OPEN | default ""}}'
    cmds:
      - |
        set -e
        if [ ! -f .crabcc/index.db ]; then
          echo "no .crabcc/index.db — building one now…" >&2
          ./target/release/crabcc index >/dev/null
        fi
        if [ ! -f .crabcc/graph.json ]; then
          echo "no .crabcc/graph.json — building call-graph sidecar…" >&2
          ./target/release/crabcc graph build >/dev/null
        fi
        ARGS="--port {{.PORT}}"
        if [ -n "{{.NO_OPEN}}" ]; then ARGS="$ARGS --no-open"; fi
        exec ./target/release/crabcc serve $ARGS

  viz-test:
    desc: Run the crabcc-viz smoke + unit tests (no browser, no port collision)
    cmds:
      - "{{.CARGO}} test -p crabcc-viz"

  viz-sim:
    desc: |
      Simulate ongoing low-effort agent activity against the viz crate
      (#64 demo). Loops symbol lookups every ~3s so the live dashboard
      at /live shows continuous tool calls + a slowly-growing relation
      graph. Pair with `task viz` in another shell. Ctrl-C to stop.
    cmds:
      - bash scripts/viz-simulate.sh
    interactive: true

  smoke:
    desc: Index a tiny fixture + assert sym/callers/refs return data
    deps: [install]
    cmds:
      - |
        mkdir -p /tmp/crabcc-smoke
        cat > /tmp/crabcc-smoke/a.ts <<'EOF'
        export function hello(name: string) { return name; }
        hello("world");
        EOF
      - "( cd /tmp/crabcc-smoke && {{.CRABCC}} index >/dev/null )"
      - "{{.CRABCC}} --root /tmp/crabcc-smoke sym hello | jq -e '.[0].name == \"hello\"'"
      - "{{.CRABCC}} --root /tmp/crabcc-smoke callers hello --count | jq -e '.count >= 1'"
      - rm -rf /tmp/crabcc-smoke

  compress:
    desc: Train FSST symbol table on the current index + re-encode all rows + report stats
    deps: [build]
    cmds:
      - "{{.CRABCC}} compress"
      - "{{.CRABCC}} compress --rebuild"
      - "{{.CRABCC}} compress --stats"

  bench-compress:
    desc: Run the FSST off-vs-on gate bench against REPO_FIXTURE (single trial)
    deps: [build]
    cmds:
      - 'python3 bench/compress-bench.py --repo {{.REPO_FIXTURE}} --crabcc target/release/crabcc --trials 1 --decode-calls 2000'
      - 'echo "" && cat bench/results/fsst-gate.md'

  verify-gate:
    desc: Local re-run of the v2.0.0-alpha release gate (lint + test + bench-compress)
    cmds:
      - task: lint
      - task: test
      - task: bench-compress

  fuzz-check:
    desc: Compile-check the cargo-fuzz target (full run requires nightly + cargo-fuzz)
    cmds:
      - "(cd crates/crabcc-core/fuzz && {{.CARGO}} check)"

  memory-smoke:
    desc: Exercise the memory CLI surface (M3-light + M1 hybrid) against a tempdir
    deps: [install]
    cmds:
      - mkdir -p /tmp/crabcc-mem-smoke
      - "{{.CRABCC}} --root /tmp/crabcc-mem-smoke memory init | jq -e '.status == \"ok\"'"
      - "{{.CRABCC}} --root /tmp/crabcc-mem-smoke memory remember 'doc:1' 'fox jumps' | jq -e '.id >= 1'"
      - "{{.CRABCC}} --root /tmp/crabcc-mem-smoke memory remember 'doc:2' 'lazy dogs' --room animals | jq -e '.id >= 1'"
      - "{{.CRABCC}} --root /tmp/crabcc-mem-smoke memory count | jq -e '.count == 2'"
      - "{{.CRABCC}} --root /tmp/crabcc-mem-smoke memory list --limit 5 | jq -e 'length == 2'"
      - "{{.CRABCC}} --root /tmp/crabcc-mem-smoke memory search 'fox' --limit 3 | jq -e '.hits | length >= 1'"
      - "{{.CRABCC}} --root /tmp/crabcc-mem-smoke memory search 'fox' --mode lexical --limit 3 | jq -e '.hits[0].source_id == \"doc:1\"'"
      - "{{.CRABCC}} --root /tmp/crabcc-mem-smoke memory search 'fox' --mode vector --limit 3 | jq -e '.hits | length >= 1'"
      - "{{.CRABCC}} --root /tmp/crabcc-mem-smoke memory search 'fox' --mode hybrid --limit 3 | jq -e '.hits | length >= 1'"
      - "{{.CRABCC}} --root /tmp/crabcc-mem-smoke memory health | jq -e '. == \"Ok\"'"
      - test -f /tmp/crabcc-mem-smoke/.crabcc/memory.db
      - rm -rf /tmp/crabcc-mem-smoke

  memory-bench:
    desc: |
      LongMemEval R@k bench gate (issue #2). Runs the bundled synthetic
      fixture by default; pass DATASET=path/to/longmemeval_oracle.json to
      run against the real held-out 450q set.
    vars:
      DATASET: '{{.DATASET | default ""}}'
      THRESHOLD: '{{.THRESHOLD | default "0.966"}}'
      MODE: '{{.MODE | default ""}}'
    cmds:
      - mkdir -p target/bench
      - >-
        cargo run --release -p crabcc-memory-bench --
        {{if .DATASET}}--dataset {{.DATASET}}{{end}}
        {{if .MODE}}--mode {{.MODE}}{{end}}
        --threshold {{.THRESHOLD}}
        --output target/bench/memory.ndjson

  ci:
    desc: Local CI dry-run — fmt + clippy + test + smoke
    cmds:
      - task: fmt-check
      - task: lint
      - task: test
      - task: smoke
      - task: memory-smoke

  local-ci:
    desc: Full local CI — mirrors GH workflow + prep-pr; pass/fail summary table
    summary: |
      Canonical "skip GitHub CI" runner. Runs fmt-check, clippy
      (workspace + all-targets + all-features), tests (single-threaded
      for tantivy determinism), doc-build with -D warnings, smoke E2E,
      and memory-smoke. Per-step logs land under .summary/local-ci/.
      Exit non-zero if any step failed.

      Flags forwarded to scripts/local-ci.sh:
        --release       also run `cargo build --release --workspace`
        --quick         skip doc-build + smoke (fastest viable)
        --strict        run tests in parallel (re-enables tantivy flake)
        --no-clippy     skip clippy (debugging only)
    cmds:
      - 'scripts/local-ci.sh {{.CLI_ARGS}}'

  local-ci-quick:
    desc: Quick local CI — fmt + clippy + tests only, ~30s
    summary: |
      Faster local-ci variant for iterating. Drops doc-build, smoke,
      and the release-build step. Use this between code changes;
      use `task local-ci` before pushing.
    cmds:
      - 'scripts/local-ci.sh --quick'

  local-ci-release:
    desc: Local CI + release-build — mirrors what release.yml would do, locally
    summary: |
      Full local-ci PLUS `cargo build --release --workspace`. Use
      this before cutting a tag when GitHub Actions is unavailable
      (billing block, network-isolated env, etc.). Verifies the
      release binary builds AND every gate passes.
    cmds:
      - 'scripts/local-ci.sh --release'

  release:
    desc: Cut a release tag (CI builds + uploads tarballs on push)
    summary: |
      Pass VERSION=x.y.z. Updates Cargo.toml versions, commits, tags, and pushes.
      The release.yml GitHub Actions workflow takes it from there.
    cmds:
      - test -n "{{.VERSION}}" || (echo "VERSION=x.y.z required" && exit 1)
      - sed -i.bak 's/^version = "[^"]*"/version = "{{.VERSION}}"/' Cargo.toml && rm Cargo.toml.bak
      - "{{.CARGO}} build --release"
      - git add Cargo.toml Cargo.lock
      - 'git commit -m "release: v{{.VERSION}}"'
      - "git tag v{{.VERSION}}"
      - "echo 'now: git push origin main --tags'"

  # The three repomix-* tasks below are internal building blocks.
  # The public entry point is the `/crabcc:generate:context` Claude
  # Code slash command, which calls `task repomix-context`. They're
  # marked `internal: true` so they don't clutter `task -l`; still
  # callable via `task: <name>` from other tasks.
  repomix:
    internal: true
    summary: |
      All settings live in repomix.config.json (output path, style,
      compression). The exclusion list lives in .repomixignore — keep
      it strict (generated artifacts, lock files, binary resources,
      bench fixtures all excluded by default).

      Pass COMPRESS=1 to invoke `repomix --compress` (tree-sitter
      extraction of class/function signatures, drops bodies — large
      token win for LLM ingestion).

      Pass COPY=1 to send the bundle to the system clipboard. Heads
      up: `task repomix | pbcopy` does NOT work because repomix writes
      the XML to a *file* and Taskfile prints progress to stdout. Use
      the `/crabcc:generate:context` slash command (`task repomix-context`)
      for the public flow.
    vars:
      OUT:      '{{.OUT      | default .REPOMIX_OUT}}'
      COPY:     '{{.COPY     | default ""}}'
      COMPRESS: '{{.COMPRESS | default ""}}'
    cmds:
      - mkdir -p $(dirname {{.OUT}})
      - 'repomix --output {{.OUT}}{{if .COMPRESS}} --compress{{end}}{{if .COPY}} --copy{{end}}'
      - 'wc -c {{.OUT}} | awk ''{ printf "size: %.1f KiB\n", $1/1024 }'''

  repomix-copy:
    internal: true
    summary: |
      Internal: pack + clipboard. Public entry point is
      `/crabcc:generate:context` (calls `task repomix-context`).
    cmds:
      - task: repomix
        vars:
          COPY: "1"

  repomix-crate:
    internal: true
    summary: |
      Internal: pack a single crate into .repomix/<crate>.xml.
      Pass COMPRESS=1 / COPY=1 to mirror the full-repo flow.

      Examples:
        task repomix-crate CRATE=crabcc-core
        task repomix-crate CRATE=crabcc-cli OUT=.repomix/cli.xml COMPRESS=1
    vars:
      CRATE:    '{{.CRATE    | default ""}}'
      OUT:      '{{.OUT      | default ""}}'
      COPY:     '{{.COPY     | default ""}}'
      COMPRESS: '{{.COMPRESS | default ""}}'
    preconditions:
      - sh: '[ -n "{{.CRATE}}" ]'
        msg: "CRATE=<name> is required (e.g. CRATE=crabcc-core)"
      - sh: 'test -d crates/{{.CRATE}}'
        msg: "crates/{{.CRATE}} not found — check the crate name"
    cmds:
      - mkdir -p .repomix
      - >-
        repomix
        --include "crates/{{.CRATE}}/**"
        --output "{{if .OUT}}{{.OUT}}{{else}}.repomix/{{.CRATE}}.xml{{end}}"
        {{if .COMPRESS}}--compress{{end}}
        {{if .COPY}}--copy{{end}}
      - 'wc -c "{{if .OUT}}{{.OUT}}{{else}}.repomix/{{.CRATE}}.xml{{end}}" | awk ''{ printf "size: %.1f KiB\n", $1/1024 }'''

  # Public entry point invoked via the `/crabcc:generate:context`
  # Claude Code slash command. Three layers stacked into one bundle:
  #
  #   1. `repomix --compress` — tree-sitter extraction of class/function
  #      signatures; drops bodies. Token-minimized source surface.
  #   2. `<crabcc-index>` — one symbol per line (kind, signature, file,
  #      line range, parent). Built from `crabcc files | crabcc outline`
  #      piped through `jq -c '.[]'`. Recovers the structural metadata
  #      that `--compress` discards.
  #   3. `<crabcc-graph>` — one edge per line (caller → callee). Built
  #      from `.crabcc/graph.json` via `jq -c`. Recovers call
  #      relationships that compressed XML alone can't preserve.
  #
  # CLI-only end-to-end: `repomix`, `crabcc`, `jq`, plus the host's
  # clipboard tool (`pbcopy` / `wl-copy` / `xclip`).
  repomix-context:
    desc: Generate optimized repo context (compressed XML + crabcc index/graph) → clipboard
    vars:
      OUT: '{{.OUT | default .REPOMIX_OUT}}'
    cmds:
      # 1. Pack with --compress (structural extraction).
      - task: repomix
        vars:
          COMPRESS: "1"
          OUT: "{{.OUT}}"
      # 2. Ensure the crabcc index + call-graph sidecar are fresh.
      #    `index` is idempotent on a built repo; `refresh` is sub-second
      #    when nothing changed; `graph build` regenerates .crabcc/graph.json.
      - test -f .crabcc/index.db || crabcc index >/dev/null
      - crabcc refresh >/dev/null 2>&1 || true
      - crabcc graph build >/dev/null 2>&1 || true
      # 3. Append <crabcc-index> + <crabcc-graph> JSONL sections.
      - cmd: |
          {
            cat "{{.OUT}}"
            printf '\n<crabcc-index format="jsonl-per-symbol">\n'
            crabcc files | jq -r '.[]' | while read -r f; do
              crabcc outline "$f" 2>/dev/null | jq -c '.[]?'
            done
            printf '</crabcc-index>\n<crabcc-graph format="jsonl-per-edge">\n'
            jq -c '.callers | to_entries[] | .key as $callee | .value[] | {caller: ., callee: $callee}' .crabcc/graph.json
            printf '</crabcc-graph>\n'
          } > "{{.OUT}}.tmp" && mv "{{.OUT}}.tmp" "{{.OUT}}"
      # 4. Copy combined bundle to clipboard (cross-platform).
      - cmd: |
          case "$(uname -s)" in
            Darwin) pbcopy < "{{.OUT}}" ;;
            Linux)
              if   command -v wl-copy >/dev/null 2>&1; then wl-copy < "{{.OUT}}"
              elif command -v xclip   >/dev/null 2>&1; then xclip -selection clipboard < "{{.OUT}}"
              else echo "warn: no clipboard tool found (install wl-copy or xclip)"; fi ;;
            *) cat "{{.OUT}}" | clip ;;
          esac
      - 'wc -c "{{.OUT}}" | awk ''{ printf "size: %.1f KiB (compressed XML + index + graph)\n", $1/1024 }'''

  clean:
    desc: Remove target/, bench/results/, and any tantivy/sqlite test fixtures
    cmds:
      - "{{.CARGO}} clean"
      - rm -rf bench/results/raw.json bench/results/REPORT.md bench/results/*.png

  uninstall:
    desc: Remove crabcc binary, skill symlink, command symlink
    cmds:
      - rm -f {{.CRABCC}}
      - rm -f ~/.claude/skills/crabcc/SKILL.md
      - rm -f ~/.claude/commands/crabcc-init.md

  check-deps:
    desc: Audit dev-environment external tools (jq, yq, rg, gh, claude, …); offers install
    summary: |
      Walks required + recommended + optional buckets and prints status per
      tool. On a TTY it offers to install missing ones via the right package
      manager for the host OS (brew / apt / dnf / pacman / apk / zypper).
      Pass MODE=strict to fail-fast in CI, MODE=json for machine output.
    vars:
      MODE: '{{.MODE | default ""}}'
    cmds:
      - 'bash scripts/check-deps.sh {{if .MODE}}--{{.MODE}}{{end}}'

  coverage:
    desc: Generate code-coverage report (cargo-llvm-cov). FORMAT=html (default), lcov, text, or json
    summary: |
      Auto-installs cargo-llvm-cov on first run. Output lands in
      .summary/coverage/ (html, lcov.info, coverage.json). Use FORMAT=text
      for a quick console summary.
    vars:
      FORMAT: '{{.FORMAT | default "html"}}'
    cmds:
      - 'command -v cargo-llvm-cov >/dev/null 2>&1 || {{.CARGO}} install cargo-llvm-cov --locked'
      - 'mkdir -p .summary/coverage'
      - 'bash scripts/coverage.sh {{.FORMAT}}'

  profile-build:
    desc: Build crabcc with the `profiling` cargo profile (release codegen + debug info)
    summary: |
      The profiling profile inherits `release` (LTO=fat, opt=3, codegen-units=1)
      but adds line-table debug info and disables stripping so samply /
      flamegraph / Instruments can resolve symbols. Output binary lands at
      `target/profiling/crabcc`. See install/profiling.md for the full recipe.
    cmds:
      - '{{.CARGO}} build --profile profiling -p crabcc-cli'

  profile-index:
    desc: |
      Profile `crabcc index --root REPO_FIXTURE` with samply. REPO_FIXTURE
      defaults to mc-mothership; override via env. Auto-installs samply.
    deps: [profile-build]
    summary: |
      samply is a sampling profiler that works on macOS without sudo (uses
      mach task ports under the hood) and on Linux with perf_event_paranoid.
      Opens the result in a browser-based flamegraph viewer; pass `--save
      OUT.json` to keep the raw .json profile for later diffing.
    cmds:
      - 'command -v samply >/dev/null 2>&1 || {{.CARGO}} install samply --locked'
      - '( cd {{.REPO_FIXTURE}} && rm -rf .crabcc )'
      - 'samply record -o .summary/profile-index.json -- target/profiling/crabcc index --root {{.REPO_FIXTURE}}'
      - 'echo "" && echo "samply profile written to .summary/profile-index.json"'
      - 'echo "view interactively with:  samply load .summary/profile-index.json"'

  profile-memory-search:
    desc: |
      Profile `crabcc memory search` over a primed palace. Loads 1k canned
      drawers via memory.remember, then runs N=200 search calls hot.
    deps: [profile-build]
    vars:
      N: '{{.N | default "200"}}'
      Q: '{{.Q | default "fox jumps over"}}'
    cmds:
      - 'command -v samply >/dev/null 2>&1 || {{.CARGO}} install samply --locked'
      - 'rm -rf /tmp/crabcc-profile-mem && mkdir -p /tmp/crabcc-profile-mem'
      - 'target/profiling/crabcc --root /tmp/crabcc-profile-mem memory init >/dev/null'
      - "for i in $(seq 1 1000); do target/profiling/crabcc --root /tmp/crabcc-profile-mem memory remember \"doc:$i\" \"sample drawer body number $i with the fox jumping over a lazy dog\" >/dev/null; done"
      - "samply record -o .summary/profile-memory-search.json -- bash -c 'for i in $(seq 1 {{.N}}); do target/profiling/crabcc --root /tmp/crabcc-profile-mem memory search \"{{.Q}}\" --limit 5 >/dev/null; done'"
      - 'echo "" && echo "samply profile written to .summary/profile-memory-search.json"'
      - 'echo "view interactively with:  samply load .summary/profile-memory-search.json"'

  flamegraph-index:
    desc: |
      Alternative profile via cargo-flamegraph (SVG output). Requires DTrace
      on macOS (sudo) or perf on Linux. Use `task profile-index` instead if
      you don't want to run sudo.
    deps: [profile-build]
    cmds:
      - 'command -v flamegraph >/dev/null 2>&1 || {{.CARGO}} install flamegraph --locked'
      - '( cd {{.REPO_FIXTURE}} && rm -rf .crabcc )'
      - 'mkdir -p .summary'
      - 'flamegraph --profile profiling -p crabcc-cli -o .summary/flamegraph-index.svg -- index --root {{.REPO_FIXTURE}}'
      - 'echo "" && echo "flamegraph SVG written to .summary/flamegraph-index.svg"'

  gen-summary:
    desc: Generate paste-ready PR summary at .summary/gen-summary.md (commits, files, areas, gate status)
    summary: |
      Pure git ops; ~200 ms typical. Auto-detects the PR base from
      `gh pr view`, falls back to `git config`, then to `origin/main`.
      Wired into `task prep-pr` (final step) and the pre-commit hook so
      `gh pr create --body-file .summary/gen-summary.md` is always
      paste-ready.

      Pass BASE=… to override the base ref. Output is gitignored.
    vars:
      BASE: '{{.BASE | default ""}}'
    cmds:
      - 'bash scripts/gen-summary.sh{{if .BASE}} --base {{.BASE}}{{end}}'

  prep-pr:
    desc: One-shot pre-PR check — fmt, clippy, test, smoke, doc-build, gen-summary, log to .summary/prep-pr.txt
    summary: |
      The combined pre-PR gate. Runs everything CI would run plus a
      doc-build sanity check AND `gen-summary` (refreshes
      `.summary/gen-summary.md` for `gh pr create --body-file`).
      Captures the output for paste-into-PR-body use, exits non-zero
      on any failure. Idempotent.
        - cargo fmt --check
        - cargo clippy --workspace --all-targets -- -D warnings
        - cargo test --workspace --no-fail-fast
        - cargo doc --workspace --no-deps  (catches rustdoc warnings)
        - gen-summary (always last; never fails the gate)
      Pass NO_DOC=1 to skip the doc-build step (faster).
    vars:
      NO_DOC: '{{.NO_DOC | default "0"}}'
    cmds:
      - 'mkdir -p .summary'
      - 'bash scripts/prep-pr.sh{{if eq .NO_DOC "1"}} --no-doc{{end}}'

  openapi:
    desc: Print the embedded MCP OpenAPI spec to stdout (use `task openapi > openapi.yaml` to dump)
    summary: |
      Routes through `crabcc openapi`, which echoes the byte-identical
      copy of `crates/crabcc-mcp/openapi.yaml` embedded in the binary at
      compile time via `include_str!`. The spec is hand-maintained;
      `cargo test` enforces 1:1 sync with `tools_def()` via the
      `openapi_spec_lists_every_tool` drift test.
    deps: [build]
    cmds:
      - '{{.CRABCC}} openapi'

  openapi-codegen-viz:
    desc: Regenerate the /live frontend's TS types from crates/crabcc-viz/openapi.yaml (issue #170 phase 0)
    summary: |
      Runs `openapi-typescript` against `crates/crabcc-viz/openapi.yaml`
      and writes the generated types into
      `crates/crabcc-viz/web/src/api.gen.ts`. This is the same step that
      `bun run build` runs automatically — the standalone task is
      useful when you've edited the YAML and want to refresh types
      without a full bundle build.

      The Rust drift test `openapi_yaml_lists_every_route` (in
      `crabcc-viz/src/lib.rs`) catches the symmetric case: a new route
      handler with no schema entry fails CI.
    cmds:
      - 'cd crates/crabcc-viz/web && bun install --silent && bun run codegen'

  doc:
    desc: Build rustdoc HTML for the workspace (no deps; opens index in browser)
    summary: |
      Generates rustdoc for crabcc-core, crabcc-memory, crabcc-mcp, and
      crabcc-cli. Pass OPEN=0 to skip the browser open; pass DEPS=1 to
      include external-crate docs (slower, much larger output).
    vars:
      OPEN: '{{.OPEN | default "1"}}'
      DEPS: '{{.DEPS | default "0"}}'
    cmds:
      - '{{.CARGO}} doc --workspace --no-deps={{if eq .DEPS "1"}}false{{else}}true{{end}}{{if eq .OPEN "1"}} --open{{end}}'

  doctor:
    desc: Diagnose crabcc dev install — CLI, MCP, commands, skill, hooks; writes a debug log
    summary: |
      Pass MODE=check (default), MODE=install (re-link commands+skill, suggest
      MCP entry), or MODE=upgrade (run `crabcc upgrade --apply`). Writes a
      timestamped log under .summary/doctor-*.log for paste-into-issue use.
    vars:
      MODE: '{{.MODE | default "check"}}'
    cmds:
      - 'bash scripts/doctor.sh --{{.MODE}}'

  version:
    desc: Print the workspace version (parsed from Cargo.toml). --json for machine output.
    summary: |
      Single source of truth for "what version are we shipping". Reads
      [workspace.package].version from the top-level Cargo.toml. Other tasks
      pick up the same value via {{.CRABCC_VERSION}}.
    cmds:
      - 'bash scripts/version.sh{{if .JSON}} --json{{end}}'

  aliases:
    desc: Install developer-friendly CLI aliases (grep→rg, find→fd, …) into the user shell rc
    summary: |
      Idempotent: writes a fenced `# >>> crabcc-aliases >>>` block into
      ~/.zshrc / ~/.bashrc / ~/.config/fish/config.fish. Each alias is
      gated on `command -v <tool>` so the rc stays clean if the modern
      tool isn't installed yet. Pass MODE=remove to strip the block,
      MODE=print to dry-run.
    vars:
      MODE: '{{.MODE | default "install"}}'
    cmds:
      - 'bash scripts/install-aliases.sh{{if eq .MODE "remove"}} --remove{{end}}{{if eq .MODE "print"}} --print{{end}}'

  gpg-signing:
    desc: Set up GPG-signed commits + tags for THIS repo (ed25519 key, repo-local git config)
    summary: |
      Generates a fresh ed25519 signing-only key (or reuses one matching
      this repo's user.email), points repo-local user.signingkey at it,
      enables commit.gpgsign + tag.gpgsign for THIS repo only (no global
      pollution), and copies the armored public key to your clipboard so
      you can paste it into https://github.com/settings/gpg/new.

      Idempotent: re-running reuses an existing usable key; pass
      MODE=rotate to force a new key (old key is left in your keyring).
      MODE=print dry-runs. MODE=uninstall removes the repo-local config.

      Identity defaults to repo's `git config user.{name,email}`; override
      with GIT_USER_NAME and GIT_USER_EMAIL env vars.
    vars:
      MODE: '{{.MODE | default "install"}}'
    cmds:
      - 'bash scripts/setup-gpg-signing.sh{{if eq .MODE "rotate"}} --rotate{{end}}{{if eq .MODE "print"}} --print{{end}}{{if eq .MODE "uninstall"}} --uninstall{{end}}'

  docs-refresh:
    desc: Refresh AGENTS / README / CHANGELOG / CLAUDE / commands docs to reflect latest version
    summary: |
      Spawns a background `claude -p` session that reads the current state of
      Cargo.toml, src/, and the recent git log, then rewrites the long-form
      docs to match. Output goes to .summary/docs-refresh.log; the agent runs
      detached so the calling shell returns immediately.
      Requires the `claude` CLI on PATH. Idempotent — safe to re-run.
      Pass MODEL=sonnet|opus|haiku to override the model (default: sonnet).
    vars:
      MODEL: '{{.MODEL | default "sonnet"}}'
      LOG: .summary/docs-refresh.log
      PROMPT_FILE: .summary/docs-refresh.prompt.md
    cmds:
      - mkdir -p .summary
      - 'command -v claude >/dev/null || (echo "claude CLI not on PATH; install Claude Code first" && exit 1)'
      - |
        cat > {{.PROMPT_FILE}} <<'EOF'
        You are a docs janitor for the crabcc repository. Read the current state
        of the codebase (Cargo.toml workspace version, crates/, recent git log
        on main, CHANGELOG.md tail) and update the long-form docs so they
        reflect what's actually in the tree:

          - README.md         — usage, install, examples, current version
          - AGENTS.md         — agent / Claude Code integration surface
          - CHANGELOG.md      — append a new section for the unreleased work
                                 since the last `## v...` heading; keep older
                                 entries verbatim
          - CLAUDE.md         — project-level instructions for Claude Code
          - commands/*.md     — slash-command help that ships with the repo

        Constraints:
          - Be precise. Match identifiers, flags, and output shapes against
            the source. If unsure, run `crabcc <subcommand> --help` and the
            relevant `cargo test`s to confirm before writing.
          - Preserve the existing tone, headings, and section ordering.
          - Do NOT touch ARCHITECTURE.md, schema files, or anything under
            target/, .repomix/, .crabcc/, or assets/.
          - When done, print a summary of changed files + line counts.

        Run end-to-end without further prompting.
        EOF
      - 'echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] starting docs refresh ({{.MODEL}})" > {{.LOG}}'
      - 'nohup claude -p "$(cat {{.PROMPT_FILE}})" --model {{.MODEL}} >> {{.LOG}} 2>&1 &'
      - 'echo "spawned (pid=$!); follow with: tail -f {{.LOG}}"'
   
  images-build-nocache-apple:
    desc: Build crabcc images using Apple Containers (macOS 26 native runtime)
    vars:
      GIT_SHA:
        sh: git rev-parse --short HEAD 2>/dev/null || echo unknown
      BUILD_DATE:
        sh: date -u +%Y-%m-%dT%H:%M:%SZ
      VERSION:
        sh: bash scripts/version.sh 2>/dev/null || echo dev
    cmds:
      - >-
        container build --no-cache --pull
        --build-arg "RUST_VERSION=${RUST_VERSION:-1.86}"
        --build-arg "GIT_SHA={{.GIT_SHA}}"
        --build-arg "BUILD_DATE={{.BUILD_DATE}}"
        --build-arg "VERSION={{.VERSION}}"
        -t crabcc:local
        -t crabcc:{{.VERSION}}
        -t crabcc:{{.GIT_SHA}}
        -f install/Dockerfile.crabcc .

  # ─── setup ───────────────────────────────────────────────────────────────────
  setup:
    desc: Bootstrap full dev environment — uv, Rust, Ollama, pull model, start ollama-stack
    summary: |
      One-shot setup for a fresh machine. Idempotent — safe to re-run.
      Steps:
        1. Install uv (Python pkg manager, needed for free-claude-code)
        2. Verify Rust/cargo is on PATH (install hint if missing)
        3. Install Ollama via Homebrew if missing
        4. Pull the default Apple-optimized model
        5. Bring up the ollama-stack (Apple Containers → Docker)
    cmds:
      - |
        if ! command -v uv >/dev/null 2>&1; then
          echo "▶ Installing uv..."
          curl -LsSf https://astral.sh/uv/install.sh | sh
        else
          echo "✓ uv $(uv --version)"
        fi
      - |
        if ! command -v cargo >/dev/null 2>&1; then
          echo "✗ Rust not found — install: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh"
          exit 1
        else
          echo "✓ $(cargo --version)"
        fi
      - |
        if ! command -v ollama >/dev/null 2>&1; then
          echo "▶ Installing Ollama..."
          brew install ollama
        else
          echo "✓ ollama $(ollama --version 2>&1 | head -1)"
        fi
      - 'ollama pull qwen3.5:35b-a3b-coding-nvfp4'
      - 'ollama pull qwen2.5-coder'
      - 'bash install/ollama-stack/start.sh'

  # ─── telemetry (issues #86 + #90) ────────────────────────────────────────
  telemetry-watch:
    desc: Live-tail .crabcc/telemetry.jsonl with csvlens (sortable, filterable)
    cmds:
      - |
        FILE="${CRABCC_TELEMETRY_FILE:-.crabcc/telemetry.jsonl}"
        command -v csvlens >/dev/null && csvlens "$FILE" || { echo "csvlens missing: cargo install csvlens"; tail -f "$FILE" | jq .; }
    interactive: true

  telemetry-rotel:
    desc: Start rotel OTLP collector (:4317 gRPC, :4318 HTTP) — issue #86
    summary: |
      rotel receives OTLP spans from crabcc and forwards to the /live dashboard.
      Aggregated data stays in-memory — NEVER written to _internal.db / index.db.
      Set: export OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318
    cmds:
      - |
        command -v rotel >/dev/null || cargo install rotel
        echo "▶ rotel :4317 gRPC  :4318 HTTP"
        echo "  export OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318"
        rotel start --otlp-grpc-port 4317 --otlp-http-port 4318 --exporter blackhole
    interactive: true

  telemetry-status:
    desc: Show telemetry pipeline status (jsonl, OTLP, Telegram)
    cmds:
      - |
        FILE="${CRABCC_TELEMETRY_FILE:-.crabcc/telemetry.jsonl}"
        echo "── telemetry status ─────────────────────────────────────"
        [ -f "$FILE" ] && echo "  jsonl:    $FILE ($(wc -l < "$FILE") events)" || echo "  jsonl:    (not yet created)"
        [ -n "${OTEL_EXPORTER_OTLP_ENDPOINT:-}" ] && echo "  OTLP:     $OTEL_EXPORTER_OTLP_ENDPOINT" || echo "  OTLP:     disabled"
        [ -n "${TELEGRAM_BOT_TOKEN:-}" ] && echo "  Telegram: configured" || echo "  Telegram: disabled"
        echo "  NOTE: telemetry NEVER written to index.db or _internal.db"

  db-inspect:
    desc: 'Open a crabcc SQLite DB with csvlens. Usage: task db-inspect DB=.crabcc/index.db'
    vars:
      DB: '{{.DB | default ".crabcc/index.db"}}'
    cmds:
      - |
        command -v csvlens >/dev/null || { echo "cargo install csvlens"; exit 1; }
        csvlens "{{.DB}}"
    interactive: true

  # ─── ollama stack ─────────────────────────────────────────────────────────
  # ─── telegram bot ─────────────────────────────────────────────────────────
  telegram-bot:
    desc: Run CrabCC_bot (Telegram). Reads TELEGRAM_BOT_TOKEN from env.
    summary: |
      Required env vars (set in .env or shell):
        TELEGRAM_BOT_TOKEN   — from BotFather (never commit)
      Optional:
        CRABCC_SERVE_URL     — default http://localhost:8090
        CRABCC_PUBLIC_URL    — public HTTPS URL for WebApp dashboard button
                               e.g. from `ngrok http 8090` or cloudflared
        ALLOWED_TELEGRAM_IDS — comma-separated Telegram user IDs (empty = open)
    cmds:
      - '{{.CARGO}} run -p crabcc-telegram --release'

  telegram-bot-dev:
    desc: Run CrabCC_bot in dev mode with RUST_LOG=debug
    cmds:
      - 'RUST_LOG=crabcc_telegram=debug {{.CARGO}} run -p crabcc-telegram'

  # ─── BullMQ jobs (issue #109) ────────────────────────────────────────────
  jobs-up:
    desc: Start Redis + jobs-worker via Apple Containers → Docker (--profile jobs)
    cmds:
      - |
        CMD="docker compose"; command -v container &>/dev/null && CMD="container compose"
        $CMD -f install/dev/docker-compose.yml --profile jobs up -d --build --wait
        echo "✓ jobs stack running  worker health :3002"

  jobs-board:
    desc: Start jobs stack + Bull Board at :3001 (--profile dev-tools)
    cmds:
      - |
        CMD="docker compose"; command -v container &>/dev/null && CMD="container compose"
        $CMD -f install/dev/docker-compose.yml --profile jobs --profile dev-tools up -d --build --wait
        echo "✓ Bull Board at http://localhost:${BULL_BOARD_PORT:-3001}"

  jobs-down:
    desc: Stop the jobs stack (Redis + worker + Bull Board)
    cmds:
      - |
        CMD="docker compose"; command -v container &>/dev/null && CMD="container compose"
        $CMD -f install/dev/docker-compose.yml --profile jobs --profile dev-tools down

  jobs-e2e:
    desc: End-to-end jobs integration test (Apple Containers → Docker)
    cmds:
      - 'bash tests/integration/test_jobs_e2e.sh'

  jobs-submit:
    desc: 'Submit a job from the CLI — example: task jobs-submit QUEUE=agent:run PROMPT="audit this repo"'
    vars:
      QUEUE:  '{{.QUEUE  | default "agent:run"}}'
      PROMPT: '{{.PROMPT | default "list the top 3 hot paths in this repo"}}'
    cmds:
      - |
        REMOTE=$(git remote get-url origin 2>/dev/null || true)
        {{.CRABCC}} jobs submit \
          --queue "{{.QUEUE}}" \
          --name  "taskfile-$(date +%s)" \
          --data  "{\"prompt\":\"{{.PROMPT}}\"}" \
          --agent-name "cli-submit" \
          --repo-path  "$(pwd)" \
          --github-url "$REMOTE"

  # ─── ollama stack ─────────────────────────────────────────────────────────
  ollama-stack-up:
    desc: Bring up the ollama-stack (Apple Containers → Docker) with LiteLLM + Caddy
    cmds:
      - 'bash install/ollama-stack/start.sh'

  ollama-stack-down:
    desc: Tear down the ollama-stack
    cmds:
      - 'bash install/ollama-stack/start.sh --down'

  ollama-stack-status:
    desc: Show ollama-stack container status
    cmds:
      - 'bash install/ollama-stack/start.sh --status'

  # ─── crabcc fetch ───────────────────────────────────────────────────────
  fetch:
    desc: 'Fetch URLs from a prompt — example: task fetch -- "see https://example.com and https://rust-lang.org"'
    cmds:
      - '{{.CRABCC}} fetch "{{.CLI_ARGS}}"'
