# https://taskfile.dev — install with `brew install go-task` or
# `go install github.com/go-task/task/v3/cmd/task@latest`.
#
# Quick start (the daily-driver targets):
#   task                    # build + test (the default)
#   task install            # `cargo install` to ~/.cargo/bin/crabcc
#   task ci                 # full local CI (fmt + clippy + test + smoke)
#   task act                # run CI via act/Docker — full workspace (push-mode)
#   task act-pr             # run CI via act/Docker — scoped to diff (PR-mode)
#   task local-ci           # snapshot fmt+clippy+test to .summary/local-ci.txt
#                           # (used in PR descriptions when GH CI is offline)
#   task coverage           # generate code-coverage report (cargo-llvm-cov)
#   task version            # print the workspace version (Cargo.toml truth)
#
# Local dev pipeline (seamless end-to-end commands):
#   task dev:local:start    # pull fresh main → new worktree + branch (BRANCH=feat/…)
#   task dev:local:ship     # autofix → commit → CI → push → PR (MSG='…')
#   task dev:local:bump     # semver bump → CHANGELOG → README → docs (BUMP=minor)
#   task dev:local:build-prod  # optimized release → non-root hardened Docker image
#   task dev:clean:all         # stash + prune old worktrees + sync + install deps
#
# Workflow extras (one-off / situational):
#   task viz                # localhost call-graph viewer (issue #64)
#   task bench              # raw-CLI A/B benchmark + visualization
#   task bench-compress     # FSST off-vs-on gate bench
#   task bench-mcp-transport  # Mastodon + transport micro-benchmarks (token, SSE, gzip, msgpack)
#   task bench-mcp-all        # all MCP benchmarks (agent workload + mastodon transport)
#   task bench-mcp-remote     # run MCP benchmarks on dev-cx53 (AMD EPYC, 16 vCPU) via rsync+ssh
#   task bench-mcp-remote-fast # quick remote bench (fast iteration)
#   task release            # cut a tag; CI workflow handles the rest
#   task check-deps         # audit external dev tools (jq/yq/rg/gh/…)
#   task doctor             # diagnose crabcc dev install (CLI/MCP/skill/hooks)
#   task aliases            # install grep→rg / find→fd / etc. shell aliases
#   task docs-refresh       # spawn background `claude -p` to update docs
#
# Pass `task --list` for everything (descriptions auto-render).
#
# Modular layout — tasks live in taskfiles/:
#   taskfiles/build.yml      build, test, lint, fmt, smoke, coverage, images-*
#   taskfiles/install.yml    install, man, aliases, doctor, version, setup
#   taskfiles/release.yml    release, local-ci, prep-pr, gen-summary, docs-refresh
#   taskfiles/bench.yml      bench, bench-compress, memory-smoke, memory-bench
#   taskfiles/viz.yml        viz, repomix, repomix-context, docs:ingest
#   taskfiles/ollama.yml     ollama-bootstrap, ollama-stack-*, ask, agent-runtime-smoke
#   taskfiles/docker.yml     docker-build/push/sbom, setup-orbstack
#   taskfiles/telemetry.yml  telemetry-*, db-inspect, fetch
#   taskfiles/profile.yml    profile-build/index, flamegraph-index
#   taskfiles/e2e.yml        e2e, e2e:dashboard, e2e:graph, e2e:cli, …
#   taskfiles/cron.yml       cron-lint, cron-test
#   taskfiles/index-publish.yml  index-publish-lint, index-publish-test
#   taskfiles/dev-local.yml  dev:local:start/ship/bump/build-prod

version: '3'

# Prefix every output line with the generating task's name so multi-step
# pipelines (dev:local:ship, ci, etc.) are easy to attribute at a glance.
output: prefixed

vars:
  # Default to sibling directory under the current user's home so any
  # developer can run bench tasks without setting env vars.
  REPO_FIXTURE: '{{.REPO_FIXTURE | default (printf "%s/workspace/mc-mothership" .HOME)}}'

  # Toolchain entry points. Centralized so a swap (e.g. `cross` for
  # cross-compilation) ripples to every task without find/replace.
  CARGO: cargo
  RUSTC: rustc
  GH:    gh

  # Binaries we ship + the conventional install location.
  # Use {{.HOME}} (not ~) for cross-shell reliability.
  CARGO_BIN:    '{{.HOME}}/.cargo/bin'
  CRABCC:       '{{.HOME}}/.cargo/bin/crabcc'
  CCC:          '{{.HOME}}/.cargo/bin/ccc'

  # State directories. Per-repo .crabcc/ holds the symbol index and graph
  # sidecar; ~/.crabcc/ holds the singleton _internal.db (agent runs,
  # cli_calls, manager heartbeats) shared across repos.
  # Anchored to {{.ROOT_DIR}} so `task` invoked from a subdirectory resolves correctly.
  REPO_CRABCC_DIR:   '{{.ROOT_DIR}}/.crabcc'
  INDEX_DB:          '{{.ROOT_DIR}}/.crabcc/index.db'
  GRAPH_JSON:        '{{.ROOT_DIR}}/.crabcc/graph.json'
  USER_CRABCC_DIR:   '{{.HOME}}/.crabcc'
  INTERNAL_DB:       '{{.HOME}}/.crabcc/_internal.db'


  # Repomix output (token-minimized bundle for LLM ingestion).
  REPOMIX_OUT: '{{.ROOT_DIR}}/.repomix/crabcc.xml'

  # Single source of truth for the workspace version. Other tasks read
  # through {{.CRABCC_VERSION}} so bumping Cargo.toml flips banners,
  # release messages, and `task version` automatically.
  # NOTE: this shell command runs on every `task` invocation including
  # `task --list`. Keep scripts/version.sh fast (grep, no cargo invocations).
  CRABCC_VERSION:
    sh: bash scripts/version.sh

includes:
  build:         { taskfile: taskfiles/build.yml,         flatten: true }
  install:       { taskfile: taskfiles/install.yml,       flatten: true }
  release:       { taskfile: taskfiles/release.yml,       flatten: true }
  bench:         { taskfile: taskfiles/bench.yml,         flatten: true }
  viz:           { taskfile: taskfiles/viz.yml,           flatten: true }
  ollama:        { taskfile: taskfiles/ollama.yml,        flatten: true }
  docker:        { taskfile: taskfiles/docker.yml,        flatten: true }
  telemetry:     { taskfile: taskfiles/telemetry.yml,     flatten: true }
  profile:       { taskfile: taskfiles/profile.yml,       flatten: true }
  e2e:           { taskfile: taskfiles/e2e.yml,           flatten: true }
  cron:          { taskfile: taskfiles/cron.yml,          flatten: true }
  index-publish: { taskfile: taskfiles/index-publish.yml, flatten: true }
  dev-local:     { taskfile: taskfiles/dev-local.yml,     flatten: true }

tasks:
  default:
    desc: Build + test (the daily-driver task)
    cmds:
      - task: build
      - task: test

  mastodon-setup:
    desc: One-shot Mastodon token setup. Pass TOKEN=... or paste interactively.
    summary: |
      Creates .env.mastodon (gitignored) with MASTODON_TOKEN.
      Tests the connection via mastodon.verify when crabcc is built.

      Usage:
        task mastodon-setup TOKEN=a1b2c3...   # non-interactive
        task mastodon-setup                    # prompts for token
        task mastodon-setup TOKEN=... BOT=crabcc  # per-bot token (writes MASTODON_TOKEN_CRABCC)
        task mastodon-setup INSTANCE=https://mastodon.social TOKEN=...

      Where to get a token:
        Go to <INSTANCE>/settings/applications → New Application
        Scopes: write:statuses (to post), read:statuses (to read)
        Copy the "access token" (not client id or secret) — it's ~64 hex chars.

      The token is stored in .env.mastodon (gitignored, stays local).
      crabcc-mcp reads from the environment at runtime, not from this file.
      To activate, source the file or copy the line into your env config.
    vars:
      INSTANCE: '{{.INSTANCE | default "https://social.crabcc.app"}}'
      BOT: '{{.BOT | default ""}}'
      TOKEN: '{{.TOKEN | default ""}}'
      ENV_FILE: '{{.ROOT_DIR}}/.env.mastodon'
    cmds:
      - |
        TOKEN_VAL="{{.TOKEN}}"
        if [ -z "$TOKEN_VAL" ]; then
          echo ""
          echo "  No TOKEN= passed. Create one at:"
          echo "    {{.INSTANCE}}/settings/applications"
          echo "  Scopes needed: write:statuses + read:statuses"
          echo ""
          printf "  Paste your access token: "
          read -r TOKEN_VAL
        fi
        if [ -z "$TOKEN_VAL" ]; then
          echo "error: no token provided — pass TOKEN=... or paste when prompted"
          exit 1
        fi
        KEY="MASTODON_TOKEN"
        if [ -n "{{.BOT}}" ]; then
          KEY="MASTODON_TOKEN_{{.BOT | upper}}"
        fi
        echo "${KEY}=${TOKEN_VAL}" > {{.ENV_FILE}}
        echo ""
        echo "  ✓ wrote ${KEY} to {{.ENV_FILE}}"
        echo "  To activate:  source {{.ENV_FILE}}"
        echo "  Or add to your systemd env file / MCP config / shell profile."
        echo ""
        echo "  Then run:  task mastodon-test"

  mastodon-test:
    desc: Verify Mastodon token works (requires crabcc built + MASTODON_TOKEN set).
    summary: |
      Calls mastodon.verify through the MCP server to check:
      - Token is valid (returns account username)
      - Instance is reachable (returns domain + version)
      - Rate limits aren't exhausted

      Prerequisites:
        task mastodon-setup   (or MASTODON_TOKEN in the environment)
        task build            (crabcc binary must be built)
    vars:
      INSTANCE: '{{.INSTANCE | default "https://social.crabcc.app"}}'
    cmds:
      - |
        if [ -z "$MASTODON_TOKEN" ]; then
          if [ -f {{.ROOT_DIR}}/.env.mastodon ]; then
            source {{.ROOT_DIR}}/.env.mastodon
          fi
        fi
        if [ -z "$MASTODON_TOKEN" ]; then
          echo "error: MASTODON_TOKEN not set — run 'task mastodon-setup' first"
          exit 1
        fi
        echo "→ verifying Mastodon token..."
        {{.CRABCC}} serve --http 127.0.0.1:9999 --dev &
        SERVER_PID=$!
        sleep 1
        RESP=$(curl -sf http://127.0.0.1:9999/mcp \
          -H "Content-Type: application/json" \
          -d '{"jsonrpc":"2.0","id":1,"method":"tools/call","params":{"name":"mastodon.verify","arguments":{}}}' 2>&1) || true
        kill $SERVER_PID 2>/dev/null
        if echo "$RESP" | grep -q '"username"'; then
          echo "$RESP" | python3 -c "import sys,json;r=json.load(sys.stdin);t=r['result']['content'][0]['text'];d=json.loads(t);a=d.get('account',{});i=d.get('instance',{});print(f'  ✓ authenticated as @{a.get(\"acct\",\"?\")} ({a.get(\"display_name\",\"?\")})');print(f'  ✓ instance: {i.get(\"domain\",\"?\")}  v{i.get(\"version\",\"?\")}');"
        else
          echo "  ✗ verify failed. Raw response:"
          echo "$RESP"
          echo ""
          echo "  Check that:"
          echo "    - MASTODON_TOKEN is a full access token (~64 chars)"
          echo "    - The token hasn't been revoked"
          echo "    - The instance {{.INSTANCE | default \"https://social.crabcc.app\"}} is reachable"
          exit 1
        fi

  forgejo-theme:
    desc: Deploy the crabcc design system to git.crabcc.app (Forgejo).
    summary: |
      Interactive menu-driven Forgejo theme deployment. Copies
      install/forgejo/crabcc-theme.css and configures app.ini.

      Non-interactive: task forgejo-theme HOST=git.crabcc.app MODE=ssh
      Modes: ssh (rsync), local (cp), docker (copy to volume), nixos (print config)
    vars:
      HOST: '{{.HOST | default ""}}'
      MODE: '{{.MODE | default ""}}'
      CSS: '{{.ROOT_DIR}}/install/forgejo/crabcc-theme.css'
    cmds:
      - |
        MODE="{{.MODE}}"
        HOST="{{.HOST}}"
        if [ -z "$MODE" ]; then
          echo ""
          echo "  🦀 crabcc forgejo theme — deploy to git.crabcc.app"
          echo "  ─────────────────────────────────────────────────"
          echo "  1) ssh   — rsync to a remote Forgejo host"
          echo "  2) local — copy into local /var/lib/forgejo/"
          echo "  3) docker — copy into a running container"
          echo "  4) nixos — print NixOS config snippet"
          echo ""
          printf "  pick [1-4]: "
          read -r CHOICE
          case "$CHOICE" in
            1) MODE=ssh;;
            2) MODE=local;;
            3) MODE=docker;;
            4) MODE=nixos;;
            *) echo "invalid choice"; exit 1;;
          esac
        fi
        if [ "$MODE" = "ssh" ]; then
          if [ -z "$HOST" ]; then
            printf "  host (e.g. root@git.crabcc.app): "
            read -r HOST
          fi
          echo "→ rsync theme to $HOST..."
          rsync -avz {{.CSS}} "$HOST:/var/lib/forgejo/custom/public/assets/css/crabcc-theme.css"
          ssh "$HOST" "sed -i '/^THEMES/c\THEMES = crabcc,crabcc-dark' /etc/forgejo/app.ini 2>/dev/null || echo 'THEMES = crabcc,crabcc-dark' >> /etc/forgejo/app.ini"
          ssh "$HOST" "sed -i '/^DEFAULT_THEME/c\DEFAULT_THEME = crabcc-dark' /etc/forgejo/app.ini 2>/dev/null || echo 'DEFAULT_THEME = crabcc-dark' >> /etc/forgejo/app.ini"
          ssh "$HOST" "systemctl restart forgejo 2>/dev/null || docker restart forgejo 2>/dev/null || echo '⚠ restart forgejo manually'"
          echo "✓ deployed to $HOST"
        elif [ "$MODE" = "local" ]; then
          sudo cp {{.CSS}} /var/lib/forgejo/custom/public/assets/css/crabcc-theme.css
          grep -q 'THEMES.*crabcc' /etc/forgejo/app.ini 2>/dev/null || echo 'THEMES = crabcc,crabcc-dark' | sudo tee -a /etc/forgejo/app.ini
          grep -q 'DEFAULT_THEME.*crabcc' /etc/forgejo/app.ini 2>/dev/null || echo 'DEFAULT_THEME = crabcc-dark' | sudo tee -a /etc/forgejo/app.ini
          sudo systemctl restart forgejo
          echo "✓ deployed locally"
        elif [ "$MODE" = "docker" ]; then
          CONTAINER="${CONTAINER:-forgejo}"
          docker cp {{.CSS}} "$CONTAINER:/data/gitea/public/assets/css/crabcc-theme.css"
          docker exec "$CONTAINER" sh -c "grep -q 'THEMES.*crabcc' /data/gitea/conf/app.ini || echo 'THEMES = crabcc,crabcc-dark' >> /data/gitea/conf/app.ini"
          docker exec "$CONTAINER" sh -c "grep -q 'DEFAULT_THEME.*crabcc' /data/gitea/conf/app.ini || echo 'DEFAULT_THEME = crabcc-dark' >> /data/gitea/conf/app.ini"
          docker restart "$CONTAINER"
          echo "✓ deployed to container $CONTAINER"
        elif [ "$MODE" = "nixos" ]; then
          echo ""
          echo "  Add to your NixOS config:"
          echo ""
          echo "  services.forgejo.settings.ui = {"
          echo "    THEMES = \"crabcc,crabcc-dark\";"
          echo "    DEFAULT_THEME = \"crabcc-dark\";"
          echo "  };"
          echo ""
          echo "  systemd.tmpfiles.rules = ["
          echo '    "C /var/lib/forgejo/custom/public/assets/css/crabcc-theme.css 0644 forgejo forgejo - ${./install/forgejo/crabcc-theme.css}"'
          echo "  ];"
          echo ""
          echo "✓ config snippet printed — paste into configuration.nix and rebuild"
        fi
        echo "  open https://git.crabcc.app → Settings → Appearance → crabcc-dark"

  release-post:
    desc: Post release notes to Mastodon (social.crabcc.app). Reads MASTODON_TOKEN from env or .env.mastodon.
    summary: |
      Posts a 3-part release announcement thread to Mastodon.
      Requires MASTODON_TOKEN (run `task mastodon-setup` first if needed).

      Non-interactive: task release-post VERSION=6.4.0
    vars:
      VERSION: '{{.VERSION | default "6.4.0"}}'
    cmds:
      - |
        if [ -z "$MASTODON_TOKEN" ]; then
          [ -f {{.ROOT_DIR}}/.env.mastodon ] && source {{.ROOT_DIR}}/.env.mastodon
        fi
        if [ -z "$MASTODON_TOKEN" ]; then
          echo "error: MASTODON_TOKEN not set — run 'task mastodon-setup' first"
          exit 1
        fi
        echo "→ posting release notes for v{{.VERSION}}..."
        {{.CRABCC}} serve --http 127.0.0.1:9999 --dev &
        PID=$!
        sleep 1
        post() {
          local TEXT="$1"
          local REPLY_TO="$2"
          local ARGS=$(jq -n --arg text "$TEXT" ${REPLY_TO:+--arg reply "$REPLY_TO"} \
            '{text:$text}' ${REPLY_TO:+'+ {in_reply_to_id:$reply}'})
          curl -sf http://127.0.0.1:9999/mcp \
            -H "Content-Type: application/json" \
            -d "{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"tools/call\",\"params\":{\"name\":\"mastodon.post\",\"arguments\":$ARGS}}" \
            | jq -r '.result.content[0].text' | jq -r '.id' 2>/dev/null
        }
        P1=$(post $'🦀 crabcc v{{.VERSION}}\n\nAI agents can now post to Mastodon. The MCP server grew three new tools:\n• mastodon.post — write statuses\n• mastodon.read — read timelines\n• mastodon.verify — check credentials\n\nPlus: HTTP transport with SSE + gzip + MessagePack, admin dashboard, Forgejo theme, NixOS gateway hardening. 136 tests, 27 security probes.')
        echo "  ✓ post 1/3 → $P1"
        P2=$(post $'🔐 Security-first design:\n• Tokens from environment only — never in MCP args\n• Rate limiting: 5 posts/48h per token\n• SSRF-protected URL validation\n• SHA-256 for cache/rate-limit keys\n• Mutex poison recovery — one panic won\'t kill the server\n\n🌐 HTTP transport: POST /mcp, GET /sse, GET / (dashboard)\n📦 Content negotiation: JSON + MessagePack (30-50% smaller)' "$P1")
        echo "  ✓ post 2/3 → $P2"
        P3=$(post $'🚀 Get started:\n  task mastodon-setup TOKEN=...\n  task build\n  task mastodon-test\n\n🎨 Forgejo theme:\n  task forgejo-theme   # interactive deploy\n\n📋 Full changelog: https://git.crabcc.app/crabcc/crabcc/src/branch/main/CHANGELOG.md' "$P2")
        echo "  ✓ post 3/3 → $P3"
        kill $PID 2>/dev/null
        echo "✓ release posted — https://social.crabcc.app/@crabcc"

