# https://taskfile.dev — install with `brew install go-task` or
# `go install github.com/go-task/task/v3/cmd/task@latest`.
#
# Quick start (the daily-driver targets):
#   task                    # build + test (the default)
#   task install            # `cargo install` to ~/.cargo/bin/crabcc
#   task ci                 # full local CI (fmt + clippy + test + smoke)
#   task local-ci           # snapshot fmt+clippy+test to .summary/local-ci.txt
#                           # (used in PR descriptions when GH CI is offline)
#   task coverage           # generate code-coverage report (cargo-llvm-cov)
#   task version            # print the workspace version (Cargo.toml truth)
#
# Workflow extras (one-off / situational):
#   task viz                # localhost call-graph viewer (issue #64)
#   task bench              # raw-CLI A/B benchmark + visualization
#   task bench-compress     # FSST off-vs-on gate bench
#   task release            # cut a tag; CI workflow handles the rest
#   task check-deps         # audit external dev tools (jq/yq/rg/gh/…)
#   task doctor             # diagnose crabcc dev install (CLI/MCP/skill/hooks)
#   task aliases            # install grep→rg / find→fd / etc. shell aliases
#   task docs-refresh       # spawn background `claude -p` to update docs
#
# Pass `task --list` for everything (descriptions auto-render).

version: '3'

vars:
  REPO_FIXTURE: '{{.REPO_FIXTURE | default "/Users/peter.lodri/workspace/mc-mothership"}}'
  CARGO: cargo
  CRABCC: ~/.cargo/bin/crabcc
  # Single source of truth for the workspace version. Other tasks read
  # through {{.CRABCC_VERSION}} so bumping Cargo.toml flips banners,
  # release messages, and `task version` automatically.
  CRABCC_VERSION:
    sh: bash scripts/version.sh

tasks:
  default:
    desc: Build + test (the daily-driver task)
    cmds:
      - task: build
      - task: test

  build:
    desc: Release build (LTO=fat — slower compile, ~5–10% faster runtime)
    cmds:
      - "{{.CARGO}} build --release"

  build-fast:
    desc: Iteration-friendly build (-O1, minimal debug info, ~half the time)
    cmds:
      - "{{.CARGO}} build --profile dev-fast"

  test:
    desc: Run all 60 unit tests across the workspace
    cmds:
      - "{{.CARGO}} test --workspace"

  fmt:
    desc: Format all Rust files
    cmds:
      - "{{.CARGO}} fmt --all"

  fmt-check:
    desc: Check formatting without modifying files (CI gate)
    cmds:
      - "{{.CARGO}} fmt --all -- --check"

  lint:
    desc: Strict clippy — fails on any warning
    cmds:
      - "{{.CARGO}} clippy --workspace --all-targets -- -D warnings"

  chore:
    desc: All-in-one DX chore — fmt, lint, test, dmg, doctor. Use before opening a release PR.
    summary: |
      Runs the full validation chain that gates a release-ready PR:
      fmt-check → clippy (-D warnings) → tests → DMG build →
      doctor --quiet. Each step short-circuits on failure so you see
      the first thing that broke. Stand-alone — does not run prep-pr
      or write any artifacts beyond dist/crabcc-<version>.dmg.
    cmds:
      - task: fmt-check
      - task: lint
      - task: test
      - task: dmg
      - task: doctor
      - task: agent-status

  agent-status:
    desc: Snapshot of the singleton agent-runs DB — active, recent, and kill events.
    cmds:
      - "{{.CRABCC}} agent-ls --limit 10"
      - "{{.CRABCC}} agent-kills --limit 10"

  dmg:
    desc: Build dist/crabcc-<version>.dmg — installer .app + menubar UI + LaunchAgent (issue #107)
    summary: |
      Stages installer/Crabcc.app, populates Resources/ with release-mode
      crabcc/ccc binaries, skill/, commands/, and install-aliases.sh,
      compiles the menubar Swift shim, ad-hoc codesigns the bundle, then
      packages it into dist/crabcc-<version>.dmg via hdiutil. The .app
      shows up in System Settings → Privacy & Security → App Management
      thanks to the proper Info.plist + ad-hoc signature.
      Pass SKIP_BUILD=1 to reuse target/release/{crabcc,ccc} unchanged.
    vars:
      SKIP_BUILD: '{{.SKIP_BUILD | default ""}}'
    cmds:
      - bash scripts/build-dmg.sh {{if .SKIP_BUILD}}--skip-build{{end}}

  install:
    desc: Cargo install crabcc to ~/.cargo/bin/crabcc; auto-bootstraps shell aliases (idempotent)
    summary: |
      Builds release, installs the binary to ~/.cargo/bin/crabcc, then
      runs scripts/install-aliases.sh which writes a fenced
      `# >>> crabcc-aliases >>>` block into ~/.zshrc / ~/.bashrc /
      fish config — only on shells that exist, only if the block isn't
      already present (idempotent — safe to re-run).
      Pass NO_ALIASES=1 to skip the alias step.
    deps: [build]
    vars:
      NO_ALIASES: '{{.NO_ALIASES | default ""}}'
    cmds:
      - "{{.CARGO}} install --path crates/crabcc-cli --force"
      - "{{.CRABCC}} --version"
      - 'if [ -z "{{.NO_ALIASES}}" ]; then bash scripts/install-aliases.sh; else echo "NO_ALIASES=1 — skipping alias bootstrap"; fi'

  aliases-check:
    desc: Detect whether crabcc shell aliases are installed (read-only)
    summary: |
      Greps ~/.zshrc / ~/.bashrc / ~/.config/fish/config.fish for the
      fenced `# >>> crabcc-aliases >>>` block written by
      scripts/install-aliases.sh. Prints status per shell rc and exits 0
      if at least one shell has the block, 1 if none do. Pure detection —
      never modifies any file. Use `task aliases` to install if missing.
    silent: true
    cmds:
      - |
        installed=0
        any_rc=0
        for rc in "$HOME/.zshrc" "$HOME/.bashrc" "$HOME/.config/fish/config.fish"; do
          if [ -f "$rc" ]; then
            any_rc=1
            if grep -q '# >>> crabcc-aliases >>>' "$rc"; then
              echo "✓ $rc — aliases installed"
              installed=1
            else
              echo "✗ $rc — aliases missing"
            fi
          fi
        done
        if [ "$any_rc" = "0" ]; then
          echo "no shell rc files found (~/.zshrc, ~/.bashrc, ~/.config/fish/config.fish)"
          exit 1
        fi
        if [ "$installed" = "1" ]; then
          echo "" && echo "→ at least one shell has aliases. Run \`task aliases\` to (re-)install on others."
          exit 0
        else
          echo "" && echo "→ aliases not installed in any shell. Run \`task aliases\` (or \`task install\`) to install."
          exit 1
        fi

  install-upgrade-smoke:
    desc: Smoke-test install.sh upgrade-on-rerun (closes #24)
    summary: |
      Verifies the upgrade path: runs install.sh once (build), records
      the resulting version, runs install.sh --check (must report up
      to date), then runs install.sh again (must short-circuit to a
      no-op build). Idempotency is the contract.
        - first run         build path
        - --check           no writes; reports up-to-date
        - second run        no-op build skip
      Manual platform sweep target — runs locally on macOS arm64 and
      linux x86_64 (per the issue spec). Output captured at
      .summary/install-upgrade-smoke.txt.
    cmds:
      - mkdir -p .summary
      - 'echo "=== first run (initial install or upgrade) ==="           | tee .summary/install-upgrade-smoke.txt'
      - 'bash install.sh 2>&1                                            | tee -a .summary/install-upgrade-smoke.txt'
      - 'echo "" && echo "=== version probe ==="                         | tee -a .summary/install-upgrade-smoke.txt'
      - '{{.CRABCC}} --version                                           | tee -a .summary/install-upgrade-smoke.txt'
      - 'echo "" && echo "=== --check (read-only) ==="                   | tee -a .summary/install-upgrade-smoke.txt'
      - 'bash install.sh --check 2>&1                                    | tee -a .summary/install-upgrade-smoke.txt'
      - 'echo "" && echo "=== second run (must be a no-op) ==="          | tee -a .summary/install-upgrade-smoke.txt'
      - 'bash install.sh 2>&1                                            | tee -a .summary/install-upgrade-smoke.txt'
      - 'echo "" && echo "=== second-run version (must equal first) ===" | tee -a .summary/install-upgrade-smoke.txt'
      - '{{.CRABCC}} --version                                           | tee -a .summary/install-upgrade-smoke.txt'
      - 'grep -q "no-op build skip" .summary/install-upgrade-smoke.txt || (echo "FAIL: no-op message not seen on second run" && exit 1)'
      - 'echo "" && echo "✓ upgrade-on-rerun smoke passed"               | tee -a .summary/install-upgrade-smoke.txt'

  install-skill:
    desc: Symlink the skill + slash command into ~/.claude/
    cmds:
      - mkdir -p ~/.claude/skills/crabcc ~/.claude/commands
      - ln -sf "$(pwd)/skill/crabcc/SKILL.md" ~/.claude/skills/crabcc/SKILL.md
      - ln -sf "$(pwd)/commands/crabcc-init.md" ~/.claude/commands/crabcc-init.md
      - ln -sf "$(pwd)/commands/crabcc-upgrade.md" ~/.claude/commands/crabcc-upgrade.md
      - ln -sf "$(pwd)/commands/crabcc-install.md" ~/.claude/commands/crabcc-install.md
      - 'echo "skill + 3 commands symlinked. Add the MCP server to ~/.claude.json manually if needed."'

  system-check:
    desc: Verify host (RAM / disk / arch / daemon) can run the configured Ollama model
    summary: |
      Pre-flight gate for the audit skills. Pass MODEL=… to check a
      specific tag, or rely on $CRABCC_OLLAMA_MODEL.
        exit 0 → OK
        exit 1 → WARN (model will run but slowly)
        exit 2 → FAIL (red item must be fixed)
    vars:
      MODEL: '{{.MODEL | default ""}}'
    cmds:
      - 'bash scripts/ollama-system-check.sh{{if .MODEL}} --model {{.MODEL}}{{end}}'

  ollama-bootstrap:
    desc: System-check + install Ollama (macOS) + pull the OpenClaw model used by audit skills
    summary: |
      Replaces Claude-Code-`Agent`-tool sub-agent fan-out with a local
      Ollama backend. The audit skills (warp-speed-audit, rust-logging-
      audit) call scripts/ollama-fanout.sh which POSTs each cluster's
      prompt to /api/generate in parallel.

      Runs `task system-check` first — refuses to proceed on FAIL (exit
      2), warns on WARN (exit 1) but continues. Pass IGNORE_SYSTEM=1 to
      bypass the gate entirely.

      Default model: voytas26/openclaw-oss-20b-deterministic — gpt-oss
      20B fine-tune for OpenClaw autonomous agents. Per the model card:
      "Designed for autonomous agents, strict tool schema adherence,
      concise outputs, and stable behavior in automation workflows."
      Needs ~13 GB disk + ~16 GB RAM (32 GB Apple Silicon: comfortable).

      Override the default with CRABCC_OLLAMA_MODEL=… or MODEL=…
        - voytas26/openclaw-qwen3vl-8b-opt          (8B, 8 GB RAM)
        - 64500165/openclaw-omnicoder-2             (Qwen3.5-9B, long loops)
        - qwen2.5-coder:7b                          (no agent tuning)

      Idempotent: skips install if `ollama` is on PATH; skips pull if
      the model is already present locally.
    deps: [system-check]
    vars:
      MODEL: '{{.MODEL | default "voytas26/openclaw-oss-20b-deterministic"}}'
    cmds:
      - |
        if ! command -v ollama >/dev/null 2>&1; then
          echo "ollama not on PATH — installing via Homebrew (macOS)…"
          if command -v brew >/dev/null 2>&1; then
            brew install ollama
          else
            echo "no brew. Install Ollama manually: https://ollama.com/download"
            exit 1
          fi
        else
          echo "✓ ollama already installed: $(ollama --version 2>&1 | head -1)"
        fi
      - |
        if ! curl -fsS --max-time 5 "${OLLAMA_HOST:-http://127.0.0.1:11434}/api/version" >/dev/null 2>&1; then
          echo "ollama daemon not reachable — start it with:  ollama serve  (or run the desktop app)"
          echo "(continuing — pull will fail if daemon stays down)"
        else
          echo "✓ ollama daemon reachable at ${OLLAMA_HOST:-http://127.0.0.1:11434}"
        fi
      - 'ollama pull {{.MODEL}}'
      - 'echo "" && echo "✓ ready: scripts/ollama-fanout.sh --prompts … --output … --json-mode"'

  ollama-smoke:
    desc: Smoke-test scripts/ollama-fanout.sh with a 2-prompt fixture (uses default model)
    summary: |
      Verifies Ollama is reachable, the model is present, and the
      fan-out script returns merged JSON on the contract the audit
      skills expect. Builds a tiny 2-prompt fixture, fires it, jq-asserts
      both replies came back ok=true. Cleans up after itself.
    vars:
      MODEL: '{{.MODEL | default "voytas26/openclaw-oss-20b-deterministic"}}'
    cmds:
      - mkdir -p .summary
      - |
        cat > /tmp/crabcc-ollama-smoke-prompts.json <<'EOF'
        [
          {"name":"A","prompt":"Reply with valid JSON only. Schema: {\"agent\":\"A\",\"ok\":true}. Do not add commentary."},
          {"name":"B","prompt":"Reply with valid JSON only. Schema: {\"agent\":\"B\",\"ok\":true}. Do not add commentary."}
        ]
        EOF
      - 'CRABCC_OLLAMA_MODEL={{.MODEL}} bash scripts/ollama-fanout.sh --prompts /tmp/crabcc-ollama-smoke-prompts.json --output .summary/ollama-smoke.json --json-mode --parallel 2'
      - 'jq -e ''length == 2 and (map(.ok) | all)'' .summary/ollama-smoke.json >/dev/null && echo "✓ ollama fan-out smoke passed"'
      - 'rm -f /tmp/crabcc-ollama-smoke-prompts.json'

  ollama-models:
    desc: List installed Ollama models on $OLLAMA_HOST with size + modified date
    cmds:
      - 'curl -fsS "${OLLAMA_HOST:-http://127.0.0.1:11434}/api/tags" | jq -r ''.models[] | "\(.name)\t\((.size/1e9)|floor)GB\t\(.modified_at[:10])"'' | column -t'

  ollama-network-check:
    desc: Probe a network-exposed Ollama daemon (LAN / VPN / mDNS); pass HOST=… or set $OLLAMA_HOST
    summary: |
      For setups where Ollama runs off-box (e.g. on a Mac Studio while
      dev happens on a laptop). Distinct from `task system-check` which
      runs on the Ollama host itself.

      Checks (fail-fast):
        1. URL parse + DNS / mDNS / hosts resolution
        2. TCP reachability on the daemon port
        3. /api/version returns a real Ollama version
        4. /api/tags lists at least one model
        5. Configured model is present in the tag list
        6. (--smoke) /api/generate round-trip with a 1-token completion

      Pass HOST=http://… to override $OLLAMA_HOST inline. Pass
      SMOKE=1 to include the /api/generate round-trip.

      Exit: 0 OK · 1 WARN (model missing) · 2 FAIL (daemon unreachable)
        · 3 SMOKE-FAIL (listed but inference broken).
    vars:
      HOST:  '{{.HOST  | default ""}}'
      MODEL: '{{.MODEL | default ""}}'
      SMOKE: '{{.SMOKE | default ""}}'
    cmds:
      - 'bash scripts/ollama-network-check.sh{{if .HOST}} --host {{.HOST}}{{end}}{{if .MODEL}} --model {{.MODEL}}{{end}}{{if .SMOKE}} --smoke{{end}}'

  agent-runtime-smoke:
    desc: Smoke-test scripts/ollama-agent-runtime.sh — single-shot tool-calling round-trip
    summary: |
      Builds a 1-tool fixture (crabcc.fuzzy), asks the model "find the
      Store symbol", parses the JSON reply. Validates the agent
      runtime's JSON contract (tool_call XOR final + optional
      thinking) end-to-end against the local or network Ollama.

      Pass HOST=… to test against a remote daemon.
    vars:
      HOST:  '{{.HOST  | default ""}}'
      MODEL: '{{.MODEL | default "voytas26/openclaw-oss-20b-deterministic"}}'
    cmds:
      - mkdir -p .summary
      - |
        cat > /tmp/crabcc-agent-task.json <<'EOF'
        {
          "system": "You are a code-search agent for the crabcc repo. Use crabcc.fuzzy to locate symbols.",
          "user":   "Find the Store symbol in this repo.",
          "tools": [
            {"name":"crabcc.fuzzy",
             "description":"Levenshtein-2 fuzzy search over indexed symbol names",
             "schema":{"type":"object","properties":{"query":{"type":"string"}},"required":["query"]}}
          ]
        }
        EOF
      - '{{if .HOST}}OLLAMA_HOST={{.HOST}} {{end}}CRABCC_OLLAMA_MODEL={{.MODEL}} bash scripts/ollama-agent-runtime.sh --task /tmp/crabcc-agent-task.json --output .summary/agent-runtime-smoke.json'
      - 'jq -e ''.ok == true and (.tool_call != null or .final != null)'' .summary/agent-runtime-smoke.json >/dev/null && echo "✓ agent runtime smoke passed: $(jq -c ''{tool_call:.tool_call, final:.final}'' .summary/agent-runtime-smoke.json)"'
      - 'rm -f /tmp/crabcc-agent-task.json'

  bench:
    desc: Run the raw-CLI A/B benchmark against REPO_FIXTURE
    deps: [install]
    cmds:
      - "( cd {{.REPO_FIXTURE}} && {{.CRABCC}} index >/dev/null )"
      - 'PATH="$HOME/.cargo/bin:$PATH" python3 bench/raw-bench.py {{.REPO_FIXTURE}}'

  bench-viz:
    desc: Generate REPORT.md + PNG charts from latest bench results
    cmds:
      - 'test -f bench/results/raw.json || (echo "run `task bench` first" && exit 1)'
      - 'if command -v {{"/tmp/crabcc-bench-venv/bin/python"}} >/dev/null 2>&1; then /tmp/crabcc-bench-venv/bin/python bench/visualize.py; else python3 bench/visualize.py; fi'

  bench-all:
    desc: Bench + visualize in one shot
    cmds:
      - task: bench
      - task: bench-viz

  bench-e2e:
    desc: |
      Full end-to-end bench sweep against REPO_FIXTURE — runs every harness
      under bench/ + the moka cache micro-bench + the pinned-walkdir e2e
      integration test. Results land in bench/results/ (JSON snapshots) and
      the rendered Markdown reports stay in tree.
    deps: [build]
    cmds:
      # 1. Raw CLI A/B (crabcc vs grep/find/rg/fd) → bench/results/raw.json
      - task: bench
      # 2. PNG charts + bench/results/REPORT.md
      - task: bench-viz
      # 3. FSST off-vs-on gate (single trial) → bench/results/fsst-gate.md
      - task: bench-compress
      # 4. moka cache micro-bench → bench/results/cache-bench-REPORT.md
      - 'python3 bench/cache-bench.py'
      # 5. e2e integration test against pinned BurntSushi/walkdir 2.5.0
      - '{{.CARGO}} test -p crabcc-cli --test e2e_walkdir -- --ignored --nocapture'
      # 6. Surface the three rendered reports together so the run summary
      # has everything in one scroll.
      - 'echo "" && echo "── bench-e2e summary ──" && ls -la bench/results/ | head -30'

  man:
    desc: Render the manpage to a viewable PDF preview (and confirm troff syntax)
    cmds:
      - 'man -t man/crabcc.1 | open -fa Preview'

  install-man:
    desc: Install crabcc.1 into the local man-page tree
    cmds:
      - sudo install -m 0644 man/crabcc.1 /usr/local/share/man/man1/crabcc.1
      - 'echo "test with: man crabcc"'

  viz-web-build:
    desc: |
      Build the React /live dashboard bundle (phase 1 of #17). Outputs
      a single self-contained HTML at crates/crabcc-viz/web/dist/live.html
      which the Rust crate include_str!s at compile time. Re-run after
      editing crates/crabcc-viz/web/src/.
    cmds:
      - 'cd crates/crabcc-viz/web && bun install --silent && bun run build'

  viz-web-test:
    desc: Run the React frontend's bun:test suite + tsgo typecheck.
    cmds:
      - 'cd crates/crabcc-viz/web && bun install --silent && bun run typecheck && bun test src'

  viz-web-dev:
    desc: |
      Watch crates/crabcc-viz/web/src/ and rebuild dist/live.html on save.
      Pair with `task viz` in another terminal to see live reloads after
      Cmd-R in the browser.
    cmds:
      - 'cd crates/crabcc-viz/web && bun install --silent && bun run dev'

  viz:
    desc: |
      Start the localhost call-graph viewer (issue #64). Builds release,
      makes sure the index + graph sidecar exist, then opens the browser.
      Pass PORT=NNNN to override the default 7878. Pass NO_OPEN=1 to skip
      the auto-browser-open (useful over SSH or in test loops).
    deps: [build]
    vars:
      PORT: '{{.PORT | default "7878"}}'
      NO_OPEN: '{{.NO_OPEN | default ""}}'
    cmds:
      - |
        set -e
        if [ ! -f .crabcc/index.db ]; then
          echo "no .crabcc/index.db — building one now…" >&2
          ./target/release/crabcc index >/dev/null
        fi
        if [ ! -f .crabcc/graph.json ]; then
          echo "no .crabcc/graph.json — building call-graph sidecar…" >&2
          ./target/release/crabcc graph build >/dev/null
        fi
        ARGS="--port {{.PORT}}"
        if [ -n "{{.NO_OPEN}}" ]; then ARGS="$ARGS --no-open"; fi
        exec ./target/release/crabcc serve $ARGS

  viz-test:
    desc: Run the crabcc-viz smoke + unit tests (no browser, no port collision)
    cmds:
      - "{{.CARGO}} test -p crabcc-viz"

  viz-sim:
    desc: |
      Simulate ongoing low-effort agent activity against the viz crate
      (#64 demo). Loops symbol lookups every ~3s so the live dashboard
      at /live shows continuous tool calls + a slowly-growing relation
      graph. Pair with `task viz` in another shell. Ctrl-C to stop.
    cmds:
      - bash scripts/viz-simulate.sh
    interactive: true

  smoke:
    desc: Index a tiny fixture + assert sym/callers/refs return data
    deps: [install]
    cmds:
      - |
        mkdir -p /tmp/crabcc-smoke
        cat > /tmp/crabcc-smoke/a.ts <<'EOF'
        export function hello(name: string) { return name; }
        hello("world");
        EOF
      - "( cd /tmp/crabcc-smoke && {{.CRABCC}} index >/dev/null )"
      - "{{.CRABCC}} --root /tmp/crabcc-smoke sym hello | jq -e '.[0].name == \"hello\"'"
      - "{{.CRABCC}} --root /tmp/crabcc-smoke callers hello --count | jq -e '.count >= 1'"
      - rm -rf /tmp/crabcc-smoke

  compress:
    desc: Train FSST symbol table on the current index + re-encode all rows + report stats
    deps: [build]
    cmds:
      - "{{.CRABCC}} compress"
      - "{{.CRABCC}} compress --rebuild"
      - "{{.CRABCC}} compress --stats"

  bench-compress:
    desc: Run the FSST off-vs-on gate bench against REPO_FIXTURE (single trial)
    deps: [build]
    cmds:
      - 'python3 bench/compress-bench.py --repo {{.REPO_FIXTURE}} --crabcc target/release/crabcc --trials 1 --decode-calls 2000'
      - 'echo "" && cat bench/results/fsst-gate.md'

  verify-gate:
    desc: Local re-run of the v2.0.0-alpha release gate (lint + test + bench-compress)
    cmds:
      - task: lint
      - task: test
      - task: bench-compress

  fuzz-check:
    desc: Compile-check the cargo-fuzz target (full run requires nightly + cargo-fuzz)
    cmds:
      - "(cd crates/crabcc-core/fuzz && {{.CARGO}} check)"

  memory-smoke:
    desc: Exercise the memory CLI surface (M3-light + M1 hybrid) against a tempdir
    deps: [install]
    cmds:
      - mkdir -p /tmp/crabcc-mem-smoke
      - "{{.CRABCC}} --root /tmp/crabcc-mem-smoke memory init | jq -e '.status == \"ok\"'"
      - "{{.CRABCC}} --root /tmp/crabcc-mem-smoke memory remember 'doc:1' 'fox jumps' | jq -e '.id >= 1'"
      - "{{.CRABCC}} --root /tmp/crabcc-mem-smoke memory remember 'doc:2' 'lazy dogs' --room animals | jq -e '.id >= 1'"
      - "{{.CRABCC}} --root /tmp/crabcc-mem-smoke memory count | jq -e '.count == 2'"
      - "{{.CRABCC}} --root /tmp/crabcc-mem-smoke memory list --limit 5 | jq -e 'length == 2'"
      - "{{.CRABCC}} --root /tmp/crabcc-mem-smoke memory search 'fox' --limit 3 | jq -e '.hits | length >= 1'"
      - "{{.CRABCC}} --root /tmp/crabcc-mem-smoke memory search 'fox' --mode lexical --limit 3 | jq -e '.hits[0].source_id == \"doc:1\"'"
      - "{{.CRABCC}} --root /tmp/crabcc-mem-smoke memory search 'fox' --mode vector --limit 3 | jq -e '.hits | length >= 1'"
      - "{{.CRABCC}} --root /tmp/crabcc-mem-smoke memory search 'fox' --mode hybrid --limit 3 | jq -e '.hits | length >= 1'"
      - "{{.CRABCC}} --root /tmp/crabcc-mem-smoke memory health | jq -e '. == \"Ok\"'"
      - test -f /tmp/crabcc-mem-smoke/.crabcc/memory.db
      - rm -rf /tmp/crabcc-mem-smoke

  memory-bench:
    desc: |
      LongMemEval R@k bench gate (issue #2). Runs the bundled synthetic
      fixture by default; pass DATASET=path/to/longmemeval_oracle.json to
      run against the real held-out 450q set.
    vars:
      DATASET: '{{.DATASET | default ""}}'
      THRESHOLD: '{{.THRESHOLD | default "0.966"}}'
      MODE: '{{.MODE | default ""}}'
    cmds:
      - mkdir -p target/bench
      - >-
        cargo run --release -p crabcc-memory-bench --
        {{if .DATASET}}--dataset {{.DATASET}}{{end}}
        {{if .MODE}}--mode {{.MODE}}{{end}}
        --threshold {{.THRESHOLD}}
        --output target/bench/memory.ndjson

  ci:
    desc: Local CI dry-run — fmt + clippy + test + smoke
    cmds:
      - task: fmt-check
      - task: lint
      - task: test
      - task: smoke
      - task: memory-smoke

  local-ci:
    desc: Full local CI — mirrors GH workflow + prep-pr; pass/fail summary table
    summary: |
      Canonical "skip GitHub CI" runner. Runs fmt-check, clippy
      (workspace + all-targets + all-features), tests (single-threaded
      for tantivy determinism), doc-build with -D warnings, smoke E2E,
      and memory-smoke. Per-step logs land under .summary/local-ci/.
      Exit non-zero if any step failed.

      Flags forwarded to scripts/local-ci.sh:
        --release       also run `cargo build --release --workspace`
        --quick         skip doc-build + smoke (fastest viable)
        --strict        run tests in parallel (re-enables tantivy flake)
        --no-clippy     skip clippy (debugging only)
    cmds:
      - 'scripts/local-ci.sh {{.CLI_ARGS}}'

  local-ci-quick:
    desc: Quick local CI — fmt + clippy + tests only, ~30s
    summary: |
      Faster local-ci variant for iterating. Drops doc-build, smoke,
      and the release-build step. Use this between code changes;
      use `task local-ci` before pushing.
    cmds:
      - 'scripts/local-ci.sh --quick'

  local-ci-release:
    desc: Local CI + release-build — mirrors what release.yml would do, locally
    summary: |
      Full local-ci PLUS `cargo build --release --workspace`. Use
      this before cutting a tag when GitHub Actions is unavailable
      (billing block, network-isolated env, etc.). Verifies the
      release binary builds AND every gate passes.
    cmds:
      - 'scripts/local-ci.sh --release'

  release:
    desc: Cut a release tag (CI builds + uploads tarballs on push)
    summary: |
      Pass VERSION=x.y.z. Updates Cargo.toml versions, commits, tags, and pushes.
      The release.yml GitHub Actions workflow takes it from there.
    cmds:
      - test -n "{{.VERSION}}" || (echo "VERSION=x.y.z required" && exit 1)
      - sed -i.bak 's/^version = "[^"]*"/version = "{{.VERSION}}"/' Cargo.toml && rm Cargo.toml.bak
      - "{{.CARGO}} build --release"
      - git add Cargo.toml Cargo.lock
      - 'git commit -m "release: v{{.VERSION}}"'
      - "git tag v{{.VERSION}}"
      - "echo 'now: git push origin main --tags'"

  repomix:
    desc: Pack repo into a token-minimized XML bundle for LLM ingestion (.repomix/crabcc.xml)
    summary: |
      Tree-sitter compressed (signatures only), no comments, no empty lines,
      no .md files, no per-file or directory-structure summary headers.
      XML style is the smallest. Override target with OUT=path.
    vars:
      OUT: '{{.OUT | default ".repomix/crabcc.xml"}}'
    cmds:
      - mkdir -p $(dirname {{.OUT}})
      - 'repomix --compress --remove-comments --remove-empty-lines --no-file-summary --no-directory-structure --style xml --ignore "**/*.md,**/*.lock,**/target/**,**/.crabcc/**,bench/results/**,assets/**,.repomix/**" --output {{.OUT}}'
      - 'wc -c {{.OUT}} | awk ''{ printf "size: %.1f KiB\n", $1/1024 }'''

  clean:
    desc: Remove target/, bench/results/, and any tantivy/sqlite test fixtures
    cmds:
      - "{{.CARGO}} clean"
      - rm -rf bench/results/raw.json bench/results/REPORT.md bench/results/*.png

  uninstall:
    desc: Remove crabcc binary, skill symlink, command symlink
    cmds:
      - rm -f {{.CRABCC}}
      - rm -f ~/.claude/skills/crabcc/SKILL.md
      - rm -f ~/.claude/commands/crabcc-init.md

  check-deps:
    desc: Audit dev-environment external tools (jq, yq, rg, gh, claude, …); offers install
    summary: |
      Walks required + recommended + optional buckets and prints status per
      tool. On a TTY it offers to install missing ones via the right package
      manager for the host OS (brew / apt / dnf / pacman / apk / zypper).
      Pass MODE=strict to fail-fast in CI, MODE=json for machine output.
    vars:
      MODE: '{{.MODE | default ""}}'
    cmds:
      - 'bash scripts/check-deps.sh {{if .MODE}}--{{.MODE}}{{end}}'

  coverage:
    desc: Generate code-coverage report (cargo-llvm-cov). FORMAT=html (default), lcov, text, or json
    summary: |
      Auto-installs cargo-llvm-cov on first run. Output lands in
      .summary/coverage/ (html, lcov.info, coverage.json). Use FORMAT=text
      for a quick console summary.
    vars:
      FORMAT: '{{.FORMAT | default "html"}}'
    cmds:
      - 'command -v cargo-llvm-cov >/dev/null 2>&1 || {{.CARGO}} install cargo-llvm-cov --locked'
      - 'mkdir -p .summary/coverage'
      - 'bash scripts/coverage.sh {{.FORMAT}}'

  profile-build:
    desc: Build crabcc with the `profiling` cargo profile (release codegen + debug info)
    summary: |
      The profiling profile inherits `release` (LTO=fat, opt=3, codegen-units=1)
      but adds line-table debug info and disables stripping so samply /
      flamegraph / Instruments can resolve symbols. Output binary lands at
      `target/profiling/crabcc`. See install/profiling.md for the full recipe.
    cmds:
      - '{{.CARGO}} build --profile profiling -p crabcc-cli'

  profile-index:
    desc: |
      Profile `crabcc index --root REPO_FIXTURE` with samply. REPO_FIXTURE
      defaults to mc-mothership; override via env. Auto-installs samply.
    deps: [profile-build]
    summary: |
      samply is a sampling profiler that works on macOS without sudo (uses
      mach task ports under the hood) and on Linux with perf_event_paranoid.
      Opens the result in a browser-based flamegraph viewer; pass `--save
      OUT.json` to keep the raw .json profile for later diffing.
    cmds:
      - 'command -v samply >/dev/null 2>&1 || {{.CARGO}} install samply --locked'
      - '( cd {{.REPO_FIXTURE}} && rm -rf .crabcc )'
      - 'samply record -o .summary/profile-index.json -- target/profiling/crabcc index --root {{.REPO_FIXTURE}}'
      - 'echo "" && echo "samply profile written to .summary/profile-index.json"'
      - 'echo "view interactively with:  samply load .summary/profile-index.json"'

  profile-memory-search:
    desc: |
      Profile `crabcc memory search` over a primed palace. Loads 1k canned
      drawers via memory.remember, then runs N=200 search calls hot.
    deps: [profile-build]
    vars:
      N: '{{.N | default "200"}}'
      Q: '{{.Q | default "fox jumps over"}}'
    cmds:
      - 'command -v samply >/dev/null 2>&1 || {{.CARGO}} install samply --locked'
      - 'rm -rf /tmp/crabcc-profile-mem && mkdir -p /tmp/crabcc-profile-mem'
      - 'target/profiling/crabcc --root /tmp/crabcc-profile-mem memory init >/dev/null'
      - "for i in $(seq 1 1000); do target/profiling/crabcc --root /tmp/crabcc-profile-mem memory remember \"doc:$i\" \"sample drawer body number $i with the fox jumping over a lazy dog\" >/dev/null; done"
      - "samply record -o .summary/profile-memory-search.json -- bash -c 'for i in $(seq 1 {{.N}}); do target/profiling/crabcc --root /tmp/crabcc-profile-mem memory search \"{{.Q}}\" --limit 5 >/dev/null; done'"
      - 'echo "" && echo "samply profile written to .summary/profile-memory-search.json"'
      - 'echo "view interactively with:  samply load .summary/profile-memory-search.json"'

  flamegraph-index:
    desc: |
      Alternative profile via cargo-flamegraph (SVG output). Requires DTrace
      on macOS (sudo) or perf on Linux. Use `task profile-index` instead if
      you don't want to run sudo.
    deps: [profile-build]
    cmds:
      - 'command -v flamegraph >/dev/null 2>&1 || {{.CARGO}} install flamegraph --locked'
      - '( cd {{.REPO_FIXTURE}} && rm -rf .crabcc )'
      - 'mkdir -p .summary'
      - 'flamegraph --profile profiling -p crabcc-cli -o .summary/flamegraph-index.svg -- index --root {{.REPO_FIXTURE}}'
      - 'echo "" && echo "flamegraph SVG written to .summary/flamegraph-index.svg"'

  gen-summary:
    desc: Generate paste-ready PR summary at .summary/gen-summary.md (commits, files, areas, gate status)
    summary: |
      Pure git ops; ~200 ms typical. Auto-detects the PR base from
      `gh pr view`, falls back to `git config`, then to `origin/main`.
      Wired into `task prep-pr` (final step) and the pre-commit hook so
      `gh pr create --body-file .summary/gen-summary.md` is always
      paste-ready.

      Pass BASE=… to override the base ref. Output is gitignored.
    vars:
      BASE: '{{.BASE | default ""}}'
    cmds:
      - 'bash scripts/gen-summary.sh{{if .BASE}} --base {{.BASE}}{{end}}'

  prep-pr:
    desc: One-shot pre-PR check — fmt, clippy, test, smoke, doc-build, gen-summary, log to .summary/prep-pr.txt
    summary: |
      The combined pre-PR gate. Runs everything CI would run plus a
      doc-build sanity check AND `gen-summary` (refreshes
      `.summary/gen-summary.md` for `gh pr create --body-file`).
      Captures the output for paste-into-PR-body use, exits non-zero
      on any failure. Idempotent.
        - cargo fmt --check
        - cargo clippy --workspace --all-targets -- -D warnings
        - cargo test --workspace --no-fail-fast
        - cargo doc --workspace --no-deps  (catches rustdoc warnings)
        - gen-summary (always last; never fails the gate)
      Pass NO_DOC=1 to skip the doc-build step (faster).
    vars:
      NO_DOC: '{{.NO_DOC | default "0"}}'
    cmds:
      - 'mkdir -p .summary'
      - 'bash scripts/prep-pr.sh{{if eq .NO_DOC "1"}} --no-doc{{end}}'

  openapi:
    desc: Print the embedded MCP OpenAPI spec to stdout (use `task openapi > openapi.yaml` to dump)
    summary: |
      Routes through `crabcc openapi`, which echoes the byte-identical
      copy of `crates/crabcc-mcp/openapi.yaml` embedded in the binary at
      compile time via `include_str!`. The spec is hand-maintained;
      `cargo test` enforces 1:1 sync with `tools_def()` via the
      `openapi_spec_lists_every_tool` drift test.
    deps: [build]
    cmds:
      - '{{.CRABCC}} openapi'

  doc:
    desc: Build rustdoc HTML for the workspace (no deps; opens index in browser)
    summary: |
      Generates rustdoc for crabcc-core, crabcc-memory, crabcc-mcp, and
      crabcc-cli. Pass OPEN=0 to skip the browser open; pass DEPS=1 to
      include external-crate docs (slower, much larger output).
    vars:
      OPEN: '{{.OPEN | default "1"}}'
      DEPS: '{{.DEPS | default "0"}}'
    cmds:
      - '{{.CARGO}} doc --workspace --no-deps={{if eq .DEPS "1"}}false{{else}}true{{end}}{{if eq .OPEN "1"}} --open{{end}}'

  doctor:
    desc: Diagnose crabcc dev install — CLI, MCP, commands, skill, hooks; writes a debug log
    summary: |
      Pass MODE=check (default), MODE=install (re-link commands+skill, suggest
      MCP entry), or MODE=upgrade (run `crabcc upgrade --apply`). Writes a
      timestamped log under .summary/doctor-*.log for paste-into-issue use.
    vars:
      MODE: '{{.MODE | default "check"}}'
    cmds:
      - 'bash scripts/doctor.sh --{{.MODE}}'

  version:
    desc: Print the workspace version (parsed from Cargo.toml). --json for machine output.
    summary: |
      Single source of truth for "what version are we shipping". Reads
      [workspace.package].version from the top-level Cargo.toml. Other tasks
      pick up the same value via {{.CRABCC_VERSION}}.
    cmds:
      - 'bash scripts/version.sh{{if .JSON}} --json{{end}}'

  aliases:
    desc: Install developer-friendly CLI aliases (grep→rg, find→fd, …) into the user shell rc
    summary: |
      Idempotent: writes a fenced `# >>> crabcc-aliases >>>` block into
      ~/.zshrc / ~/.bashrc / ~/.config/fish/config.fish. Each alias is
      gated on `command -v <tool>` so the rc stays clean if the modern
      tool isn't installed yet. Pass MODE=remove to strip the block,
      MODE=print to dry-run.
    vars:
      MODE: '{{.MODE | default "install"}}'
    cmds:
      - 'bash scripts/install-aliases.sh{{if eq .MODE "remove"}} --remove{{end}}{{if eq .MODE "print"}} --print{{end}}'

  local-ci:
    desc: Local CI snapshot — fmt-check + lint + test, output to .summary/local-ci.txt
    summary: |
      Use this when GitHub CI is unavailable (rate-limited / over budget).
      The output file is what we attach to PR descriptions in lieu of a green
      check. Re-runs are idempotent — file is overwritten.
    cmds:
      - mkdir -p .summary
      - 'rm -f .summary/local-ci.txt'
      - '{{.CARGO}} fmt --all -- --check 2>&1 | tee -a .summary/local-ci.txt'
      - '{{.CARGO}} clippy --workspace --all-targets -- -D warnings 2>&1 | tee -a .summary/local-ci.txt'
      - '{{.CARGO}} test --workspace --no-fail-fast 2>&1 | tee -a .summary/local-ci.txt'
      - 'echo "" && echo "wrote: .summary/local-ci.txt ($(wc -l < .summary/local-ci.txt) lines)"'

  docs-refresh:
    desc: Refresh AGENTS / README / CHANGELOG / CLAUDE / commands docs to reflect latest version
    summary: |
      Spawns a background `claude -p` session that reads the current state of
      Cargo.toml, src/, and the recent git log, then rewrites the long-form
      docs to match. Output goes to .summary/docs-refresh.log; the agent runs
      detached so the calling shell returns immediately.
      Requires the `claude` CLI on PATH. Idempotent — safe to re-run.
      Pass MODEL=sonnet|opus|haiku to override the model (default: sonnet).
    vars:
      MODEL: '{{.MODEL | default "sonnet"}}'
      LOG: .summary/docs-refresh.log
      PROMPT_FILE: .summary/docs-refresh.prompt.md
    cmds:
      - mkdir -p .summary
      - 'command -v claude >/dev/null || (echo "claude CLI not on PATH; install Claude Code first" && exit 1)'
      - |
        cat > {{.PROMPT_FILE}} <<'EOF'
        You are a docs janitor for the crabcc repository. Read the current state
        of the codebase (Cargo.toml workspace version, crates/, recent git log
        on main, CHANGELOG.md tail) and update the long-form docs so they
        reflect what's actually in the tree:

          - README.md         — usage, install, examples, current version
          - AGENTS.md         — agent / Claude Code integration surface
          - CHANGELOG.md      — append a new section for the unreleased work
                                 since the last `## v...` heading; keep older
                                 entries verbatim
          - CLAUDE.md         — project-level instructions for Claude Code
          - commands/*.md     — slash-command help that ships with the repo

        Constraints:
          - Be precise. Match identifiers, flags, and output shapes against
            the source. If unsure, run `crabcc <subcommand> --help` and the
            relevant `cargo test`s to confirm before writing.
          - Preserve the existing tone, headings, and section ordering.
          - Do NOT touch ARCHITECTURE.md, schema files, or anything under
            target/, .repomix/, .crabcc/, or assets/.
          - When done, print a summary of changed files + line counts.

        Run end-to-end without further prompting.
        EOF
      - 'echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] starting docs refresh ({{.MODEL}})" > {{.LOG}}'
      - 'nohup claude -p "$(cat {{.PROMPT_FILE}})" --model {{.MODEL}} >> {{.LOG}} 2>&1 &'
      - 'echo "spawned (pid=$!); follow with: tail -f {{.LOG}}"'
