# crabcc :: cargo config
#
# Build customizations that don't belong in Cargo.toml. Profiles are
# defined there; this file is for invocation-time RUSTFLAGS plumbing.

# Issue #112 — `cargo build --profile release-native` enables CPU-specific
# codegen for personal/dev builds. NEVER ship the resulting binary to
# other machines: any specialised AVX2/AVX-512/NEON instruction will
# SIGILL on a CPU that lacks the feature set this build was tuned for.
#
# Wired via `task build-native` (see taskfiles/build.yml). Wrapping it
# in a Taskfile target keeps the env-var plumbing out of muscle memory.
[target.'cfg(all())']
# No global rustflags — keeps the default release portable.
#
# Nightly-only dev extras (removed from Cargo.toml profiles to unblock stable CI):
# Copy the block below into .cargo/config.local.toml (gitignored) to re-enable:
#
#   [profile.dev]
#   rustflags = ["-Z", "polonius", "-Z", "randomize-layout"]
#
#   [profile.dev-fast]
#   rustflags = ["-Z", "polonius", "-Z", "threads=8"]
#
#   [profile.test]
#   rustflags = ["-Z", "polonius"]
#
#   [profile.profiling]
#   rustflags = ["-Z", "time-passes", "-Z", "llvm-time-trace", "-Z", "print-type-sizes"]
#
# ── Local dev compile-time wins (paste into .cargo/config.local.toml) ─────────
#
# 1. ccache the C compilation of tikv-jemalloc-sys / libsqlite3-sys / zstd-sys
#    / ring / etc. Each is 20-60s on a cold build; ccache makes them sub-second
#    after the first compile (per source-hash, persists across `cargo clean`).
#    Install:  brew install ccache  (macOS) or apt/dnf (Linux).
#
#      [env]
#      CC = "ccache cc"
#      CXX = "ccache c++"
#
# 2. Cranelift codegen backend — 20-40% faster cold dev builds on macOS where
#    LLVM dominates. Nightly only.
#
#      rustup toolchain install nightly
#      rustup component add rustc-codegen-cranelift-preview --toolchain nightly
#
#      [unstable]
#      codegen-backend = true
#
#      [profile.dev]
#      codegen-backend = "cranelift"
#
# 3. Parallel rustc front-end — 20-50% on front-end-bound crates (syn, tantivy,
#    sonic-rs heavy generic code). Nightly only.
#
#      [build]
#      rustflags = ["-Z", "threads=8"]
#
# 4. Full debug info for lldb breakpoints (we ship `debug = 1` in Cargo.toml):
#
#      [profile.dev]
#      debug = 2
#
# All four are local-only because they need nightly / external tools; we keep
# the checked-in config stable for new contributors and CI.

# rustdoc-on-docs.rs gets the same workspace-wide opt as cargo doc here.
[doc]
