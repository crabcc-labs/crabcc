# Release / local-CI / docs-refresh tasks. Cuts tags, runs the GH-CI mirror
# locally, generates PR summaries, and triggers async docs refreshes.
version: '3'

vars:
  CARGO: cargo

tasks:
  release:
    desc: Cut a release tag (CI builds + uploads tarballs on push)
    summary: |
      Pass VERSION=x.y.z. Updates Cargo.toml versions, commits, tags, and pushes.
      The release.yml GitHub Actions workflow takes it from there.
    cmds:
      - test -n "{{.VERSION}}" || (echo "VERSION=x.y.z required" && exit 1)
      - sed -i.bak 's/^version = "[^"]*"/version = "{{.VERSION}}"/' Cargo.toml && rm Cargo.toml.bak
      - "{{.CARGO}} build --release"
      - git add Cargo.toml Cargo.lock
      - 'git commit -m "release: v{{.VERSION}}"'
      - "git tag v{{.VERSION}}"
      - "echo 'now: git push origin main --tags'"

  local-ci:
    desc: Full local CI — mirrors GH workflow + prep-pr; pass/fail summary table
    summary: |
      Canonical "skip GitHub CI" runner. Runs fmt-check, clippy
      (workspace + all-targets + all-features), tests (single-threaded
      for tantivy determinism), doc-build with -D warnings, smoke E2E,
      and memory-smoke. Per-step logs land under .summary/local-ci/.
      Exit non-zero if any step failed.

      Flags forwarded to scripts/local-ci.sh:
        --release       also run `cargo build --release --workspace`
        --quick         skip doc-build + smoke (fastest viable)
        --strict        run tests in parallel (re-enables tantivy flake)
        --no-clippy     skip clippy (debugging only)
    cmds:
      - 'scripts/local-ci.sh {{.CLI_ARGS}}'

  local-ci-quick:
    desc: Quick local CI — fmt + clippy + tests only, ~30s
    summary: |
      Faster local-ci variant for iterating. Drops doc-build, smoke,
      and the release-build step. Use this between code changes;
      use `task local-ci` before pushing.
    cmds:
      - 'scripts/local-ci.sh --quick'

  local-ci-release:
    desc: Local CI + release-build — mirrors what release.yml would do, locally
    summary: |
      Full local-ci PLUS `cargo build --release --workspace`. Use
      this before cutting a tag when GitHub Actions is unavailable
      (billing block, network-isolated env, etc.). Verifies the
      release binary builds AND every gate passes.
    cmds:
      - 'scripts/local-ci.sh --release'

  gen-summary:
    desc: Generate paste-ready PR summary at .summary/gen-summary.md (commits, files, areas, gate status)
    summary: |
      Pure git ops; ~200 ms typical. Auto-detects the PR base from
      `gh pr view`, falls back to `git config`, then to `origin/main`.
      Wired into `task prep-pr` (final step) and the pre-commit hook so
      `gh pr create --body-file .summary/gen-summary.md` is always
      paste-ready.

      Pass BASE=… to override the base ref. Output is gitignored.
    vars:
      BASE: '{{.BASE | default ""}}'
    cmds:
      - 'bash scripts/gen-summary.sh{{if .BASE}} --base {{.BASE}}{{end}}'

  prep-pr:
    desc: One-shot pre-PR check — fmt, clippy, test, smoke, doc-build, gen-summary, log to .summary/prep-pr.txt
    summary: |
      The combined pre-PR gate. Runs everything CI would run plus a
      doc-build sanity check AND `gen-summary` (refreshes
      `.summary/gen-summary.md` for `gh pr create --body-file`).
      Captures the output for paste-into-PR-body use, exits non-zero
      on any failure. Idempotent.
        - cargo fmt --check
        - cargo clippy --workspace --all-targets -- -D warnings
        - cargo test --workspace --no-fail-fast
        - cargo doc --workspace --no-deps  (catches rustdoc warnings)
        - gen-summary (always last; never fails the gate)
      Pass NO_DOC=1 to skip the doc-build step (faster).
    vars:
      NO_DOC: '{{.NO_DOC | default "0"}}'
    cmds:
      - 'mkdir -p .summary'
      - 'bash scripts/prep-pr.sh{{if eq .NO_DOC "1"}} --no-doc{{end}}'

  docs-refresh:
    desc: Refresh AGENTS / README / CHANGELOG / CLAUDE / commands docs to reflect latest version
    summary: |
      Spawns a background `claude -p` session that reads the current state of
      Cargo.toml, src/, and the recent git log, then rewrites the long-form
      docs to match. Output goes to .summary/docs-refresh.log; the agent runs
      detached so the calling shell returns immediately.
      Requires the `claude` CLI on PATH. Idempotent — safe to re-run.
      Pass MODEL=sonnet|opus|haiku to override the model (default: sonnet).
    vars:
      MODEL: '{{.MODEL | default "sonnet"}}'
      LOG: .summary/docs-refresh.log
      PROMPT_FILE: .summary/docs-refresh.prompt.md
    cmds:
      - mkdir -p .summary
      - 'command -v claude >/dev/null || (echo "claude CLI not on PATH; install Claude Code first" && exit 1)'
      - |
        cat > {{.PROMPT_FILE}} <<'EOF'
        You are a docs janitor for the crabcc repository. Read the current state
        of the codebase (Cargo.toml workspace version, crates/, recent git log
        on main, CHANGELOG.md tail) and update the long-form docs so they
        reflect what's actually in the tree:

          - README.md         — usage, install, examples, current version
          - AGENTS.md         — agent / Claude Code integration surface
          - CHANGELOG.md      — append a new section for the unreleased work
                                 since the last `## v...` heading; keep older
                                 entries verbatim
          - CLAUDE.md         — project-level instructions for Claude Code
          - commands/*.md     — slash-command help that ships with the repo

        Constraints:
          - Be precise. Match identifiers, flags, and output shapes against
            the source. If unsure, run `crabcc <subcommand> --help` and the
            relevant `cargo test`s to confirm before writing.
          - Preserve the existing tone, headings, and section ordering.
          - Do NOT touch ARCHITECTURE.md, schema files, or anything under
            target/, .repomix/, .crabcc/, or assets/.
          - When done, print a summary of changed files + line counts.

        Run end-to-end without further prompting.
        EOF
      - 'echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] starting docs refresh ({{.MODEL}})" > {{.LOG}}'
      - 'nohup claude -p "$(cat {{.PROMPT_FILE}})" --model {{.MODEL}} >> {{.LOG}} 2>&1 &'
      - 'echo "spawned (pid=$!); follow with: tail -f {{.LOG}}"'
