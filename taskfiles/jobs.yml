# BullMQ jobs stack tasks (issue #109): jobs-up, jobs-board, jobs-down,
# jobs-e2e, jobs-submit.
version: '3'

vars:
  CRABCC: ~/.cargo/bin/crabcc

tasks:
  jobs-up:
    desc: Start Redis + jobs-worker via Apple Containers → Docker (--profile jobs)
    cmds:
      - |
        CMD="docker compose"; command -v container &>/dev/null && CMD="container compose"
        $CMD -f install/dev/docker-compose.yml --profile jobs up -d --build --wait
        echo "✓ jobs stack running  worker health :3002"

  jobs-board:
    desc: Start jobs stack + Bull Board at :3001 (--profile dev-tools)
    cmds:
      - |
        CMD="docker compose"; command -v container &>/dev/null && CMD="container compose"
        $CMD -f install/dev/docker-compose.yml --profile jobs --profile dev-tools up -d --build --wait
        echo "✓ Bull Board at http://localhost:${BULL_BOARD_PORT:-3001}"

  jobs-down:
    desc: Stop the jobs stack (Redis + worker + Bull Board)
    cmds:
      - |
        CMD="docker compose"; command -v container &>/dev/null && CMD="container compose"
        $CMD -f install/dev/docker-compose.yml --profile jobs --profile dev-tools down

  jobs-e2e:
    desc: End-to-end jobs integration test (Apple Containers → Docker)
    cmds:
      - 'bash tests/integration/test_jobs_e2e.sh'

  jobs-submit:
    desc: 'Submit a job from the CLI — example: task jobs-submit QUEUE=agent:run PROMPT="audit this repo"'
    vars:
      QUEUE:  '{{.QUEUE  | default "agent:run"}}'
      PROMPT: '{{.PROMPT | default "list the top 3 hot paths in this repo"}}'
    cmds:
      - |
        REMOTE=$(git remote get-url origin 2>/dev/null || true)
        {{.CRABCC}} jobs submit \
          --queue "{{.QUEUE}}" \
          --name  "taskfile-$(date +%s)" \
          --data  "{\"prompt\":\"{{.PROMPT}}\"}" \
          --agent-name "cli-submit" \
          --repo-path  "$(pwd)" \
          --github-url "$REMOTE"
