# Bench / compress / memory-bench / memory-smoke tasks.
version: '3'

vars:
  CARGO: cargo
  CRABCC: ~/.cargo/bin/crabcc
  REPO_FIXTURE: '{{.REPO_FIXTURE | default "/Users/peter.lodri/workspace/mc-mothership"}}'

tasks:
  bench:
    desc: Run the raw-CLI A/B benchmark against REPO_FIXTURE
    deps: [install]
    cmds:
      - "( cd {{.REPO_FIXTURE}} && {{.CRABCC}} index >/dev/null )"
      - 'PATH="$HOME/.cargo/bin:$PATH" python3 bench/raw-bench.py {{.REPO_FIXTURE}}'

  bench-viz:
    desc: Generate REPORT.md + PNG charts from latest bench results
    cmds:
      - 'test -f bench/results/raw.json || (echo "run `task bench` first" && exit 1)'
      - 'if command -v {{"/tmp/crabcc-bench-venv/bin/python"}} >/dev/null 2>&1; then /tmp/crabcc-bench-venv/bin/python bench/visualize.py; else python3 bench/visualize.py; fi'

  bench-all:
    desc: Bench + visualize in one shot
    cmds:
      - task: bench
      - task: bench-viz

  bench-e2e:
    desc: |
      Full end-to-end bench sweep against REPO_FIXTURE — runs every harness
      under bench/ + the moka cache micro-bench + the pinned-walkdir e2e
      integration test. Results land in bench/results/ (JSON snapshots) and
      the rendered Markdown reports stay in tree.
    deps: [build]
    cmds:
      # 1. Raw CLI A/B (crabcc vs grep/find/rg/fd) → bench/results/raw.json
      - task: bench
      # 2. PNG charts + bench/results/REPORT.md
      - task: bench-viz
      # 3. FSST off-vs-on gate (single trial) → bench/results/fsst-gate.md
      - task: bench-compress
      # 4. moka cache micro-bench → bench/results/cache-bench-REPORT.md
      - 'python3 bench/cache-bench.py'
      # 5. e2e integration test against pinned BurntSushi/walkdir 2.5.0
      - '{{.CARGO}} test -p crabcc-cli --test e2e_walkdir -- --ignored --nocapture'
      # 6. Surface the three rendered reports together so the run summary
      # has everything in one scroll.
      - 'echo "" && echo "── bench-e2e summary ──" && ls -la bench/results/ | head -30'

  bench-flow-matrix:
    desc: |
      "With vs without crabcc hooks" token matrix across agent profiles
      (claude_code / nullclaw / zeroclaw). Deterministic + network-free by
      default; set OPENROUTER_API_KEY + MODELS for the real-tokenizer lane.
    deps: [build]
    cmds:
      - 'CRABCC="target/release/crabcc" bash scripts/bench-flow-matrix.sh'

  bench-opt-bin:
    desc: |
      Advanced binary-optimization smoke sweep (2 legs, no PGO/BOLT) — proves
      the harness shape on any box. Full matrix: `task bench-opt-bin-full`.
      One-hour OVHcloud run: scripts/bench-opt-bin/provision-ovh.sh.
    cmds:
      - 'python3 scripts/bench-opt-bin/sweep.py --quick'

  bench-opt-bin-full:
    desc: |
      Full fractional optimization matrix (~11 legs):
      target-cpu × allocator × PGO{off,on} × BOLT{off,on} + opt-level=z corner,
      on the reserved `release-nightly` profile. Builds saturate the box
      (one leg per core, oversubscribed through the serial LTO link),
      measurements run serially (PIN = taskset core spec). Needs hyperfine +
      binutils `size` + llvm-tools-preview (+ llvm-bolt for BOLT legs; sccache
      auto-used if present). Results → bench/results/opt-bin-REPORT.md.
    vars:
      JOBS: '{{.JOBS | default ""}}'
      PIN:  '{{.PIN | default ""}}'
      RUNS: '{{.RUNS | default "8"}}'
    cmds:
      - >-
        python3 scripts/bench-opt-bin/sweep.py
        {{if .JOBS}}--jobs {{.JOBS}}{{end}}
        {{if .PIN}}--pin {{.PIN}}{{end}}
        --runs {{.RUNS}}

  bench-opt-bin-deep:
    desc: |
      Wider ~28-leg matrix (adds the full target-cpu axis v2/v3/v4/native) —
      sized so a big box (≥32 vCPU) stays busy *through* the single-threaded
      fat-LTO link phase, where the 11-leg matrix would leave it half-idle.
      This is what `provision-ovh.sh` runs. PIN measurements to a small core
      set. Results → bench/results/opt-bin-REPORT.md.
    vars:
      PIN:  '{{.PIN | default "0-3"}}'
      RUNS: '{{.RUNS | default "8"}}'
    cmds:
      - 'python3 scripts/bench-opt-bin/sweep.py --deep --pin {{.PIN}} --runs {{.RUNS}}'

  compress:
    desc: Train FSST symbol table on the current index + re-encode all rows + report stats
    deps: [build]
    cmds:
      - "{{.CRABCC}} compress"
      - "{{.CRABCC}} compress --rebuild"
      - "{{.CRABCC}} compress --stats"

  bench-compress:
    desc: Run the FSST off-vs-on gate bench against REPO_FIXTURE (single trial)
    deps: [build]
    cmds:
      - 'python3 bench/compress-bench.py --repo {{.REPO_FIXTURE}} --crabcc target/release/crabcc --trials 1 --decode-calls 2000'
      - 'echo "" && cat bench/results/fsst-gate.md'

  memory-smoke:
    desc: Exercise the memory CLI surface (M3-light + M1 hybrid) against a tempdir
    deps: [install]
    cmds:
      - mkdir -p /tmp/crabcc-mem-smoke
      - "{{.CRABCC}} --root /tmp/crabcc-mem-smoke memory init | jq -e '.status == \"ok\"'"
      - "{{.CRABCC}} --root /tmp/crabcc-mem-smoke memory remember 'doc:1' 'fox jumps' | jq -e '.id >= 1'"
      - "{{.CRABCC}} --root /tmp/crabcc-mem-smoke memory remember 'doc:2' 'lazy dogs' --room animals | jq -e '.id >= 1'"
      - "{{.CRABCC}} --root /tmp/crabcc-mem-smoke memory count | jq -e '.count == 2'"
      - "{{.CRABCC}} --root /tmp/crabcc-mem-smoke memory list --limit 5 | jq -e 'length == 2'"
      - "{{.CRABCC}} --root /tmp/crabcc-mem-smoke memory search 'fox' --limit 3 | jq -e '.hits | length >= 1'"
      - "{{.CRABCC}} --root /tmp/crabcc-mem-smoke memory search 'fox' --mode lexical --limit 3 | jq -e '.hits[0].source_id == \"doc:1\"'"
      - "{{.CRABCC}} --root /tmp/crabcc-mem-smoke memory search 'fox' --mode vector --limit 3 | jq -e '.hits | length >= 1'"
      - "{{.CRABCC}} --root /tmp/crabcc-mem-smoke memory search 'fox' --mode hybrid --limit 3 | jq -e '.hits | length >= 1'"
      - "{{.CRABCC}} --root /tmp/crabcc-mem-smoke memory health | jq -e '. == \"Ok\"'"
      - test -f /tmp/crabcc-mem-smoke/.crabcc/memory.db
      - rm -rf /tmp/crabcc-mem-smoke

  memory-bench:
    desc: |
      LongMemEval R@k bench gate (issue #2). Runs the bundled synthetic
      fixture by default; pass DATASET=path/to/longmemeval_oracle.json to
      run against the real held-out 450q set.
    vars:
      DATASET: '{{.DATASET | default ""}}'
      THRESHOLD: '{{.THRESHOLD | default "0.966"}}'
      MODE: '{{.MODE | default ""}}'
    cmds:
      - mkdir -p target/bench
      - >-
        cargo run --release -p crabcc-memory-bench --
        {{if .DATASET}}--dataset {{.DATASET}}{{end}}
        {{if .MODE}}--mode {{.MODE}}{{end}}
        --threshold {{.THRESHOLD}}
        --output target/bench/memory.ndjson

  bench-agent-mcp:
    desc: |
      Agent->MCP hot-path bench: synthesized claude_code / nullclaw /
      zeroclaw tool-call workloads. Runs the in-process criterion bench
      (low-noise regression gate) + the e2e stdio replay (real per-call
      latency) against an indexed fixture (ROOT, default: this repo).
    vars:
      ROOT: '{{.ROOT | default .ROOT_DIR}}'
    cmds:
      # 1. In-process criterion: serve_io dispatch under each agent profile.
      - '{{.CARGO}} bench -p crabcc-mcp --features bench --bench agent_workload'
      # 2. Build the CLI the e2e harness spawns, ensure the fixture is indexed.
      - '{{.CARGO}} build --release -p crabcc-cli'
      - 'test -f "{{.ROOT}}/.crabcc/index.db" || {{.ROOT_DIR}}/target/release/crabcc index --root "{{.ROOT}}"'
      # 3. E2e stdio replay — real process + pipe latency, per agent profile.
      - >-
        for p in nullclaw zeroclaw claude_code; do
          {{.CARGO}} run -q --release -p crabcc-mcp --features bench --example agent_replay --
            --root "{{.ROOT}}" --bin {{.ROOT_DIR}}/target/release/crabcc --profile "$p";
        done

  bench-mcp-transport:
    desc: |
      Mastodon + transport micro-benchmarks: token validation, key sanitization,
      hashtag encoding, SSE event formatting, JSON vs MessagePack serialization,
      gzip compression, and mastodon dispatch latency (no network). Pure-CPU,
      criterion-backed, suitable for regression gating in CI.
    cmds:
      - '{{.CARGO}} bench -p crabcc-mcp --features bench --bench mastodon_transport'

  bench-mcp-all:
    desc: |
      Run all MCP benchmarks (agent workload + mastodon transport) and surface
      the combined results. Use for pre-release regression gating.
    cmds:
      - task: bench-agent-mcp
      - task: bench-mcp-transport

  bench-mcp-remote:
    desc: |
      Run MCP benchmarks on the dev-cx53 Hetzner box (AMD EPYC, 16 vCPU, 32 GB).
      Copies the source tree via rsync, builds in release mode, runs the full
      benchmark suite (agent workload + mastodon transport), and pulls results
      back to bench/results/cx53/. Requires Tailscale + SSH access to dev-cx53.
    vars:
      HOST: '{{.HOST | default "dev-cx53"}}'
      USER: '{{.USER | default "dev"}}'
      REMOTE_DIR: '{{.REMOTE_DIR | default "/home/dev/crabcc-bench"}}'
    cmds:
      # 1. rsync the source tree to cx53 (skip target/, .git/, etc.)
      - >-
        rsync -avz --delete
        --exclude 'target/' --exclude '.git/' --exclude 'result/'
        --exclude 'compact-server/.venv/' --exclude '.repomix/'
        --exclude '.claude/' --exclude '.deepseek/'
        {{.ROOT_DIR}}/
        {{.USER}}@{{.HOST}}:{{.REMOTE_DIR}}/
      # 2. Build release + run benchmarks on cx53
      - >-
        ssh {{.USER}}@{{.HOST}}
        'cd {{.REMOTE_DIR}} &&
         cargo bench -p crabcc-mcp --features bench --bench agent_workload --bench mastodon_transport --
         --warm-up-time 3 --measurement-time 10 --sample-size 30
         --output-format bencher |
         tee bench/results/cx53-bench.txt'
      # 3. Pull results back
      - 'mkdir -p bench/results/cx53'
      - >-
        rsync -avz
        {{.USER}}@{{.HOST}}:{{.REMOTE_DIR}}/bench/results/
        bench/results/cx53/
      # 4. Surface summary
      - 'echo "── cx53 bench results ──" && cat bench/results/cx53/cx53-bench.txt'

  bench-mcp-remote-fast:
    desc: |
      Quick remote bench (3s warmup, 5s measure, 10 samples) — for fast
      iteration during development. Same rsync + ssh flow as bench-mcp-remote.
    vars:
      HOST: '{{.HOST | default "dev-cx53"}}'
      USER: '{{.USER | default "dev"}}'
      REMOTE_DIR: '{{.REMOTE_DIR | default "/home/dev/crabcc-bench"}}'
    cmds:
      - >-
        rsync -avz --delete
        --exclude 'target/' --exclude '.git/' --exclude 'result/'
        --exclude 'compact-server/.venv/' --exclude '.repomix/'
        --exclude '.claude/' --exclude '.deepseek/'
        {{.ROOT_DIR}}/
        {{.USER}}@{{.HOST}}:{{.REMOTE_DIR}}/
      - >-
        ssh {{.USER}}@{{.HOST}}
        'cd {{.REMOTE_DIR}} &&
         cargo bench -p crabcc-mcp --features bench --bench mastodon_transport --
         --warm-up-time 1 --measurement-time 5 --sample-size 10 |
         tee bench/results/cx53-quick.txt'
      - 'mkdir -p bench/results/cx53'
      - >-
        rsync -avz
        {{.USER}}@{{.HOST}}:{{.REMOTE_DIR}}/bench/results/
        bench/results/cx53/
      - 'echo "── cx53 quick bench ──" && cat bench/results/cx53/cx53-quick.txt'

  # ---------------------------------------------------------------------------
  # Nixery binary optimization matrix (node-optimized + python315t-optimized)
  # ---------------------------------------------------------------------------

  bench-nixery:
    desc: |
      bloaty + BOLT sweep for Nix-built node-optimized and python315t-optimized
      bins. Phase A (nix-build + BOLT) runs parallel; Phase B (bloaty + hyperfine
      startup latency) serial. Needs: nix-build, bloaty, hyperfine, llvm-bolt.
      Results → bench/results/nixery-REPORT.md.
    vars:
      JOBS: '{{.JOBS | default ""}}'
      PIN:  '{{.PIN | default ""}}'
      RUNS: '{{.RUNS | default "20"}}'
    cmds:
      - >-
        python3 scripts/bench-opt-bin/sweep-nixery.py
        {{if .JOBS}}--jobs {{.JOBS}}{{end}}
        {{if .PIN}}--pin {{.PIN}}{{end}}
        --runs {{.RUNS}}

  bench-nixery-no-bolt:
    desc: |
      bloaty-only sweep (no BOLT instrumentation) — fast local run to check
      binary sizes after overlay changes. Skips the BOLT instrument→workload→
      optimize loop so it completes in ~nix-build time. Needs: nix-build, bloaty.
    cmds:
      - 'python3 scripts/bench-opt-bin/sweep-nixery.py --no-bolt'

  bench-nixery-cargo-bloat:
    desc: |
      Full nixery sweep + cargo-bloat on crabcc-compact-serve. Surfaces the
      top symbols by size in the Rust binary alongside the Nix binary analysis.
      Adds a cargo build step on top of the nixery sweep.
    vars:
      JOBS: '{{.JOBS | default ""}}'
      RUNS: '{{.RUNS | default "20"}}'
    cmds:
      - >-
        python3 scripts/bench-opt-bin/sweep-nixery.py
        {{if .JOBS}}--jobs {{.JOBS}}{{end}}
        --runs {{.RUNS}}
        --cargo-bloat

  bench-nixery-node:
    desc: node-optimized legs only (base + BOLT), no Python build.
    cmds:
      - 'python3 scripts/bench-opt-bin/sweep-nixery.py --only node-base,node-bolt'

  bench-nixery-python:
    desc: python315t-optimized legs only (base + BOLT), no Node build.
    cmds:
      - 'python3 scripts/bench-opt-bin/sweep-nixery.py --only python-base,python-bolt'

  bench-nixery-all:
    desc: |
      Run all nixery bench tasks in parallel: Rust opt-bin sweep (full matrix)
      + nixery node/python sweep + cargo-bloat. Use on a big box — each task
      runs its own build phase concurrently. Results in bench/results/.
    deps:
      - bench-opt-bin-full
      - bench-nixery

  bench-nixery-dry:
    desc: Print the nixery bench plan without building anything.
    cmds:
      - 'python3 scripts/bench-opt-bin/sweep-nixery.py --dry-run'

  bench-agent-mcp:
    desc: |
      Agent->MCP hot-path bench: synthesized claude_code / nullclaw /
      zeroclaw tool-call workloads. Runs the in-process criterion bench
      (low-noise regression gate) + the e2e stdio replay (real per-call
      latency) against an indexed fixture (ROOT, default: this repo).
    vars:
      ROOT: '{{.ROOT | default .ROOT_DIR}}'
    cmds:
      # 1. In-process criterion: serve_io dispatch under each agent profile.
      - '{{.CARGO}} bench -p crabcc-mcp --features bench --bench agent_workload'
      # 2. Build the CLI the e2e harness spawns, ensure the fixture is indexed.
      - '{{.CARGO}} build --release -p crabcc-cli'
      - 'test -f "{{.ROOT}}/.crabcc/index.db" || {{.ROOT_DIR}}/target/release/crabcc index --root "{{.ROOT}}"'
      # 3. E2e stdio replay — real process + pipe latency, per agent profile.
      - >-
        for p in nullclaw zeroclaw claude_code; do
          {{.CARGO}} run -q --release -p crabcc-mcp --features bench --example agent_replay --
            --root "{{.ROOT}}" --bin {{.ROOT_DIR}}/target/release/crabcc --profile "$p";
        done

  stress:
    desc: |
      Parallel stress + fuzz the crabcc CLI — hammers the subcommand surface
      from many workers with valid + mutated args, flags panics/segfaults/hangs
      as distinct from clean usage errors. Vars: WORKERS, WRITERS, DURATION, SEED.
    deps: [build-fast]
    cmds:
      - 'test -f .crabcc/index.db || {{.ROOT_DIR}}/target/debug/crabcc index build >/dev/null'
      - >-
        python3 scripts/stress/stress.py
        --workers {{.WORKERS | default 16}}
        --writers {{.WRITERS | default 2}}
        --duration {{.DURATION | default 30}}
        {{if .SEED}}--seed {{.SEED}}{{end}}

  stress-smoke:
    desc: Fast read-only stress smoke (CI-friendly — no writers, fixed seed, deterministic).
    deps: [build-fast]
    cmds:
      - 'test -f .crabcc/index.db || {{.ROOT_DIR}}/target/debug/crabcc index build >/dev/null'
      - 'python3 scripts/stress/stress.py --workers 8 --iterations 500 --seed 1'

  soak:
    desc: |
      Long-running realistic-mix soak of the crabcc CLI — tracks latency drift,
      index.db/WAL growth, and fd leaks over time. Vars: SOAK (s), WORKERS, SEED.
    deps: [build-fast]
    cmds:
      - 'test -f .crabcc/index.db || {{.ROOT_DIR}}/target/debug/crabcc index build >/dev/null'
      - >-
        python3 scripts/stress/stress.py
        --soak {{.SOAK | default 600}}
        --workers {{.WORKERS | default 12}}
        {{if .SEED}}--seed {{.SEED}}{{end}}
