# Linear ↔ GitHub issue sync helpers (project: crabcc, team: VIB).
version: '3'

tasks:
  linear-sync:
    desc: Backfill open GitHub issues into Linear (idempotent GH-<n> titles)
    summary: |
      Requires `gh` and `LINEAR_API_KEY` (Linear → Settings → API).
      With GitHub↔Linear sync enabled, new issues sync automatically; use this
      for one-time backfill or after adding labels. Pass DRY_RUN=1 to preview.
    vars:
      DRY_RUN: '{{.DRY_RUN | default ""}}'
    cmds:
      - >-
        python3 tools/linear/sync_github_issues.py
        {{if .DRY_RUN}}--dry-run{{end}}

  linear-sync-dry-run:
    desc: Preview GitHub → Linear backfill without creating issues
    cmds:
      - task: linear-sync
        vars:
          DRY_RUN: '1'
