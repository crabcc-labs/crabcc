# crabcc-hitl-agent — local manual-test workflow.
#
# `task hitl:up` brings up the full ollama-stack (ollama + caddy +
# litellm + hitl) with sane defaults, generates a local .env if one
# is missing, and prints the dev-console URL. The dev console at
# http://127.0.0.1:9100/devapp/ runs the entire HITL surface (chat,
# pending approvals, audit) over bearer auth — no Telegram needed.
#
# Tear down with `task hitl:down`. Inspect logs with `task hitl:logs`
# (defaults to the hitl service; pass SERVICE=litellm etc).
version: '3'

vars:
  STACK_DIR: install/ollama-stack
  HITL_DIR: apps/crabcc-hitl-agent
  DEV_URL: 'http://127.0.0.1:9100/devapp/'

tasks:
  hitl:env-init:
    desc: Generate install/ollama-stack/.env with random secrets if missing.
    summary: |
      Creates secrets for OLLAMA_API_KEY, LITELLM_MASTER_KEY, and
      CRABCC_HITL_API_TOKEN if .env doesn't exist. Idempotent —
      re-running is a no-op when the file is already present.
    cmds:
      - |
        set -euo pipefail
        env_file="{{.STACK_DIR}}/.env"
        if [ -f "$env_file" ]; then
          echo "✓ {{.STACK_DIR}}/.env already exists — leaving in place"
          exit 0
        fi
        ollama_key=$(openssl rand -hex 32)
        litellm_key="sk-$(openssl rand -hex 24)"
        hitl_token=$(openssl rand -hex 32)
        cat > "$env_file" <<EOF
        # Auto-generated by \`task hitl:env-init\` — rotate before sharing.
        OLLAMA_API_KEY=$ollama_key
        LITELLM_MASTER_KEY=$litellm_key
        CRABCC_HITL_API_TOKEN=$hitl_token
        EOF
        echo "✓ wrote $env_file"
        echo "  CRABCC_HITL_API_TOKEN=$hitl_token (paste into the dev console)"

  hitl:up:
    desc: Bring up the full HITL stack (ollama + caddy + litellm + hitl) for local testing.
    summary: |
      Idempotent — runs `hitl:env-init` first, then `docker compose up
      --wait`. Prints the dev-console URL on success. Pass
      ``WAIT=false`` to skip the readiness gate (faster but the URL may
      404 briefly while litellm warms up).
    deps: [hitl:env-init]
    vars:
      WAIT: '{{.WAIT | default "true"}}'
    cmds:
      - |
        set -euo pipefail
        cd {{.STACK_DIR}}
        if [ "{{.WAIT}}" = "true" ]; then
          docker compose up -d --wait
        else
          docker compose up -d
        fi
        echo
        echo "✓ stack up — open the dev console at:"
        echo "    {{.DEV_URL}}"
        echo
        echo "  Bearer token: \$(grep ^CRABCC_HITL_API_TOKEN= .env | cut -d= -f2)"

  hitl:down:
    desc: Tear down the HITL stack containers (volumes preserved).
    cmds:
      - 'cd {{.STACK_DIR}} && docker compose down'

  hitl:logs:
    desc: Tail logs from one stack service (default hitl). Pass SERVICE=litellm etc.
    vars:
      SERVICE: '{{.SERVICE | default "hitl"}}'
    cmds:
      - 'cd {{.STACK_DIR}} && docker compose logs -f {{.SERVICE}}'

  hitl:open:
    desc: Open the dev console in the default browser.
    cmds:
      - |
        if command -v open >/dev/null 2>&1; then
          open "{{.DEV_URL}}"
        elif command -v xdg-open >/dev/null 2>&1; then
          xdg-open "{{.DEV_URL}}"
        else
          echo "open the dev console manually: {{.DEV_URL}}"
        fi

  hitl:test:
    desc: Run the HITL agent test suite (ruff + mypy + pytest).
    summary: |
      Mirrors the per-PR quality gate. Requires `uv` on PATH; bootstraps
      ``apps/crabcc-hitl-agent/.venv`` on first run.
    cmds:
      - |
        set -euo pipefail
        cd {{.HITL_DIR}}
        if [ ! -d .venv ]; then
          uv venv --python 3.13
          uv pip install -e '.[dev]'
        fi
        .venv/bin/ruff check .
        .venv/bin/ruff format --check .
        .venv/bin/mypy --strict src tests
        .venv/bin/pytest -ra -q
