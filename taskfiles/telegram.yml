# Telegram surface via crabcc-hitl-agent (Rust crabcc-telegram removed).
# tunnel-*, mcp-serve; telegram-* aliases hitl stack.
version: '3'

vars:
  CRABCC: ~/.cargo/bin/crabcc
  STACK_DIR: install/ollama-stack

tasks:
  telegram-up:
    desc: Bring up HITL stack (Telegram + LiteLLM + MCP tools)
    cmds:
      - task: hitl:up

  telegram-down:
    desc: Tear down HITL stack containers
    cmds:
      - task: hitl:down

  telegram-logs:
    desc: Tail crabcc-hitl-agent logs
    cmds:
      - task: hitl:logs

  telegram-status:
    desc: Show ollama-stack compose service status
    cmds:
      - cd {{.STACK_DIR}} && docker compose ps

  tunnel-start:
    desc: Start cloudflared quick-tunnel for crabcc serve (port 8090) — prints public URL
    summary: |
      Backgrounds cloudflared via nohup, waits up to 30s for the
      trycloudflare.com URL to appear in its log, prints the URL plus
      the matching `CRABCC_PUBLIC_URL=…` line for install/ollama-stack/.env
      and the `…/?role=mini` URL to paste into BotFather.
    cmds:
      - bash scripts/cloudflared-tunnel.sh start

  tunnel-stop:
    desc: Stop the backgrounded cloudflared tunnel
    cmds:
      - bash scripts/cloudflared-tunnel.sh stop

  tunnel-url:
    desc: Print the cloudflared tunnel URL (assumes tunnel-start has run)
    cmds:
      - bash scripts/cloudflared-tunnel.sh url

  tunnel-status:
    desc: Liveness check for the cloudflared tunnel
    cmds:
      - bash scripts/cloudflared-tunnel.sh status

  mcp-serve:
    desc: Run the crabcc MCP server over HTTP on 127.0.0.1:8091 (#204)
    summary: |
      Foreground server. Loopback-only by default. Sources
      ``install/ollama-stack/.env`` when present so ``MCP_AUTH_TOKEN`` matches
      the hitl container. Add ``CRABCC_MCP_DEV=1`` for the dev tool surface.
    cmds:
      - task: mcp-serve:run

  mcp-serve-bg:
    desc: Start MCP in the background if not already listening (#204)
    summary: |
      Idempotent — no-op when ``GET http://127.0.0.1:8091/health`` succeeds.
      Logs to ``/tmp/crabcc-mcp.log``; PID in ``/tmp/crabcc-mcp.pid``.
    cmds:
      - |
        set -euo pipefail
        if curl -fsS --max-time 2 http://127.0.0.1:8091/health >/dev/null 2>&1; then
          echo "✓ MCP already listening on 127.0.0.1:8091"
          exit 0
        fi
        env_file="{{.STACK_DIR}}/.env"
        if [ -f "$env_file" ]; then set -a && . "$env_file" && set +a; fi
        nohup {{.CRABCC}} --mcp-http 127.0.0.1:8091 > /tmp/crabcc-mcp.log 2>&1 &
        echo $! > /tmp/crabcc-mcp.pid
        for _ in $(seq 1 30); do
          if curl -fsS --max-time 1 http://127.0.0.1:8091/health >/dev/null 2>&1; then
            echo "✓ MCP started (pid $(cat /tmp/crabcc-mcp.pid), log /tmp/crabcc-mcp.log)"
            exit 0
          fi
          sleep 0.2
        done
        echo "✗ MCP did not become healthy within 6s — see /tmp/crabcc-mcp.log" >&2
        exit 1

  mcp-serve:run:
    internal: true
    cmds:
      - |
        set -euo pipefail
        env_file="{{.STACK_DIR}}/.env"
        if [ -f "$env_file" ]; then set -a && . "$env_file" && set +a; fi
        exec {{.CRABCC}} --mcp-http 127.0.0.1:8091
