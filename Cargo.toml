[workspace]
resolver = "2"
members = [
    "crates/crabcc-cli",
    "crates/crabcc-core",
    "crates/crabcc-mcp",
    "crates/crabcc-memory",
]

[workspace.package]
version = "2.4.0"
edition = "2021"
license = "MIT"
repository = "https://github.com/peterlodri-sec/crabcc"

[workspace.dependencies]
crabcc-core = { path = "crates/crabcc-core" }
crabcc-mcp = { path = "crates/crabcc-mcp" }
crabcc-memory = { path = "crates/crabcc-memory" }

anyhow = "1"
clap = { version = "4", features = ["derive"] }
rusqlite = { version = "0.31", features = ["bundled"] }
# v2.5.1 (#17) — bundled sqlite-vec C extension (FFI). Optional in
# crabcc-memory under the `memory-vec` cargo feature. Linked statically;
# no system-side install needed at build or runtime.
sqlite-vec = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
fsst-rs = "0.5"
ignore = "0.4"
grep = "0.3"
memchr = "2"
tantivy = "0.22"
tree-sitter = "0.22"
tree-sitter-typescript = "0.21"
tree-sitter-javascript = "0.21"
tree-sitter-ruby = "0.21"
tree-sitter-rust = "0.21"
tree-sitter-go = "0.21"
tree-sitter-python = "0.21"
ast-grep-core = "0.30"
ast-grep-language = "0.30"
sha2 = "0.10"
tempfile = "3"
tracing = "0.1"
tracing-subscriber = "0.3"
libc = "0.2"
notify-debouncer-mini = "0.4"
moka = { version = "0.12", features = ["sync"] }

[profile.release]
opt-level     = 3
lto           = "fat"        # whole-program optimization (was "thin"; +30s compile, ~5–10% runtime)
codegen-units = 1
panic         = "abort"      # smaller binary, no unwinding tables
strip         = true
debug         = false
incremental   = false

# Faster iteration loop than `cargo build` (-O0) without paying full release cost.
# `cargo build --profile dev-fast` gets a usable-speed binary in ~half the time.
[profile.dev-fast]
inherits      = "dev"
opt-level     = 1
debug         = 1            # minimal debug info; faster linker

# Tests run with -O0 by default; bump to -O1 so the per-file tree-sitter walks in
# query tests don't dominate the wall-time on the larger fixtures.
[profile.test]
opt-level     = 1
