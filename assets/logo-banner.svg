<?xml version="1.0" encoding="UTF-8"?>
<!--
  crabcc — horizontal banner with wordmark. 720×180. For social cards,
  GitHub OpenGraph image, README hero. Tagline below the wordmark.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 720 180"
     width="720" height="180"
     role="img" aria-label="crabcc — symbol index for AI coding agents">
  <title>crabcc</title>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#fff7f1"/>
      <stop offset="100%" stop-color="#fbe5da"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#e88a6a"/>
      <stop offset="100%" stop-color="#c25c3f"/>
    </linearGradient>
    <linearGradient id="claw" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#e88a6a"/>
      <stop offset="100%" stop-color="#a84a30"/>
    </linearGradient>
  </defs>

  <!-- Subtle warm background. Square corners; SVG renderers without rx support fall back gracefully. -->
  <rect x="0" y="0" width="720" height="180" rx="12" ry="12" fill="url(#bg)"/>

  <!-- Crab on the left, scaled down. Same paths as logo.svg but translated to fit the banner. -->
  <g transform="translate(20, 12) scale(0.6)">
    <!-- Legs -->
    <g stroke="#a84a30" stroke-width="6" stroke-linecap="round" fill="none">
      <path d="M 70 140 Q 30 150 28 188"/>
      <path d="M 70 156 Q 24 174 36 210"/>
      <path d="M 80 172 Q 56 200 70 226"/>
      <path d="M 186 140 Q 226 150 228 188"/>
      <path d="M 186 156 Q 232 174 220 210"/>
      <path d="M 176 172 Q 200 200 186 226"/>
    </g>

    <g>
      <path d="M 60 100 Q 28 88 18 110 Q 12 124 22 138 Q 38 152 64 144
               Q 60 130 68 122 Q 56 116 60 100 Z" fill="url(#claw)"/>
      <path d="M 30 118 L 18 124 L 30 130"
            fill="none" stroke="#fff7f1" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g>
      <path d="M 196 100 Q 228 88 238 110 Q 244 124 234 138 Q 218 152 192 144
               Q 196 130 188 122 Q 200 116 196 100 Z" fill="url(#claw)"/>
      <path d="M 226 118 L 238 124 L 226 130"
            fill="none" stroke="#fff7f1" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <path d="M 64 130
             C 64 78  98 60 128 60
             C 158 60 192 78 192 130
             C 192 162 168 184 128 184
             C 88 184 64 162 64 130 Z"
          fill="url(#body)" stroke="#7d3520" stroke-width="2"/>

    <g fill="#a84a30" opacity="0.45">
      <ellipse cx="100" cy="140" rx="6" ry="4"/>
      <ellipse cx="128" cy="148" rx="6" ry="4"/>
      <ellipse cx="156" cy="140" rx="6" ry="4"/>
    </g>

    <g>
      <line x1="106" y1="84" x2="106" y2="58" stroke="#7d3520" stroke-width="4" stroke-linecap="round"/>
      <circle cx="106" cy="54" r="11" fill="#fff7f1" stroke="#7d3520" stroke-width="2"/>
      <path d="M 110 50 A 5 5 0 1 0 110 58" fill="none" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
      <line x1="150" y1="84" x2="150" y2="58" stroke="#7d3520" stroke-width="4" stroke-linecap="round"/>
      <circle cx="150" cy="54" r="11" fill="#fff7f1" stroke="#7d3520" stroke-width="2"/>
      <path d="M 154 50 A 5 5 0 1 0 154 58" fill="none" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
    </g>

    <path d="M 116 154 Q 128 162 140 154" fill="none" stroke="#7d3520" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Wordmark + tagline. Inline web-safe stack so the banner renders correctly without web fonts. -->
  <text x="200" y="92"
        font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
        font-size="64" font-weight="800" fill="#7d3520" letter-spacing="-2">
    crabcc
  </text>
  <text x="201" y="124"
        font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="18" font-weight="500" fill="#a84a30" letter-spacing="0.5">
    symbol index for AI coding agents
  </text>
  <text x="201" y="148"
        font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="14" font-weight="400" fill="#7d3520" opacity="0.75">
    47–4400× faster than grep -rn  ·  85% fewer bytes  ·  Rust + SQLite + Tantivy
  </text>
</svg>
