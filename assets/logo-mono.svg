<?xml version="1.0" encoding="UTF-8"?>
<!--
  crabcc — single-color variant. Inherits color from `currentColor`, so it
  recolours from the surrounding text in any context (markdown, HTML, dark
  themes). Drop-in for inline-svg usage on the docs site.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 256 256"
     width="256" height="256"
     fill="currentColor"
     stroke="currentColor"
     role="img" aria-label="crabcc monochrome">
  <title>crabcc</title>

  <!-- Legs -->
  <g stroke-width="6" stroke-linecap="round" fill="none">
    <path d="M 70 140 Q 30 150 28 188"/>
    <path d="M 70 156 Q 24 174 36 210"/>
    <path d="M 80 172 Q 56 200 70 226"/>
    <path d="M 186 140 Q 226 150 228 188"/>
    <path d="M 186 156 Q 232 174 220 210"/>
    <path d="M 176 172 Q 200 200 186 226"/>
  </g>

  <!-- Left claw with `<` notch -->
  <path d="M 60 100 Q 28 88 18 110 Q 12 124 22 138 Q 38 152 64 144
           Q 60 130 68 122 Q 56 116 60 100 Z" fill-opacity="0.85" stroke-width="2"/>
  <path d="M 30 118 L 18 124 L 30 130" fill="none" stroke-width="3"
        stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0"/>

  <!-- Right claw -->
  <path d="M 196 100 Q 228 88 238 110 Q 244 124 234 138 Q 218 152 192 144
           Q 196 130 188 122 Q 200 116 196 100 Z" fill-opacity="0.85" stroke-width="2"/>

  <!-- Body -->
  <path d="M 64 130
           C 64 78  98 60 128 60
           C 158 60 192 78 192 130
           C 192 162 168 184 128 184
           C 88 184 64 162 64 130 Z"
        stroke-width="2"/>

  <!-- Eyes (white dots with c-shaped pupils don't survive monochrome — use solid dots) -->
  <g>
    <line x1="106" y1="84" x2="106" y2="58" stroke-width="4" stroke-linecap="round"/>
    <circle cx="106" cy="54" r="9" fill-opacity="0"/>
    <circle cx="106" cy="54" r="3" fill-opacity="1"/>
    <line x1="150" y1="84" x2="150" y2="58" stroke-width="4" stroke-linecap="round"/>
    <circle cx="150" cy="54" r="9" fill-opacity="0"/>
    <circle cx="150" cy="54" r="3" fill-opacity="1"/>
  </g>
</svg>
