<?xml version="1.0" encoding="UTF-8"?>
<!--
  crabcc logo — symbol index for AI coding agents.
  Stylized crab; claws form `<` and `>` brackets to hint at code.
  Palette aligned with bench charts (#d97757 orange = the warm "tool" color).
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 256 256"
     width="256" height="256"
     role="img" aria-label="crabcc logo">

  <title>crabcc</title>

  <defs>
    <!-- Body gradient: warm orange with a subtle shading from top to bottom. -->
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#e88a6a"/>
      <stop offset="100%" stop-color="#c25c3f"/>
    </linearGradient>
    <linearGradient id="claw" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#e88a6a"/>
      <stop offset="100%" stop-color="#a84a30"/>
    </linearGradient>
    <radialGradient id="eyeshine" cx="0.3" cy="0.3" r="0.7">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.0"/>
    </radialGradient>
  </defs>

  <!-- Six legs (3 per side). Drawn first so the body covers the inner ends. -->
  <g stroke="#a84a30" stroke-width="6" stroke-linecap="round" fill="none">
    <!-- Left side -->
    <path d="M 70 140 Q 30 150 28 188"/>
    <path d="M 70 156 Q 24 174 36 210"/>
    <path d="M 80 172 Q 56 200 70 226"/>
    <!-- Right side -->
    <path d="M 186 140 Q 226 150 228 188"/>
    <path d="M 186 156 Q 232 174 220 210"/>
    <path d="M 176 172 Q 200 200 186 226"/>
  </g>

  <!-- Left claw — open `<` bracket shape; pincer points outward.  -->
  <g>
    <path d="M 60 100
             Q 28 88  18 110
             Q 12 124 22 138
             Q 38 152 64 144
             Q 60 130 68 122
             Q 56 116 60 100 Z"
          fill="url(#claw)"/>
    <!-- Bracket-shaped notch: the `<` cut. -->
    <path d="M 30 118 L 18 124 L 30 130"
          fill="none" stroke="#fff7f1" stroke-width="3"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Right claw — `>` bracket shape; mirror of the left. -->
  <g>
    <path d="M 196 100
             Q 228 88  238 110
             Q 244 124 234 138
             Q 218 152 192 144
             Q 196 130 188 122
             Q 200 116 196 100 Z"
          fill="url(#claw)"/>
    <path d="M 226 118 L 238 124 L 226 130"
          fill="none" stroke="#fff7f1" stroke-width="3"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Crab body: rounded shell with a top-arch silhouette. -->
  <path d="M 64 130
           C 64 78  98 60 128 60
           C 158 60 192 78 192 130
           C 192 162 168 184 128 184
           C 88 184 64 162 64 130 Z"
        fill="url(#body)" stroke="#7d3520" stroke-width="2"/>

  <!-- Subtle shell dimples for character (no semantic meaning). -->
  <g fill="#a84a30" opacity="0.45">
    <ellipse cx="100" cy="140" rx="6" ry="4"/>
    <ellipse cx="128" cy="148" rx="6" ry="4"/>
    <ellipse cx="156" cy="140" rx="6" ry="4"/>
  </g>

  <!-- Eyes: stalks + pupils. The pupils are styled as `c` letterforms,
       which is the punny part — the eyes are the `cc` of crabcc. -->
  <g>
    <!-- Left eyestalk -->
    <line x1="106" y1="84" x2="106" y2="58" stroke="#7d3520" stroke-width="4" stroke-linecap="round"/>
    <circle cx="106" cy="54" r="11" fill="#fff7f1" stroke="#7d3520" stroke-width="2"/>
    <!-- Pupil shaped as `c` (open right) -->
    <path d="M 110 50 A 5 5 0 1 0 110 58"
          fill="none" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
    <circle cx="103" cy="52" r="2.2" fill="url(#eyeshine)"/>

    <!-- Right eyestalk -->
    <line x1="150" y1="84" x2="150" y2="58" stroke="#7d3520" stroke-width="4" stroke-linecap="round"/>
    <circle cx="150" cy="54" r="11" fill="#fff7f1" stroke="#7d3520" stroke-width="2"/>
    <!-- Pupil shaped as `c` (open right) -->
    <path d="M 154 50 A 5 5 0 1 0 154 58"
          fill="none" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
    <circle cx="147" cy="52" r="2.2" fill="url(#eyeshine)"/>
  </g>

  <!-- Smile: a small upward curve for personality. -->
  <path d="M 116 154 Q 128 162 140 154"
        fill="none" stroke="#7d3520" stroke-width="3" stroke-linecap="round"/>
</svg>
