# cargo-nextest config — referenced by .github/workflows/ci.yml.
# https://nexte.st/book/configuration.html

[profile.default]
# Same defaults as `cargo test` (parallel, no retries).
retries = 0
status-level = "pass"
fail-fast = false

# CI profile: emit JUnit XML for upload as a build artifact, allow flaky retries
# on the `flaky` test slow-class so transient OS-level events (FS event timing,
# tempdir mtime granularity) don't fail the whole pipeline.
[profile.ci]
retries = { backoff = "fixed", count = 2, delay = "1s" }
status-level = "all"
final-status-level = "fail"
fail-fast = false
slow-timeout = { period = "60s", terminate-after = 2 }

[profile.ci.junit]
path = "junit.xml"
report-name = "crabcc"
store-success-output = false
store-failure-output = true

# ucracc-lsp::concurrency touches the filesystem and uses multiple threads;
# give it more time and more retries under CI so transient scheduling jitter
# doesn't fail the pipeline.
# NOTE: `binary(concurrency)` matches the integration-test binary name
# (from concurrency.rs), NOT individual test names. The binary contains three
# tests — only one has "concurrency" in its name; the other two
# (writers_and_readers_same_doc_stay_consistent,
#  open_close_churn_with_concurrent_reads) need the same treatment.
[[profile.ci.overrides]]
filter = "binary(concurrency)"
retries = { backoff = "exponential", count = 3, delay = "500ms", max-delay = "10s" }
slow-timeout = { period = "120s", terminate-after = 2 }
