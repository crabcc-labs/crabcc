# crabcc Ollama auth stack — issue #105
#
# Three services:
#   ollama   — model server (internal only, never exposed to host)
#   caddy    — reverse proxy enforcing `Authorization: Bearer ${OLLAMA_API_KEY}`
#              on /api and /v1 paths
#   litellm  — OpenAI-compatible front, master-key auth, talks to ollama via caddy
#
# Bring up:    docker compose up -d --wait
# Tear down:   docker compose down
# Status:      docker compose ps
# Logs:        docker compose logs <service>
#
# Host endpoints (defaults):
#   :11435  Caddy          — Bearer-auth gated Ollama (curl-able)
#   :4000   LiteLLM proxy  — OpenAI-compatible (this is OLLAMA_BASE_URL for crabcc)
#
# Required env (see .env.example):
#   OLLAMA_API_KEY        Token Caddy enforces on /api and /v1
#   LITELLM_MASTER_KEY    Master key LiteLLM accepts on /v1/* and /key/*

name: crabcc-ollama-stack

# Reusable logging block — JSON-file driver with size cap so a chatty service
# can't fill the disk on a long-running dev box.
x-logging: &logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

# Reusable container-label block — issue #105. Per-service blocks
# extend with role-specific tags via `<<: *labels`.
x-crabcc-labels: &labels
  com.crabcc.project: "crabcc"
  com.crabcc.stack: "ollama-auth"
  com.crabcc.issue: "#105"

services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    init: true
    labels:
      <<: *labels
      com.crabcc.role: "model-server"
    expose:
      - "11434"
    # Default Docker shm is 64 MiB; Ollama mmaps model weights and benefits
    # from a larger shared-memory segment, especially for multi-GB models.
    shm_size: "2gb"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    volumes:
      - ollama_models:/root/.ollama
      # Shared crabcc workspace: graph, memory, tantivy index, repomix output.
      # Mounted read-only so container agents can read context without risk of
      # corrupting the host index. Write access lives on the host side only.
      - "${HOME}/.crabcc:/home/crabcc/.crabcc:ro"
    # /tmp in tmpfs avoids touching the overlayfs for transient model writes.
    tmpfs:
      - /tmp:size=512m,mode=1777
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 24gb
    # Performance tuning. Defaults are conservative for low-RAM laptops;
    # we explicitly bump for the 32-64 GiB Mac dev workflow.
    #   OLLAMA_NUM_PARALLEL=4   serve up to 4 concurrent chat completions
    #                           (per-crate agents fan out — without this,
    #                           the second one queues until the first
    #                           finishes a turn).
    #   OLLAMA_NUM_THREAD=0     "0" tells ollama to auto-pick (≈ p-cores).
    #                           Set to a fixed number if you want to
    #                           reserve cores for other host work.
    #   OLLAMA_KEEP_ALIVE=30m   keep the model resident for 30 min after
    #                           last use (default 5m). Reloading qwen2.5-
    #                           coder Q4_K_M takes ~3 s on Apple Silicon
    #                           — annoying when you're iterating fast.
    #   OLLAMA_MAX_LOADED_MODELS=2  allow holding two models hot at once
    #                           (e.g. coder + embed) without evicting.
    #   OLLAMA_FLASH_ATTENTION=1   enable Flash Attention on supported
    #                           models — faster prefill on large prompts.
    environment:
      OLLAMA_NUM_PARALLEL: "4"
      OLLAMA_NUM_THREAD: "0"
      OLLAMA_KEEP_ALIVE: "30m"
      OLLAMA_MAX_LOADED_MODELS: "2"
      OLLAMA_FLASH_ATTENTION: "1"
      # 64k default context window — crabcc agents need at least this.
      OLLAMA_NUM_CTX: "65536"
      # Host timezone + locale so model timestamps and sorting are correct.
      TZ: "Europe/Budapest"
      LANG: "en_US.UTF-8"
      LC_ALL: "en_US.UTF-8"
    logging: *logging
    networks:
      - stack

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    init: true
    labels:
      <<: *labels
      com.crabcc.role: "auth-proxy"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:?OLLAMA_API_KEY is required}
    ports:
      - "${CADDY_PORT:-11435}:11434"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    tmpfs:
      - /tmp:size=64m,mode=1777
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:11434/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256mb
    logging: *logging
    networks:
      - stack

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    restart: unless-stopped
    init: true
    labels:
      <<: *labels
      com.crabcc.role: "openai-front"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    depends_on:
      caddy:
        condition: service_healthy
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:?LITELLM_MASTER_KEY is required}
      OLLAMA_API_BASE: http://caddy:11434
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:?OLLAMA_API_KEY is required}
      # Optional Anthropic routing — when set, the proxy serves
      # claude-* models from litellm.config.yaml. Empty default keeps
      # the stack runnable with Ollama only.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Redis-backed cache (optional). When unset, litellm.config.yaml
      # falls back to its in-memory `local` cache.
      LITELLM_CACHE_REDIS_URL: ${LITELLM_CACHE_REDIS_URL:-}
      # Langfuse tracing (optional — `success_callback: ["langfuse"]`
      # in litellm.config.yaml is a no-op when these are empty).
      LANGFUSE_HOST: ${LANGFUSE_HOST:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    volumes:
      - ./litellm.config.yaml:/app/config.yaml:ro
    tmpfs:
      - /tmp:size=128m,mode=1777
    # --num_workers 2 gives the proxy two uvicorn worker processes
    # so concurrent chat completions don't queue at the gateway. Keep
    # in sync with OLLAMA_NUM_PARALLEL upstream so the bottleneck
    # stays at the model, not the proxy.
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "2"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4000/health/liveliness >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2gb
    logging: *logging
    # litellm sits on BOTH networks: `stack` for intra-stack ollama+caddy
    # comms, `crabcc-shared` so cross-stack consumers (the dev compose,
    # the future BullMQ worker from issue #109) can reach :4000 without
    # going through the host port.
    networks:
      - stack
      - crabcc-shared

  # crabcc-hitl-agent — Python FastAPI service bridging the Telegram
  # bot to LiteLLM. Phase 0: round-trip /chat. Phase 1+ adds tool
  # calls + HITL approval. See apps/crabcc-hitl-agent/README.md for
  # the full service contract.
  #
  # Joins both networks for the same reason litellm does: `stack` for
  # the LiteLLM upstream hop, `crabcc-shared` so the telegram bot (in
  # its own container / host process) can reach us by service DNS.
  hitl:
    image: ghcr.io/peterlodri-sec/crabcc-hitl-agent:${CRABCC_HITL_VERSION:-dev}
    # Built locally on first `compose up` when no image is in the
    # local registry. The build context is the apps/ directory; the
    # relative path resolves from this compose file's location.
    build:
      context: ../../apps/crabcc-hitl-agent
      dockerfile: Dockerfile
    container_name: crabcc-hitl-agent
    restart: unless-stopped
    init: true
    labels:
      <<: *labels
      com.crabcc.role: "hitl-agent"
    depends_on:
      litellm:
        condition: service_healthy
    environment:
      # Required — fail-fast when missing.
      CRABCC_HITL_LITELLM_BASE_URL: http://litellm:4000
      CRABCC_HITL_LITELLM_API_KEY: ${LITELLM_MASTER_KEY:?LITELLM_MASTER_KEY required}
      CRABCC_HITL_API_TOKEN: ${CRABCC_HITL_API_TOKEN:?CRABCC_HITL_API_TOKEN required (openssl rand -hex 32)}
      # Pick the model registered in litellm.config.yaml. Default is
      # the cheapest tool-call-capable Claude — Phase 0 doesn't need
      # tools yet, but the model still has to be tool-capable so
      # Phase 1 lands without re-config.
      CRABCC_HITL_MODEL: ${CRABCC_HITL_MODEL:-claude-haiku-4-5}
      # Tunables — sane defaults baked into settings.py.
      CRABCC_HITL_MAX_TASK_CHARS: ${CRABCC_HITL_MAX_TASK_CHARS:-4000}
      CRABCC_HITL_LOG_LEVEL: ${CRABCC_HITL_LOG_LEVEL:-info}
      CRABCC_HITL_MCP_ENABLED: ${CRABCC_HITL_MCP_ENABLED:-true}
      # Mark we're inside compose so service_discovery uses service-DNS
      # hostnames in the announce log.
      CRABCC_COMPOSE: "1"
      # Optional: the rotel collector (issue #105 sibling). The OTel
      # SDK no-ops cleanly when this is unset.
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_DEPLOYMENT_ENVIRONMENT: ${OTEL_DEPLOYMENT_ENVIRONMENT:-dev}
      # Phase 2 — approval flow + Mini App. The bot token is shared
      # with the Rust crabcc-telegram bot (one BotFather token, two
      # processes; we only emit messages, the bot owns getUpdates).
      # ``CRABCC_HITL_TELEGRAM_OWNER_CHAT_ID`` is the fallback chat for
      # approvals when /chat didn't carry one. Empty values disable
      # the relevant surface — required tools then fail closed.
      CRABCC_HITL_TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      CRABCC_HITL_TELEGRAM_OWNER_CHAT_ID: ${CRABCC_HITL_TELEGRAM_OWNER_CHAT_ID:-}
      CRABCC_HITL_APPROVAL_TIMEOUT_S: ${CRABCC_HITL_APPROVAL_TIMEOUT_S:-120}
      CRABCC_HITL_APPROVAL_REQUIRED_TOOLS: ${CRABCC_HITL_APPROVAL_REQUIRED_TOOLS:-memory_remember,fetch_url}
    ports:
      # Loopback-only — peer containers reach us via service DNS, not
      # the host port. The host bindings exist purely for
      # `curl 127.0.0.1:9100/healthz` debugging from the dev box.
      - "127.0.0.1:${CRABCC_HITL_PORT:-9100}:9100"
      - "127.0.0.1:${CRABCC_HITL_MCP_PORT:-9101}:9101"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "--max-time", "5", "http://127.0.0.1:9100/healthz"]
      interval: 30s
      timeout: 6s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512mb
    logging: *logging
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - stack
      - crabcc-shared

  # cloudflared — public HTTPS tunnel for the Telegram Mini App
  # (/webapp/*). Telegram requires HTTPS for Mini Apps and signs
  # initData with the bot token, so the tunnel only fronts the HITL
  # service's webapp paths. Running this service is optional: when
  # ``CLOUDFLARED_TUNNEL_TOKEN`` is empty, the tunnel container
  # backs off and exits, the rest of the stack works unchanged.
  #
  # Setup (one-off):
  #   1. Cloudflare Zero Trust → Networks → Tunnels → Create
  #   2. Pick "Cloudflared" connector, copy the tunnel token
  #   3. Add a public hostname (e.g. crabcc-webapp.<your-zone>.com)
  #      pointing service ``hitl:9100`` (path /webapp).
  #   4. Set ``CLOUDFLARED_TUNNEL_TOKEN=<token>`` in .env, then
  #      ``docker compose up -d cloudflared``.
  #   5. Configure the bot: BotFather → /setdomain →
  #      crabcc-webapp.<your-zone>.com.
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    init: true
    labels:
      <<: *labels
      com.crabcc.role: "tunnel"
    profiles:
      # Opt-in service: only starts when the user passes
      # ``--profile tunnel`` or ``COMPOSE_PROFILES=tunnel``. Keeps
      # ``compose up`` lean for users who don't run a Mini App.
      - tunnel
    # Token is interpolated lazily via env_file so `compose config`
    # against an empty .env stays clean for users who don't run the
    # tunnel. Cloudflared itself rejects empty tokens with a clear
    # error if the profile is activated without one.
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARED_TUNNEL_TOKEN:-}
    command:
      - tunnel
      - --no-autoupdate
      - run
    depends_on:
      hitl:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128mb
    logging: *logging
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    networks:
      # Same network as hitl — the tunnel resolves ``hitl:9100`` via
      # docker DNS and forwards Cloudflare-side requests through it.
      - crabcc-shared

volumes:
  ollama_models:
  caddy_data:
  caddy_config:

networks:
  # Internal stack — ollama + caddy + litellm only. Not joinable from
  # outside.
  stack:
    driver: bridge
  # Shared bridge for cross-stack DNS — must exist before `compose up`.
  # Bootstrap once with: install/init-shared-network.sh
  crabcc-shared:
    name: crabcc-shared
    external: true
