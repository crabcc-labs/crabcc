# crabcc Ollama auth stack — LiteLLM proxy config — issue #105
#
# Routes OpenAI-compatible requests to Ollama via the Caddy reverse proxy.
# Bearer token to upstream Ollama is OLLAMA_API_KEY (forwarded by LiteLLM).
#
# Master key for LiteLLM itself is LITELLM_MASTER_KEY — clients send it as
# `Authorization: Bearer ${LITELLM_MASTER_KEY}` on the OpenAI-compatible
# endpoints.

# Per-model tuning. v2.10.x raises:
#   timeout      90 s default → 600 s (long codegen prompts at 32k ctx)
#   stream_timeout 30 s → 60 s   (allow gaps between tokens on cold model)
#   max_parallel_requests   defaults to unbounded; cap at 8 so a runaway
#                           agent fan-out doesn't OOM ollama via overload
model_list:
  # Apple Silicon optimized — qwen3.5 35B A3B coding, 4-bit quantized
  - model_name: qwen3.5:35b-a3b-coding-nvfp4
    litellm_params:
      model: ollama_chat/qwen3.5:35b-a3b-coding-nvfp4
      api_base: os.environ/OLLAMA_API_BASE
      api_key: os.environ/OLLAMA_API_KEY
      timeout: 600
      stream_timeout: 60
      max_parallel_requests: 4

  # Prefixed alias (for clients that send model as "ollama/<name>")
  - model_name: ollama/qwen3.5:35b-a3b-coding-nvfp4
    litellm_params:
      model: ollama_chat/qwen3.5:35b-a3b-coding-nvfp4
      api_base: os.environ/OLLAMA_API_BASE
      api_key: os.environ/OLLAMA_API_KEY
      timeout: 600
      stream_timeout: 60
      max_parallel_requests: 4

  # crabcc agent model — 7B coding model, 64k context
  - model_name: qwen2.5-coder
    litellm_params:
      model: ollama_chat/qwen2.5-coder
      api_base: os.environ/OLLAMA_API_BASE
      api_key: os.environ/OLLAMA_API_KEY
      timeout: 600
      stream_timeout: 60
      max_parallel_requests: 8

  - model_name: ollama/qwen2.5-coder
    litellm_params:
      model: ollama_chat/qwen2.5-coder
      api_base: os.environ/OLLAMA_API_BASE
      api_key: os.environ/OLLAMA_API_KEY
      timeout: 600
      stream_timeout: 60
      max_parallel_requests: 8

  - model_name: ollama/nomic-embed-text
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: os.environ/OLLAMA_API_BASE
      api_key: os.environ/OLLAMA_API_KEY
      mode: embedding
      timeout: 60
      max_parallel_requests: 16

# Defaults for any parameters the agent doesn't pin per-call. Mirrors
# the four flags the .info file documents for qwen2.5-coder so a fresh
# agent run gets deterministic-leaning code edits without each caller
# having to set them. drop_params=true means we accept upstream
# OpenAI-style fields and quietly drop ones ollama doesn't grok.
litellm_settings:
  drop_params: true
  set_verbose: false
  json_logs: true
  request_timeout: 600
  default_litellm_params:
    temperature: 0.2
    top_p: 0.9
    # Qwen3.5-35B-A3B runs in thinking mode by default (<think> blocks).
    # For agent/code tasks we want direct answers; suppress thinking via
    # the /no_think token in the stop list AND the system message prefix.
    # Clients that want thinking can override per-request.
    stop: ["</think>"]
  # Cache identical prompt+model pairs in-memory for 10 min — saves a
  # full re-prefill on repeat agent dry-runs / smoke tests.
  cache: true
  cache_params:
    type: local
    ttl: 600

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  # Virtual-key persistence requires Postgres — out of scope for issue #105.
  # Uncomment and set DATABASE_URL to enable per-team / per-agent virtual keys.
  # database_url: os.environ/DATABASE_URL
