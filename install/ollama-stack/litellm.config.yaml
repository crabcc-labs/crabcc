# crabcc Ollama auth stack — LiteLLM proxy config — issue #105
#
# Routes OpenAI-compatible requests to Ollama via the Caddy reverse proxy.
# Bearer token to upstream Ollama is OLLAMA_API_KEY (forwarded by LiteLLM).
#
# Master key for LiteLLM itself is LITELLM_MASTER_KEY — clients send it as
# `Authorization: Bearer ${LITELLM_MASTER_KEY}` on the OpenAI-compatible
# endpoints.

# Per-model tuning. v2.10.x raises:
#   timeout      90 s default → 600 s (long codegen prompts at 32k ctx)
#   stream_timeout 30 s → 60 s   (allow gaps between tokens on cold model)
#   max_parallel_requests   defaults to unbounded; cap at 8 so a runaway
#                           agent fan-out doesn't OOM ollama via overload
model_list:
  # Apple Silicon optimized — qwen3.5 35B A3B coding, 4-bit quantized
  - model_name: qwen3.5:35b-a3b-coding-nvfp4
    litellm_params:
      model: ollama_chat/qwen3.5:35b-a3b-coding-nvfp4
      api_base: os.environ/OLLAMA_API_BASE
      api_key: os.environ/OLLAMA_API_KEY
      timeout: 600
      stream_timeout: 60
      max_parallel_requests: 4

  # Prefixed alias (for clients that send model as "ollama/<name>")
  - model_name: ollama/qwen3.5:35b-a3b-coding-nvfp4
    litellm_params:
      model: ollama_chat/qwen3.5:35b-a3b-coding-nvfp4
      api_base: os.environ/OLLAMA_API_BASE
      api_key: os.environ/OLLAMA_API_KEY
      timeout: 600
      stream_timeout: 60
      max_parallel_requests: 4

  # crabcc agent model — 7B coding model, 64k context
  - model_name: qwen2.5-coder
    litellm_params:
      model: ollama_chat/qwen2.5-coder
      api_base: os.environ/OLLAMA_API_BASE
      api_key: os.environ/OLLAMA_API_KEY
      timeout: 600
      stream_timeout: 60
      max_parallel_requests: 8

  - model_name: ollama/qwen2.5-coder
    litellm_params:
      model: ollama_chat/qwen2.5-coder
      api_base: os.environ/OLLAMA_API_BASE
      api_key: os.environ/OLLAMA_API_KEY
      timeout: 600
      stream_timeout: 60
      max_parallel_requests: 8

  # Summary lane — pre-summarises resource snippets before stuffing
  # them into the primary model's context (e.g. an MCP sampling offer
  # that requests `includeContext`). Qwen3-4B picked to share a
  # tokenizer family with the qwen3.5:35b primary (predictable token
  # accounting after concatenation) and to fit comfortably alongside
  # the 35B in unified memory on a ≥32 GB host.
  - model_name: qwen3:4b
    litellm_params:
      model: ollama_chat/qwen3:4b
      api_base: os.environ/OLLAMA_API_BASE
      api_key: os.environ/OLLAMA_API_KEY
      timeout: 120
      stream_timeout: 30
      max_parallel_requests: 8

  - model_name: ollama/qwen3:4b
    litellm_params:
      model: ollama_chat/qwen3:4b
      api_base: os.environ/OLLAMA_API_BASE
      api_key: os.environ/OLLAMA_API_KEY
      timeout: 120
      stream_timeout: 30
      max_parallel_requests: 8

  - model_name: ollama/nomic-embed-text
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: os.environ/OLLAMA_API_BASE
      api_key: os.environ/OLLAMA_API_KEY
      mode: embedding
      timeout: 60
      max_parallel_requests: 16

  # ── Anthropic — used by crabcc-agents (mini-swe-agent + Claude Code
  # mini-swe-agent variant) when ANTHROPIC_API_KEY is set in LiteLLM's
  # environment. Routing through the proxy gives us centralized cost
  # tracking, response caching, fallbacks, and a single egress
  # surface to lock down per-network. Key is consumed by litellm
  # itself; nothing leaks into agent containers.
  #
  # Per-model `rpm` / `tpm` are conservative — bumps require the
  # actual Anthropic plan ceilings.
  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
      timeout: 600
      stream_timeout: 60
      max_parallel_requests: 8
      rpm: 50
      tpm: 100000

  - model_name: claude-haiku-4-5
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY
      timeout: 300
      stream_timeout: 60
      max_parallel_requests: 16
      rpm: 100
      tpm: 200000

  - model_name: claude-opus-4-7
    litellm_params:
      model: anthropic/claude-opus-4-7
      api_key: os.environ/ANTHROPIC_API_KEY
      timeout: 900
      stream_timeout: 90
      max_parallel_requests: 4
      rpm: 25
      tpm: 50000

  # DeepSeek — routes to api.deepseek.com when DEEPSEEK_API_KEY is set.
  # Used by `crabcc agent --backend deepseek` (Backend::DeepSeekRemote) to
  # skip the local Docker Compose stack while still routing through LiteLLM
  # for central cost tracking, caching, and fallbacks.
  # OVH c2-15 local Ollama: set OLLAMA_BASE_URL to the remote endpoint and
  # use ollama/deepseek-r1:14b or ollama/deepseek-coder-v2:16b model names.
  # Primary coding model: usewhale/DeepSeek-Code-Whale (Ollama-served).
  # Pull first: ollama pull usewhale/deepseek-code-whale
  # github.com/usewhale/DeepSeek-Code-Whale
  - model_name: deepseek-code-whale
    litellm_params:
      model: ollama_chat/usewhale/deepseek-code-whale
      api_base: os.environ/OLLAMA_API_BASE
      api_key: os.environ/OLLAMA_API_KEY
      timeout: 600
      stream_timeout: 60
      max_parallel_requests: 4

  # Fallback: DeepSeek API (api.deepseek.com) when Ollama stack is unavailable.
  # Requires DEEPSEEK_API_KEY.
  - model_name: deepseek-chat
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: os.environ/DEEPSEEK_API_KEY
      timeout: 600
      stream_timeout: 60
      max_parallel_requests: 4

# Fallback chains — fire on rate-limit / timeout / overload errors.
# Sonnet → Haiku keeps agents productive when the primary model is
# saturated; Opus → Sonnet is a degrade-rather-than-fail story for
# heavyweight prompts. Each chain entry is a literal model_name.
router_settings:
  fallbacks:
    - claude-sonnet-4-6: ["claude-haiku-4-5"]
    - claude-opus-4-7: ["claude-sonnet-4-6", "claude-haiku-4-5"]
  num_retries: 2
  retry_after: 5
  # Round-robin across replicas of the same model_name (when defined).
  routing_strategy: usage-based-routing-v2
  # Cool-down period after a model returns a rate-limit error before
  # routing back to it.
  cooldown_time: 30

# Defaults for any parameters the agent doesn't pin per-call. Mirrors
# the four flags the .info file documents for qwen2.5-coder so a fresh
# agent run gets deterministic-leaning code edits without each caller
# having to set them. drop_params=true means we accept upstream
# OpenAI-style fields and quietly drop ones ollama doesn't grok.
litellm_settings:
  drop_params: true
  set_verbose: false
  json_logs: true
  request_timeout: 600

  # Forward correlation headers (x-request-id, x-trace-id) from the
  # client through to the upstream provider — lets us tie an agent
  # job's BullMQ id to the eventual Anthropic call in logs.
  forward_client_headers_to_llm_api: true

  # Global retry default — per-model `rpm`/`tpm` already cap us; this
  # handles transient 5xx and connection errors. Router-level retries
  # take precedence (see `router_settings.num_retries`).
  num_retries: 2

  # Track per-model spend in the proxy's logs — cheap, useful for
  # weekly review. Detailed per-key budgets need a Postgres backing
  # store (see `general_settings.database_url`).
  #
  # `compression_interception` is the server-side prompt-cache loop
  # described at https://docs.litellm.ai/docs/tutorials/prompt_caching.
  # On every Anthropic /v1/messages call, LiteLLM:
  #   1. compresses inbound messages before the first provider call,
  #   2. injects the `litellm_content_retrieve` tool,
  #   3. detects retrieval `tool_use` blocks in the model response,
  #   4. resolves retrieval keys from the compression cache,
  #   5. reruns the model via agentic loop and returns the final answer.
  # SWE-bench Lite (5 problems, Opus, trigger=10k):
  #   • prompt tokens   30,828 → 6,890 (-77.7%)
  #   • cost / problem  $0.488 → $0.136 (-72.0%)
  #   • file overlap    1.000 (preserved)
  #   • content sim     0.367 → 0.373 (preserved)
  #   • hunk overlap    0.582 → 0.361 (modest -0.221 — model targets
  #     right files, may pick slightly different line ranges with
  #     less surrounding context).
  # Trigger / target are tunable per workload — defaults are the
  # benchmark values that produced the numbers above.
  callbacks: ["compression_interception"]
  compression_interception_params:
    enabled: true
    compression_trigger: 10000
    compression_target: 7000

  success_callback: ["langfuse"]   # no-op when LANGFUSE_* env unset
  failure_callback: []
  redact_user_api_key_info: true

  default_litellm_params:
    temperature: 0.2
    top_p: 0.9
    # Qwen3.5-35B-A3B runs in thinking mode by default (<think> blocks).
    # For agent/code tasks we want direct answers; suppress thinking via
    # the /no_think token in the stop list AND the system message prefix.
    # Clients that want thinking can override per-request.
    stop: ["</think>"]

  # Cache identical prompt+model pairs. `local` (in-memory) keeps the
  # ollama-stack runnable standalone (no Redis dep). When LiteLLM is
  # co-deployed with the crabcc-agents stack, set
  # `LITELLM_CACHE_REDIS_URL=redis://redis:6379` and switch
  # `cache_params.type` to `redis` for cross-restart cache survival.
  # TTL bumped 600 → 1800 — agent prompts hit the same context many
  # times during a multi-step plan; longer TTL pays off.
  cache: true
  cache_params:
    type: local
    ttl: 1800

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  # Virtual-key persistence requires Postgres — out of scope for issue #105.
  # Uncomment and set DATABASE_URL to enable per-team / per-agent virtual keys.
  # database_url: os.environ/DATABASE_URL
