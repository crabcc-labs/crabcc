# crabcc dev Compose stack — issues #105 / #107.
#
# Services:
#   crabcc      — crabcc serve (--root /workspace)
#   viz-web     — esbuild --watch for the /live dashboard
#   redis       — BullMQ backend        [--profile jobs]
#   jobs-worker — BullMQ worker          [--profile jobs]
#   bull-board  — job queue dashboard    [--profile dev-tools]
#
# Run from repo root:
#   docker compose -f install/dev/docker-compose.yml up --build
#   docker compose -f install/dev/docker-compose.yml --profile jobs up --build
#   # Bull Board at :3001:
#   docker compose -f install/dev/docker-compose.yml --profile jobs --profile dev-tools up --build
#
# Hot iteration:
#   - Edit crates/crabcc-viz/web/src/* on host → esbuild --watch rebuilds
#     dist/live.html in the bind volume → trigger a `crabcc` rebuild via
#     `task build-fast` on host (until issue #107 lands a dev mode that
#     reads dist/ from disk instead of include_str!).
#
# This stack is independent of install/ollama-stack/. Compose them together
# with two -f flags if you want the auth stack alongside:
#   docker compose \
#     -f install/ollama-stack/docker-compose.yml \
#     -f install/dev/docker-compose.yml \
#     up --build

name: crabcc-dev

x-logging: &logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

# Reusable container-label block — issue #105 / #109. Per-service
# blocks extend via `<<: *labels` with role-specific tags.
x-crabcc-labels: &labels
  com.crabcc.project: "crabcc"
  com.crabcc.stack: "dev"
  com.crabcc.issue: "#105"

services:
  crabcc:
    build:
      context: ../..
      dockerfile: install/Dockerfile.crabcc
      cache_from:
        - crabcc:local
      args:
        # Wired by `task images-build` so the resulting image labels
        # carry the git revision and ISO-8601 build timestamp.
        GIT_SHA: ${CRABCC_GIT_SHA:-unknown}
        BUILD_DATE: ${CRABCC_BUILD_DATE:-unknown}
        VERSION: ${CRABCC_VERSION:-dev}
      labels:
        <<: *labels
        com.crabcc.role: "agent-runtime"
    image: crabcc:local
    init: true
    labels:
      <<: *labels
      com.crabcc.role: "agent-runtime"
    user: "${UID:-1000}:${GID:-1000}"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Bind the repo root in read-write so `crabcc index` writes .crabcc/
    # back to the host. Adjust the source path if running from elsewhere.
    volumes:
      - ../..:/workspace:rw
      - crabcc_cache:/home/crabcc/.cache/crabcc-memory
    working_dir: /workspace
    # Pull OLLAMA_API_KEY + LITELLM_MASTER_KEY from the auth-stack's .env
    # when present (gated by `required: false` so this compose still boots
    # standalone). Override with explicit values via the host shell.
    env_file:
      - path: ../ollama-stack/.env
        required: false
    environment:
      RUST_LOG: ${RUST_LOG:-crabcc=info}
      CRABCC_AUTO_MEMORY: ${CRABCC_AUTO_MEMORY:-0}
      # Talk to LiteLLM over the shared network (DNS name == service name).
      # Falls back to host gateway when the auth stack isn't running, so
      # `--backend claude` paths keep working.
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://litellm:4000}
    command:
      - serve
      - --bind
      - 0.0.0.0
      - --port
      - "8090"
      - --root
      - /workspace
      - --no-open
    ports:
      - "${CRABCC_SERVE_PORT:-8090}:8090"
    healthcheck:
      # crabcc serve has no /healthz; root path returns 200 once /api/bootstrap completes.
      test: ["CMD-SHELL", "wget -qO- http://localhost:8090/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2gb
    logging: *logging
    # Two-network attachment: `dev` for crabcc↔viz-web, `crabcc-shared`
    # for cross-stack DNS to litellm:4000 (and future BullMQ workers,
    # issue #109).
    networks:
      - dev
      - crabcc-shared

  viz-web:
    image: oven/bun:1-alpine
    init: true
    labels:
      <<: *labels
      com.crabcc.role: "viz-web-watch"
      com.crabcc.issue: "#101"
    user: "${UID:-1000}:${GID:-1000}"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    working_dir: /web
    # Bind only the viz-web subtree to keep the watch surface tight.
    volumes:
      - ../../crates/crabcc-viz/web:/web:rw
      - bun_install_cache:/home/bun/.bun/install/cache
    environment:
      # esbuild's chokidar fallback can be flaky on bind volumes — force polling.
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    command: ["sh", "-c", "bun install --frozen-lockfile && bun run dev"]
    # No port exposed — viz-web writes to /web/dist/ on the bind volume; the
    # crabcc service / host re-includes it. A future Phase serves dist/ over
    # HTTP for browser-side livereload.
    healthcheck:
      test: ["CMD-SHELL", "test -f /web/dist/live.html || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1gb
    logging: *logging
    networks:
      - dev

  # Issue #109 — Redis backend for the BullMQ-based agent coordination
  # layer. Disabled by default; enable with `--profile jobs`. The crabcc
  # service auto-discovers REDIS_URL when this profile is active. The
  # Node worker (apps/jobs-worker) lands in a follow-up commit and joins
  # this same service.
  redis:
    image: redis:7-alpine
    profiles:
      - jobs
    restart: unless-stopped
    init: true
    labels:
      <<: *labels
      com.crabcc.role: "jobs-queue"
      com.crabcc.issue: "#109"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - "256mb"
      - --maxmemory-policy
      - allkeys-lru
      - --save
      - "60 1000"
    expose:
      - "6379"
    # Internal-only by default; uncomment to expose for Bull Board.
    # ports:
    #   - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 384mb
    logging: *logging
    networks:
      - dev
      - crabcc-shared

  # Issue #109 — BullMQ worker. Same `--profile jobs` gate as redis;
  # joins the same crabcc-shared network so the Rust submitter (in the
  # crabcc service) can drop jobs onto Redis and the worker dequeues
  # them. Today's handler is an echo passthrough; real per-queue logic
  # lands per issue #109's AC.
  jobs-worker:
    build:
      context: ../../apps/jobs-worker
      dockerfile: Dockerfile
      labels:
        <<: *labels
        com.crabcc.role: "jobs-worker"
        com.crabcc.issue: "#109"
    image: crabcc-jobs-worker:local
    profiles:
      - jobs
    restart: unless-stopped
    init: true
    labels:
      <<: *labels
      com.crabcc.role: "jobs-worker"
      com.crabcc.issue: "#109"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
    environment:
      REDIS_URL: redis://redis:6379
      CRABCC_BIN: /usr/local/bin/crabcc
      CRABCC_ROOT: /workspace
      CRABCC_AGENT_BACKEND: ollama
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://litellm:4000}
      WORKER_CONCURRENCY: "2"
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    volumes:
      # Bind repo so agent:run / repo:index can operate on it.
      - ../..:/workspace:rw
      # Mount host crabcc binary so handlers can shell out.
      - ${CRABCC_BIN_HOST:-~/.cargo/bin/crabcc}:/usr/local/bin/crabcc:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/healthz >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512mb
    logging: *logging
    networks:
      - dev
      - crabcc-shared

  # ── Bull Board — job queue dashboard (:3001) — profile: dev-tools ──────────
  bull-board:
    image: ghcr.io/taskforcesh/bullboard:latest
    profiles:
      - dev-tools
    restart: unless-stopped
    init: true
    labels:
      <<: *labels
      com.crabcc.role: "jobs-dashboard"
      com.crabcc.issue: "#109"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      BULL_PREFIX: bull
    ports:
      - "${BULL_BOARD_PORT:-3001}:3000"
    deploy:
      resources:
        limits:
          memory: 256mb
    logging: *logging
    networks:
      - dev

volumes:
  crabcc_cache:
  bun_install_cache:
  redis_data:

networks:
  # Internal dev network — crabcc + viz-web only.
  dev:
    driver: bridge
  # Cross-stack bridge — joined by services here AND in the auth stack.
  # Created once via install/init-shared-network.sh (idempotent).
  crabcc-shared:
    name: crabcc-shared
    external: true
