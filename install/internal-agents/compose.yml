# compose.yml — internal-agents fan-out for Apple `container compose`
# and Docker `docker compose`. Same file, same surface.
#
# Bring up all five per-crate agents:
#     container compose -f install/internal-agents/compose.yml up
#     # or with --build the first time:
#     container compose -f install/internal-agents/compose.yml up --build
#
# Stream logs from one:
#     container compose -f install/internal-agents/compose.yml logs -f crabcc-core
#
# Tear down:
#     container compose -f install/internal-agents/compose.yml down

name: crabcc-internal-agents

x-agent: &agent-base
  image: crabcc-internal-agents:dev
  build:
    context: ../..
    dockerfile: install/internal-agents/Containerfile
  volumes:
    - ..:/workspace                    # repo root, RW
    - cargo-cache:/cargo               # shared cargo registry/git
    # SSH agent passthrough — lets the container clone over SSH +
    # use git auth without baking keys into the image. Apple container
    # populates SSH_AUTH_SOCK from the host equivalent of `--ssh`; for
    # Docker compatibility we mount the env's socket explicitly.
    - ${SSH_AUTH_SOCK:-/dev/null}:/run/host-services/ssh-auth.sock
  working_dir: /workspace
  environment:
    CARGO_HOME: /cargo
    CRABCC_NO_HINT: "1"
    RUST_LOG: "crabcc_core=info,warn"
    # Make the mounted SSH agent visible to the agent's git/gh calls.
    SSH_AUTH_SOCK: /run/host-services/ssh-auth.sock
  # `init: true` runs the lightweight init Apple container ships. It
  # forwards signals AND reaps orphaned children, so cargo/rustc/gh
  # subprocesses don't accumulate as zombies. Equivalent to `--init`
  # on the bare `container run` CLI.
  init: true
  # Per-VM resource caps. Each agent runs in its own lightweight VM,
  # so caps are charged per-agent. 8 GiB headroom covers:
  #   - cargo build of the workspace                        ~2-3 GiB
  #   - tree-sitter cursor walks + tantivy index loads       ~1 GiB
  #   - crabcc-memory's bench harness w/ FastEmbedder ONNX   ~1.5 GiB
  #   - claude/cua subprocess + ad-hoc gh / git              ~500 MiB
  #   - the rest is slack so the OOM killer never fires under
  #     a long-running agent loop.
  # Total ceiling: 5 agents × 8 GiB = 40 GiB. Fine on a 32-64 GiB Mac;
  # all five hot at the same time is rare. Override via Compose's
  # standard mem_limit if a particular crate's agent needs more.
  #
  # Note: model RAM lives in the separate ollama-stack containers
  # (issue #105), NOT here. The agent only needs enough headroom for
  # the LiteLLM client + its own toolchain.
  mem_limit: 12g
  cpus: 6
  # Drop everything the agent shouldn't need — code-edit + cargo build
  # + gh need almost no Linux capabilities. We re-add CHOWN so cargo's
  # registry cache permission fix-up works, and SETUID/SETGID for the
  # in-container `useradd` if a future Containerfile non-root step
  # lands. NET_BIND_SERVICE intentionally stays dropped — agents
  # don't bind low ports.
  cap_drop:
    - ALL
  cap_add:
    - CHOWN
    - DAC_OVERRIDE
    - FOWNER
    - SETUID
    - SETGID

services:
  crabcc-core:
    <<: *agent-base
    container_name: crabcc-agent-core
    environment:
      CRABCC_PROFILE: internal/crabcc-core

  crabcc-cli:
    <<: *agent-base
    container_name: crabcc-agent-cli
    environment:
      CRABCC_PROFILE: internal/crabcc-cli

  crabcc-mcp:
    <<: *agent-base
    container_name: crabcc-agent-mcp
    environment:
      CRABCC_PROFILE: internal/crabcc-mcp

  crabcc-memory:
    <<: *agent-base
    container_name: crabcc-agent-memory
    environment:
      CRABCC_PROFILE: internal/crabcc-memory

  crabcc-viz:
    <<: *agent-base
    container_name: crabcc-agent-viz
    environment:
      CRABCC_PROFILE: internal/crabcc-viz

volumes:
  cargo-cache:
