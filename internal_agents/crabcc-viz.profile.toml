name        = "crabcc-viz"
crate       = "crabcc-viz"
description = "localhost call-graph dashboard (issue #64) — sync HTTP, single-user."

model           = "claude-opus-4-7"
max_iterations  = 25
timeout_secs    = 1800

[env]
CRABCC_BUILD_PROFILE  = "release-native"
CRABCC_NO_HINT        = "1"
RUST_LOG              = "crabcc_viz=info,warn"

[tools]
allowed = [
    "Bash",
    "Read",
    "Edit",
    "Write",
    "Grep",
    "Glob",
    "mcp__crabcc__sym",
    "mcp__crabcc__refs",
    "mcp__crabcc__callers",
    "mcp__crabcc__outline",
    "mcp__crabcc__graph",
]

[gates]
bench       = []
test        = ["cargo test -p crabcc-viz --release"]
lint        = ["cargo clippy -p crabcc-viz --all-targets -- -D warnings"]
fmt         = ["cargo fmt -p crabcc-viz -- --check"]
