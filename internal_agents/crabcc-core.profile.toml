# Internal-agent profile: crabcc-core specialist.
#
# Loaded by `crabcc agent --profile internal/crabcc-core`. The CLI:
#   1. Reads this file + `crabcc-core.agent.md` + `shared.agent.md`
#   2. Generates a per-crate repomix bundle via `task repomix-crate
#      CRATE=crabcc-core` (skipped under --no-repomix)
#   3. Spawns the host agent with the composed system prompt
#
# Schema is intentionally minimal — adding fields is additive.

name        = "crabcc-core"
crate       = "crabcc-core"
description = "Indexing pipeline + storage + query primitives + call graph."

# Model + lifecycle.
model           = "claude-opus-4-7"   # strongest agentic model in 4.x
max_iterations  = 25                  # enough for rebase + test + fix loop
timeout_secs    = 1800                # 30 min — agent-guard kills past this

# Build profile env exported to the spawned agent's shell. Internal agents
# default to `release-native` so iteration loops use the local-CPU build.
# Override per-invocation with `CRABCC_BUILD_PROFILE=release` if running
# under CI / cross-arch.
[env]
CRABCC_BUILD_PROFILE  = "release-native"
CRABCC_NO_HINT        = "1"           # suppress the "use ccc instead" banner
RUST_LOG              = "crabcc_core=info,warn"

# Explicit allow-list. The agent CLI doesn't enforce these directly today
# (Claude Code's tool surface is configured upstream) — they're read by
# the test harness to assert prompt composition includes the right hints.
[tools]
allowed = [
    "Bash",        # cargo, task, git
    "Read",
    "Edit",
    "Write",
    "Grep",
    "Glob",
    # crabcc MCP tools — preferred over grep
    "mcp__crabcc__sym",
    "mcp__crabcc__refs",
    "mcp__crabcc__callers",
    "mcp__crabcc__outline",
    "mcp__crabcc__graph",
]

# Bench gates this profile must NEVER regress. The shared preamble
# enforces the run; this list is what the per-crate agent re-checks.
[gates]
bench       = ["task bench-compress", "task bench"]
test        = ["cargo test -p crabcc-core --release"]
lint        = ["cargo clippy -p crabcc-core --all-targets -- -D warnings"]
fmt         = ["cargo fmt -p crabcc-core -- --check"]
