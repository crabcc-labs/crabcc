# crabcc CLI — agent-shell rewrite + token-optimization defaults.
#
# These are the sane, perf-focused, on-by-default knobs the shipped binary
# already uses; this file just makes them visible and overridable in one
# place. Precedence:  environment variable  >  this file  >  built-in default.
# The `CRABCC_NO_*` env flags are disable-only escape hatches and always win.
#
# Active rewrite rules (PreToolUse Bash hook, all ON by default):
#   grep IDENT .          -> crabcc lookup refs IDENT    indexed symbol, -96..-97%
#   grep P . | rg P       -> rg -n P                     gitignore-aware
#   find PATH -name GLOB  -> rg --files -g GLOB PATH
#   cat FILE.json         -> jq -c .                      lossless minify, -53%
#   cat FILE.{yaml,toml,xml} -> dasel -w json --pretty=false   dense JSON (needs dasel)
#   cat SRC.{rs,ts,py,..} -> crabcc read                 outline stub on re-read, -75%
# Read hook (separate, env CRABCC_NO_MEDIA=1 to disable):
#   Read IMG.{png,jpg}    -> downscale to ~1568px edge    vision tokens, -85%
#
# Full-chain measured saving: -81% (read/text-heavy mix) .. -97% (symbol-heavy).
#
# Is it ON right now?  ->  `crabcc shell status`   (one line: `--oneline`)
# The SessionStart hook also prints that one-liner to stderr each session.

[rewrite]
# Master switch for the rewrite engine. (env: CRABCC_NO_REWRITE=1)
enabled = true

[compact]
# Local RTK filter stage — lossless, command-aware, free. Auto-engages when
# `rtk` is on PATH. (env: CRABCC_NO_RTK=1)
rtk = true
# Morph LLM compaction of large residual output. Even when true this still
# requires MORPH_API_KEY (privacy gate — output leaves the machine), so it
# is effectively opt-in. (env: CRABCC_NO_MORPH=1)
morph = true
# Only pay Morph's network round-trip for residual output above this many
# bytes (~2k tokens); RTK handles smaller output locally for free.
morph_min_bytes = 8000
