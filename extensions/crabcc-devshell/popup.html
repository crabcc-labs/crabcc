<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 380px; min-height: 200px; font: 13px monospace; padding: 8px; }
    #logs { max-height: 300px; overflow-y: auto; }
    .log { color: #333; } .warn { color: #b85e00; } .error { color: #c0392b; }
    input { width: 100%; box-sizing: border-box; margin-bottom: 6px; }
    #status { font-size: 11px; color: #888; }
  </style>
</head>
<body>
  <input id="relay-url" type="text" placeholder="ws://localhost:4443 (wormhole relay, optional)">
  <div id="status">ready</div>
  <hr>
  <div id="logs"></div>
  <script src="popup.js"></script>
</body>
</html>
